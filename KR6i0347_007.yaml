body:
  text: 一切佛語心品第四魏云法身品第七唐云無常品第三之二爾時大慧菩薩白佛言世尊惟願為說三藐此云正覺三佛陀此云正覺我及餘菩薩摩訶薩善於如來自性自覺覺他佛告大慧恣所欲問我當為汝隨所問說大慧白佛言世尊如來應供等正覺為作耶為不作耶為事耶唐云為果為因耶為相耶為所相耶為說耶為所說耶為覺耶為所覺耶如是等辭句為異為不異佛告大慧如來應供等正覺於如是等辭句非事非因所以者何俱有過故大慧若如來是事者或作或無常無常故一切事應是如來我及諸佛皆所不欲若非所作者無所得故方便則空同於兔角槃大之子此云石女兒以無所有故大慧若無事無因者則非有非無若非有非無則出於四句四句者是世間言說若出四句者則不墮四句不墮四句故智者所取一切如來句義亦如是慧者當知通曰如來正等正覺如如自性即法身真我也若善此義以之自覺即到自覺聖智境界以之覺他令轉迷歸悟共證菩提此正世尊度生本心故許大慧恣所問也然謂之曰正遍知內而法身自性外而世間諸法無所不知是正遍知超過一切非可以世間智窺測之也世間所云作者是有為法所云不作者是無為法或因或果或相或所相或說或所說或覺或所覺總不出有為無為二種度量若謂無上正等正覺異此等辭句別有法身則不得謂遍知矣若謂無上正等正覺不異此等辭句同諸所覺則不得名正覺矣如何遠離異不異而直顯法身乎佛以等正覺於如是辭句總云非也為其果非正果因非正因以法身自性觀之俱有過故何言乎其有過也若言如來法身是事者則同有作凡有作者皆無常以無常為法身者則一切世間無常之事皆如來矣此乃生滅法我及諸佛皆不許也若言如來非所作者則法身絶無體性可得雖設立種種方便法門悉空無益同於兔角石女之子畢竟無故此乃斷滅法我及諸佛亦不許也故曰二俱有過言作者墮於有言不作者墮於無又有言無果無因者即非有非無是非有非無見者雖遣有無二邊實不離有無四句分別法曰有句曰無句曰亦有亦無句曰非有非無句此四句法者乃世間外道妄想言說智者所不道也若能超出四句外者則不墮四句邪見中離四句絶百非獨露真常不為邪論所惑故為智者所取我及一切如來句義離因果離能所離一異俱不俱亦如是不墮四句也不墮四句即無諸過具慧眼者能離一切有無諸見當能辨此矣百丈云參善知識求覓一知一解是善知識魔生語見故若發四弘誓願度一切衆生盡然後我始成佛是菩薩法智魔誓願不相捨故若持齊戒修禪學慧是有漏善縱然坐道場示現成等正覺度恆沙數人盡證辟支佛果是善根魔起貪著故若於諸法都無貪染神理獨存住甚深禪定更不升進是三昧魔久耽玩故至無上涅槃離欲寂靜是魔業若智慧脫若干魔網不去縱解百本圍陀經盡是地獄滓若覓如佛相似無有是處如今聞說不著善惡有無等法即為墮空不知棄本逐末却是墮空也求佛求菩提及一切有無等法是棄本逐末秪如今粗食助命補破遮寒渴則掬水喫餘外但是一切有無等法都無纖毫繫念此人漸有輕明分善知識不執有不執無脫得十句魔語出語不繫縛人所有言說不自稱師說如谷響言滿天下無口過堪依止若道我能說能解說我是和尚汝是弟子這箇同於魔說無端說道目擊道存是佛不是佛是菩提涅槃解脫等無端說一知一解見舉一手竪一指云是禪是道這箇語繫縛人未有住時秪是重增比丘繩索縱然不說亦有口過寧作心師不師於心不了義教有人天師有導師了義教中不為人天師不師於法未能依得玄鑑且依得了義教猶有相親分若是不了義教秖合聾俗人前說秪如今但不依住一切有無諸法亦不作無依住亦不作不依住知解是名大善知識亦云唯佛一人是大善知識為無兩人餘者盡名外道亦名魔說觀此足知無上正等正覺故非有無四句諸法所可擬也如我所說一切法無我當知此義無我性是無我一切法有自性無他性如牛馬唐云如我所說諸法無我以諸法中無有我性故說無我非是無有諸法自性大慧譬如非牛馬性非馬牛性其實非有非無彼非無自性如是唐云譬如牛無馬性馬無牛性非無自性一切諸法亦復如是大慧一切諸法非無自相有自相但非無我愚夫之所能知以妄想故如是一切法空無生無自性當如是知通曰一切如來句義不墮四句法中何以必慧者然後知也如我所說一切法無我非是淪於斷滅一無所有之謂也當知此義謂一切法無有主宰本無實性名曰無我但除妄我耳非除真我也一切法皆自心所現各各有真實自性無他分別妄想之性譬如他人身中無有我性我自身中無有他性非無自性也如牛馬然譬如非牛有馬性非馬有牛性牛體上不得說馬性是有是無然非無牛自性也馬體上不得說牛性是有是無然非無馬自性也一切諸法亦復如是非我而妄執為我即是分別即是他性真如性中無我可得即無分別即是自性故一切諸法無有自相而非有即有非無真實自性實有真實自性真實自性即常住自相但非斷滅無我愚夫外道之所能知也以彼妄想分別執非我而為我想即斷滅至無我之地亦由妄想分別雖無我亦我也彼既執虗妄之我豈能知真實之我乎若能悟知真實自相者如是一切法空如是一切法無生如是一切法無自性即是我所說無我義也說空豈偏空哉真空故不空也說無空豈斷滅不生哉常生即不生也說無自性豈真無性哉但無他性耳說無我豈真無我哉但無妄我耳明於是義方可語慧慧者當如是知豈凡愚所能知乎溫慥尚書問圭峰禪師曰悟理息妄之人不結業一期壽終之後靈性何依師曰一切衆生無不具有覺性靈明空寂與佛無殊但以無始劫來未曾了悟妄執身為我相故生愛惡等情隨情造業隨業受報生老病死長劫輪回然身中覺性未曾生死如夢被驅役而身本安間如水作氷而濕性不易若能悟此性即是法身本自無生何有依託靈靈不昧了了常知無所從來亦無所去然多生妄執習以性成喜怒哀樂微細流注真理雖然頓達此精難以卒除須長長覺察損之又損如風頓止波浪漸停豈可一生所修便同諸佛力用但可以空寂為自體勿認色身以靈知為自心勿認妄念妄念若起都不隨之即臨命終時自然業不能繫雖有中陰所向自由天上人間隨意寄託若愛惡之念已泯即不受分段之身自能圓短為長易粗為妙若微細流注一切寂滅唯易覺大智朗然獨存即隨機應現千百億化身度有緣衆生名之為佛玩圭峰語而真我妄我之辨當自了然如是如來與陰非異非不異若不異陰者應是無常若異者方便則空若二者應有異如牛角相似故不異長短差別故有異一切法亦如是大慧如牛右角異左角左角異右角如是長短種種色各各異大慧如來於陰界入非異非不異通曰上言無我非無自相有自相此自相即如來法身也若謂如來法身離五陰色身而後顯者即是外道邪見故謂如來法身與五陰色身非異非不異若法身與五陰不異者五陰是所作法遷謝無常法身亦應無常若法身與五陰異者則法身墮在頑空一切修證方便皆無所施是法身與陰若二物者應離五陰而有法身離法身而有五陰不可為一也今法身即在五陰之中五陰即在法身之中不可謂異於此生異不異見者如牛兩角互相似故本不異然以長短差別故說名為異一切諸法皆亦如是應無異相而有異相也如牛右角與左異左角與右異乃至長短不同色相分別種種差殊然亦非異形有長短非離牛角而有長短也色有黑白非離牛角而有黑白也如燒宮殿園林見種種焰火性是一所出光焰由薪力故長短大小各各差殊所以如來法身之相於五陰六入十八界中不可說一不可說異若說一者有二然後說一彼未嘗二何用說一若說異者非同然後說異彼本是同何用說異惟其非異非不異故非言論所及但可慧者自知而已黃檗云學道人若欲知要訣但莫於心上著一物言佛真法身猶若虗空此喻法身即虗空虗空即法身常人謂法身遍虗空處虗空中含容法身不知法身即虗空虗空即法身也若定言有虗空虗空不是法身若定言有法身法身不是虗空但莫作虗空解虗空即法身莫作法身解法身即虗空虗空與法身無異相佛與衆生無異相生死與涅槃無異相煩惱與菩提無異相離一切相即是佛故不以長短種種色觀牛角者牛角但一而已如是如來解脫非異非不異如是如來以解脫名說若如來異解脫者應色相成色相成故應無常若不異者修行者得相應無分別而修行者見分別是故非異非不異魏云若如來法身不異解脫者則無能證所證差別而修行者則見能證及以所證非不異也通曰上言法身與五陰非異非不異如來藏性本如是然有在纏出纏之別故出纏者名為解脫解脫者是如來相應行不可說一不可說異未解脫時則法身隱既解脫時則法身顯如是依解脫故說名如來法身之相何言乎非異非不異也若言異者解脫一無所有法身不離於有既有法身可得應是色相所成色相無常終歸壞滅法身不如是也故不可言異若言不異者則無能證所證差別修行者以解脫而得法身之相應無分別然而修行者則見解脫為能證之法法身為所證之理分別歷然又未嘗不異也惟其非異非不異揀辨不出故不可說是一不可說是異也僧問忠國師如何是解脫師曰諸法不相到當處解脫曰恁麼即斷去也師曰向汝道諸法不相到斷甚麼又僧問若為得成佛去師曰佛與衆生一時放却當處解脫曰作麼生得相應去師曰善惡不思自見佛性曰若為得證法身師曰越毗盧之境界曰清淨法身作麼生得師曰不著佛求耳曰阿那箇是佛師曰即心是佛曰心有煩惱否師曰煩惱性自離曰豈不斷耶師曰斷煩惱者即名二乘煩惱不生名大涅槃國師種種說話總發明如來解脫非異非不異境界如是智及爾𦦨非異非不異大慧智及爾𦦨非異非不異者非常非無常非作非所作非有為非無為非覺非所覺非相非所相非陰非異陰非說非所說非一非異非俱非不俱非一非異非俱非不俱故悉離一切量離一切量則無言說無言說則無生無生則無滅無滅則寂滅寂滅則自性涅槃自性涅槃則無事無因無事無因則無攀緣無攀緣則出過一切虗僞出過一切虗僞則是如來如來則是三藐三佛陀大慧是名三藐三佛陀佛陀大慧三藐三佛陀佛陀者離一切根量通曰上言修行者得相應無分別而修行者見分別然有分別者爾𦦨識也一念相應無分別者般若智也爾𦦨此云所知既法身與解脫非異不異如是般若之智及所知之境亦不可說一亦不可說異何言乎非異非不異也般若真智諸法所不能緣唯不能緣故能即所知離所知也唯即所知不見其異唯離所知不見其不異以無一法可得故如前大慧所舉作非作是常無常義覺非覺是有為無為義相所相即陰非陰義說非說即一異俱不俱義以上種種辭句各以見聞覺知為量而說一切法總不離所知數量總不離言說分別實不出四句法也般若智中一無所有遠離一切心量非一切心量所及即遠離一切言說非一切言說所及既無言說即本無生大凡有生即有滅既無所生則無所滅大凡有滅者即係功勳所致唯無所滅則本自寂然不待滅之而後滅也此寂滅者即是自性涅槃不生不滅唯自性涅槃不生不滅故遠離於生滅凡世間有所證之果及所修之因總屬生滅邊事此涅槃虗空非作非所作即無事無因可得既無因果而一切意想何所攀緣此涅槃虗空非覺非所覺即無妄想攀緣可得既無攀緣則超過世間一切虗僞如外道二乘等見不離四句戲論等法此涅槃虗空非說非所說唯此一事實餘二則非真即此證於真如實際故名曰如來也如來者即是佛陀唯成無上正等正覺故名曰三藐三佛陀佛陀也夫三藐三佛陀佛陀者於世出世間等法無所不知具一切智故曰遍覺能自開覺具一切種智故曰正覺使未超出一切根量即墮於一切根量之中而爾𦦨識未忘去般若智尚遠唯能遠離心意意識諸根量等轉識成智洞徹無礙遍覺即是正覺正覺即是遍覺故曰智及爾𦦨非異非不異也合前法身與解脫非異非不異是法身般若解脫三德圓融總名自性涅槃也永嘉云法身不疑即般若般若無著即解脫解脫寂滅即法身如圓伊三點非異非不異涅槃妙德如是非佛陀不證也皓月供奉問長沙岑曰天下善知識證三德涅槃也未師曰大德問果上涅槃因中涅槃曰問果上涅槃曰天下善知識未證曰為甚未證師曰功未齊於諸聖曰功未齊於諸聖何名為善知識師曰明見佛性亦得名為善知識曰未審功齊何道名證大涅槃師示偈曰摩訶般若照解脫甚深法法身寂滅體三一理圓常欲識功齊處此名常寂光曰果上三德涅槃已蒙開示如何是因中涅槃師曰大德是此經說無事無因長沙說果上涅槃及因中涅槃善觀之亦非異非不異爾時世尊欲重宣此義而說偈言悉離諸根量無事亦無因已離覺所覺亦離相所相陰緣等正覺一異莫能見魏云諸緣及五陰佛不見一法若無有見者云何而分別非作非不作非事亦非因非陰非在陰亦非有餘雜唐云非陰非不陰亦不離餘物魏云非陰非離陰亦不在餘處亦非有諸性如彼妄想見當知亦非無此法法亦爾以有故有無以無故有有若無不應受若有不應想唐云無既不可取有亦不應說成於我非我言說量留連沉溺於二邊自壞壞世間解脫一切過正觀察我通是名為正觀不毀大導師通曰此總頌正等正覺遠離諸過也根量不離見聞覺知境界但以八識為根轉識成智遠離諸法根量即證於清淨法身本無果事亦無修因如是一切皆離已離能覺之人亦離所覺之法云何更有五陰之相及五陰所緣之相乎曰離相所相非一切無相之謂也五陰及諸緣以等正覺觀之與自性法身平等無二不見其一不見其異既無一異可見安所分別之曰非一非異非俱非不俱耶如是分別既無即非彼道外所云作不作亦非彼二乘所云果與因而自性清淨法身非即五陰非離五陰亦不雜於餘物終不出於五陰及緣之相也然而此陰及緣之相見其有者妄想執之以為有見其無者妄想執之以為無其實非有自性如彼妄想分別見一切有亦非淪於虗無如彼妄想分別見一切無此法法自爾法法皆如不有不無一切平等此一切諸法本自如是彼有無妄見因對待而成以先有故言無以先無故言有若無對待即有無不成是故於無不應取著而說無以無亦無自性故於有不應分別而說有以有亦無自性故有無二法非有自性則彼所云作不作及果與因者不離乎相所相惡能免於過哉彼唯迷惑於五陰中計色中我我中色離色是我離我是色凡二十種我見不了我非我真如實義惟一真我無彼妄我了真我者即離言說彼唯不了但著於言說數量留連不捨沉溺於有無斷常二邊不獨自壞且壞世間墮有者諸趣相續墮無者斷滅種性有如是過何由而得解脫乎若能通於我法如來法身於陰界入非異非不異即不墮二邊邪見即不墮四句言說數量超然解脫遠離一切虗僞之過由於正念觀察得自宗通於一切法了無一異可得是名為正觀是名為正遍正覺不謗如來大法乘也故曰不毀大導師百丈云須辨主客語貪染一切有無境法被一切有無境惑亂自心是魔王照用屬魔民秪如今鑑覺但不依住一切有無諸法世間出世間法亦不作不依住知解亦不依住無知解自心是佛照用是菩薩心是主宰照用屬客塵如離波說水照萬象以無功若能寂照不自玄百自然貫串於古今如云神無照功至功常存能一切處為導師故百丈有如是正觀所以為百世師也爾時大慧菩薩復白佛言世尊如世尊說修多羅攝受不生不滅又世尊說不生不滅是如來異名云何世尊為無性故說不生不滅為是如來異名唐云如佛經中分別攝取不生不滅言此即是如來異名世尊願為我說不生不滅此則無法云何說是如來異名如世尊說一切法不生不滅當知此則墮有無見佛告大慧我說一切法不生不滅有無品不現大慧白佛言世尊若一切法不生者則攝受法不可得一切法不生故若名字中有法者唯願為說佛告大慧善哉善哉諦聽諦聽善思念之吾當為汝分別解說大慧白佛言唯然受教佛告大慧我說如來非無性亦非不生不滅攝一切法亦不待緣故不生不滅亦非無義大慧我說意生法身如來名號唐云我說無生即是如來意生法身別異之名彼不生者一切外道聲聞緣覺七住菩薩非其境界大慧彼不生即如來異名大慧譬如因陀羅釋迦不蘭陀羅梵語釋迦提婆因陀羅此云帝釋又云富蘭陀又云憍尸迦皆帝釋異名如是等諸佛一一各有多名亦非多名而有多性亦非無自性唐云譬如帝釋地及虗空乃至手足隨一一物各有多名非以多名而有多體亦非無體通曰上言法身解脫般若為一體已離相矣至此又欲離名故大慧問世尊所說契經處處說言諸法不生不滅世尊復言不生不滅者是如來異名然世尊為一切法皆無自性故說不生不滅耶為見如來異名不生不滅耶若說諸法不生不滅為無性者既墮於無又說是如來異名者復墮於有此則墮有無見佛說一切法不生不滅非世間有無見所現起有無法也唯不生則不有唯不滅則不無不有不無即超出有無之量原非有無故有無品不現大慧復以有無不現即一切法不生若一切法本不生則契經所攝受者亦不可得云何有一切法法既不有誰為立名若依施設名字中別有法合於不生義者唯願說之佛說如來法身非是無物不墮於無也亦非經果攝受不生不滅法而不生不滅果攝受一切法實有法相可得不墮於有也雖離有無亦非待有無生滅緣盡而後顯其不生不滅也本自不生不滅故既本不生不滅而又施設名字等法非虗妄說其實有義故其義云何我說意生法身不生而生生而無生即是如來異名彼不生境界唯八地以下實證平等真如方能了知生即不生不生即生於中更無異相可得若一切外道聲聞緣覺及七住菩薩所證寂滅未能捨藏生滅猶存豈能知此不生不滅真境界耶故依意生身有無生名依無生義有如來名非無真實之義吾固謂不生即如來異名也譬如帝釋一名釋提桓因一名富蘭陀一名憍尸迦乃至地及虗空手足等諸物一一各有多名帝釋如是諸佛亦如是非以多名而有多體名雖多而體則一也亦非無自體性終淪於虗無而後謂之不生也何得謂一切法不生遂不應有異名耶昔南泉問僧講甚麼經曰彌勒下生經泉曰彌勒幾時下生曰見在天宮當來下生泉曰天上無彌勒地下無彌勒雲居膺問洞山天上無彌勒地下無彌勒未審誰與安名洞山被問直得禪床震動乃曰膺闍黎吾在雲巖曾問老人直得火爐震動今日被子一問直得通身汗流洞山將圓寂謂衆曰吾有間名在世誰人為吾除得衆皆無對時沙彌出曰請和尚法號山曰吾間名已謝後石霜著語云無人得他肯雲居曰若有間名非吾先師曹山云從古至今無人辨得疏山云龍有出水之勢無人辨得若於此諸老宿句下參透當知不生即如來異名異名即自不生如是大慧我於此娑呵此云堪忍世界有三阿僧祇此云無數百千名號愚夫悉聞各說我名而不解我如來異名大慧或有衆生知我如來者有知一切智者有知佛者有知救世者有知自覺者有知導師者有知廣導者有知一切導者有知仙人者有知梵者有知毗紐此云大力者有知自在者有知勝者有知迦毗羅者佛生彼城有知真實邊者有知月者有知日者有知王者有知無生者有知無滅者有知空者有知如如者有知諦者有知實際者有知法性者有知涅槃者有知常者有知平等者有知不二者有知無相者有知解脫者有知道者有知意生者大慧如是等三阿僧祇百千名號不增不減此及餘世界皆悉知我如水中月不出不入彼諸愚夫不能知我墮二邊故然悉恭敬供養於我而不善解知辭句義趣不分別名不解自通計著種種言說章句於不生不滅作無性想不知如來名號差別如因陀羅釋迦不蘭陀羅不解自通會歸終極於一切法隨說計著通曰上言非以多名而有多性亦非無自性此下復詳明之如來有十號者謂如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊無上世間解本一號粘上善逝者非也諸佛皆然無數百千名號意不出此曰日曰月即日光月光日面月面之類二譯有牛王師子如水如風等皆以喻名華嚴名號品云如來有四百億十千名法華壽量品云我於餘國作佛更有異名姓氏不同名號分別雖有多名而體不異不增不減無去無來此及餘世界皆悉知我者如水中月不出不入水喻衆生之心月喻如來應身衆生心淨如來即現良由法身普應衆生平等顯現而無去來之相如一月普現一切水一切水月一月攝不出不入即無生滅可得謂之意生身可也謂之無生亦可也故謂無生即如來異名亦可也彼諸愚人雖聞雖說而不知是如來異名由彼墮在有無二邊邪見雖日恭敬供養於我猶如水濁不見明月不善解知辭句義趣至於如來種種異名依義而立義即是名名即是義原不分別此不分別名唯解自宗通者方能了知彼無自通徒於言說章句種種計著於不生不滅之法超過有無之表者作無性想是以有無二見分別不生不滅法也此即不離二邊邪見既於不生不滅見以為無又於如來異名見以為有不知此不生不滅即是如來差別名號亦如帝釋種種異名言雖多而體則一也彼唯不解自通不能決定名與真實會歸終極之地只此不生不滅其義甚深本離言說乃於一切法如言取義義為辭掩猶以水中月為有出入也不亦深可愍哉昔馬大師不安院主問和尚近日尊候如何大師云日面佛月面佛雪竇頌云日面佛月面佛五帝三皇是何物二十年來曾苦心為君幾下蒼龍窟屈堪述明眼衲僧莫輕忽天童頌云日面月面星流電卷鏡對像而無私珠在盤而自轉君不見鉆鎚前百鍊之金刀尺下一機之線明得此段公案無一名不播如來之號無一物不闡遮那之形即與此甚深義相符大慧彼諸癡人作如是言義如言說義說無異所以者何謂義無身故言說之外更無餘義唯止言說大慧彼惡燒智不知言說自性不知言說生滅義不生滅大慧一切言說墮於文字義則不墮離性非性故無受生亦無身唐云離有離無故無生無體故大慧如來不說墮文字法文字有無不可得故除不墮文字大慧若有說言如來說墮文字法者此則妄說法離文字故是故大慧我等諸佛及諸菩薩不說一字不答一字所以者何法離文字故非不饒益義說言說者衆生妄想故通曰因上言不善解知辭句義趣不分別名謂名多體一體既是一則名有多種亦無分別是有分別者辭句也無分別者義趣也彼諸癡人執著名即是義義即是名之說便作是言義與言說無異有多名即應有多義所以者何義無體得言說而成體故言說之外更無餘義但止言說而已彼惡智所燒不知言說體相不知言說有生滅而義趣無生滅也言說何以有生滅為其墮於語言文字也有語言文字即有生相可見即有定體可得有生者必滅有體者必壞是屬生滅邊事非真實法也義何以不生滅為其因文字而顯實不墮於文字中也義本無形不可謂之有其實有義不可謂之無既不屬有無即本不受生既本無受生即自無體無生則無滅無體則無壞故謂義不生滅也言說有盡而義無盡誰謂言說之外更無餘義乎所以如來說法不離文字亦不墮文字既名說法何以不墮文字也以法離於有無故所說文字亦離於有無說即默默即說求有無之相了不可得除離有無不墮文字之說如來常說若有說言如來說法有文字相可得此即妄說不知一切諸法離文字故法超於文字之外即非言說所及是故我經中說諸佛菩薩不說一字不答一字方與本法相應才落語言便非實義所以者何一切諸法離文字故所以諸佛菩薩不墮文字法也然諸佛菩薩為饒益一切衆生故非不隨義分別而說唯說歸於義說即無說衆生不明於義以為實有言說者此但衆生妄想分別見耳不知法離文字故雲門上堂云我事不獲已向你諸人道直下無事早是相埋沒了也更欲踏步向前尋言逐句解會千差萬別廣設問難贏得一場口滑去道轉遠有甚麼休歇時此事若在言句上三乘十二分教豈是無言語因甚更道教外別傳若從學解機智得只如十地聖人說法如雲如雨猶被訶責見性如隔羅縠以此故知一切有心天地懸殊雖然如此若是得底人道火不曾燒口終日說事未嘗拄著唇齒未嘗道著一字終日著衣喫飯未嘗觸一粒米挂一縷絲雖然如此猶是門庭之說也須是實得恁麼始得若約衲僧門下句裏呈機獨勞佇思直饒一句下承當猶是瞌睡漢時有僧問如何是一句師曰舉古德云不露風骨句未語先分付進步口喃喃知君大罔措宗門中一段奇特已於此經宣泄殆盡非諸尊宿固難懸合此旨大慧若不說一切法者教法則壞教法壞者則無諸佛菩薩緣覺聲聞若無者誰說為誰是故大慧菩薩摩訶薩莫著言說隨宜方便演說經法以衆生希望煩惱不一故我及諸佛為彼種種異解衆生而說諸法令離心意意識故不為得自覺聖智處大慧於一切法無所有覺自心現量離二妄想諸菩薩摩訶薩依於義不依文字唐云令知諸法自心所現無外境界離說所說二種妄想通曰上言法離文字故應無法可說而如來又說一切法者何也若不說一切法者諸佛從來立教之法即壞教法既壞即無諸佛菩薩而為證法者亦無緣覺聲聞而為依教者一總都無誰是說法者而復為誰說法耶所謂雖復不依言語道亦復不著無言說即此旨也是故大乘菩薩應當究竟第一義諦莫著言說至於隨宜方便廣說一切經法但以衆生中有希望得果未離所知障者有沉迷根境未脫煩惱障者種種不一故我及諸佛為彼種種異解衆生說種種法一音演法隨類得解令彼離心意意識故凡夫縛於根塵不離意識外道執於斷常不離七識二乘有證有得不離八識為識所迷即不得自覺聖智境界若能轉識成智到自覺聖智處彼即離言語相離文字相我則不為說也所謂佛說一切法為治一切心若無一切心何用一切法故云不為得自覺聖智處說也所以不為得自覺聖智說者以彼於一切法如實了知無所有故覺三界諸法唯自心所現無外境界可得故外無其境內無其心即離能說所說二種妄想是諸大乘菩薩但依於義不依文字已遠離心意意識無事於方便之說已證自覺聖智境界又非言語可到之地故不為聖自證處建立諸法也昔荊南節度使成汭入雲居設供問曰世尊有密語迦葉不復藏如何是世尊密語師召尚書書應諾師曰會麼書曰不會師曰汝若不會世尊有密語汝若會迦葉不覆藏可知世尊不說墮文字法唯迦葉不依文字者乃能信受也若善男子善女人依文字者自壞第一義亦不能覺他墮惡見相續而為衆說不善了知一切法一切地一切相亦不知章句唐云依文字者墮於惡見執著自宗而起言說不能善了一切法相文辭章句既自損壞亦壞於地不能令人心得解悟若善一切法一切地一切相通達章句具足性義彼則能以正無相樂而自娛樂平等大乘建立衆生唐云亦能令他安住大乘正無相樂大慧攝受大乘者則攝受諸佛菩薩緣覺聲聞攝受諸佛菩薩緣覺聲聞者則攝受一切衆生攝受一切衆生者則攝受正法攝受正法者則佛種不斷佛種不斷者則能了知得殊勝入處魏云一切勝妙生處知得殊勝入處菩薩摩訶薩常得化生建立大乘十自在力現衆色像通達衆生形類希望煩惱諸相如實說法如實者不異唐云真實法者無別無異如實者不來不去相一切虗僞息是名如實大慧善男子善女人不應攝受隨說計著真實者離文字故通曰上言諸菩薩摩訶薩依於義不依文字何以不依文字也以聖智第一義諦不落語言文字故若依文字語言即自壞第一義趣不但自壞亦壞於他不得令人心得覺悟其故何也以自宗不通即墮惡見相續但依自論異見言說為衆說法不能善了一切法相文辭章句不了法相既不知實際所詣不善章句又不知名言所指何以覺他令得第一義乎若能不依文字善知一切世出世間之法善知一切地地上進之路善知一切有為無為相應之相通達章句會歸於義具足性義義根於性義能悅心彼則能以正無相樂而自娛樂所謂自覺聖智善樂非二乘外道有相之樂也樂曰無相非憂非樂即是衆生平等心也既得衆生平等之心即為衆生建立平等大乘之法令諸衆生安住大乘正無相樂是性分之樂人人具足我能樂之而不能以言示人能得之而不必以言求但依於義不患不能覺也是建立大乘之法即是修多羅契理契機攝受不生不滅之法是攝受大乘者教法不壞則攝受諸佛菩薩緣覺聲聞而有證法之人既有證於不生不滅者則攝受一切衆生轉彼生滅而歸於不生不滅既令衆生歸於不生滅法則世間一切虗僞妄想法不能搖惑而攝受如來正法矣既攝受正法則當來世皆能依教修行而佛種不至斷絶佛種不斷者既非輪轉三界又非墮於空亡自能了知勝妙生處或妙寂光土或實報莊嚴土或凡聖同居淨土勝妙莊嚴過於一切既知得殊勝入處此大菩薩豈肯耽寂靜樂而不為度生計乎常得意生化身隨處建立平等大乘之法以十自在力現衆色像所謂處非處力業力定力根力欲力性力至處道力宿命力天眼力漏盡力有此十力普現色身隨諸衆生希望煩惱三障種種諸相應時應根說如實法是真如實際之法與一切衆生無別無異故名平等何謂之如以來無所從去無所至體自如如故名曰如何謂之實以一切皆有生滅此獨不生滅有生滅者為虗僞無生滅者為真實故名曰實此如實二字亦是文字不應攝受文字隨說計著若解真實義者當知不來不去者果何物乎不生不滅者果何像乎本離文字相故不應墮文字而說法也黃檗云夫求法者不著佛求不著法求不著衆求應無所求不著佛求故無佛不著法求故無法不著衆求故無僧問和尚見今說法何得言無僧亦無法師云汝若見有法可說即是以音聲求我若見有我即是處所法亦無法法即是心所以祖師云付此心法時法法何曾法無法無本心始解心心法實無一法可得名坐道場道場者秪是不起諸見悟法本空喚作空如來藏本來無一物何處有塵埃若得此中意逍遙何所論此即能以正無相樂而自娛樂也雪峰示衆云我若東道西道汝等則尋言逐句我若羚羊挂角汝等向甚麼處捫摸僧問保福只如雪峰有甚麼言教便似羚羊挂角福云莫是與雪峰作小師不得麼又鏡清問雪峰古人有言峰便倒臥良久起云問甚麼清再問峰云虗生浪死漢投子頌云尋常愛客恨如來及至人來懶話陪空臥早知眠不當虗勞紅焰落寒灰此雪峰如實說法處欲令學人依於義不依文字實此經之遺矩也大慧如為愚夫以指指物愚夫觀指不得實義如是愚夫隨言說指攝受計著至竟不捨終不能得離言說指第一實義大慧譬如嬰兒應食熟食不應食生若食生者則令發狂不知次第方便熟故大慧如是不生不滅不方便修則為不善是故應當善修方便莫隨言語如視指端是故大慧於真實義當方便修真實義者微妙寂靜是涅槃因言說者妄想合妄想者集生死大慧真實義者從多聞者得大慧多聞者謂善於義非善言說善義者不隨一切外道經論身自不隨亦不令他隨是則名曰大德多聞是故欲求義者當親近多聞所謂善義與此相違計著言說應當遠離通曰上言善男子善女人不應攝受隨說計著真實者離文字故何言乎真實第一義離文字相也譬如為愚夫不見物者以指指物示之物者真實也指者言說也彼愚不察但觀其指不得其物但觀言說不得實義如是愚夫但以指為物也以言說為實義也隨言說指攝受計著至於沒身終不能得離指之物當在何處離言說之第一義當在何處不能捨文字之指取第一義故名曰愚然說法者猶當具隨宜方便而指示之也譬如嬰兒應食熟食有人不解成熟次第不舂不炊而以生食食之若食生物則發狂亂如是不生不滅第一義諦離言說相離文字相若不方便次第而修如食嬰兒以生食也彼不得其指不得具足莊嚴法身反以為不善之法如彼癡人不知春炊噉文字穀不得義食以是義故於真實第一義諦善男子善女人應當方便修習庶於不生不滅之義得其滋味不宜於語言文字有所執著如視指端而終不知所指之物為何在也夫於真實義當方便修者何也謂真實第一義者不生不滅寂默鎮靜最為微妙非尋常寂靜者可比是為無餘涅槃之正因也涅槃妙德常樂我淨名為果地修證必以不生不滅為因地心故真實義當方便修也夫於言說不宜計著者何也一切言說與妄想合妄想者虗妄發生虗妄滅盡分別相續是生死法流轉生死者不得涅槃故言說不宜攝受計著也然真實之義必假言說而顯欲求真實義盡廢言說可乎是真實義不可不修必從多聞善知識而得所謂多聞者謂義巧方便善於第一義非聲巧方便善於種種言說也彼為善義真知自性不生不滅凡一切外道經論或有因或無因終不離生滅法必不隨順其說既身自不隨亦不令他隨遠離一切惡燒智會歸終極但一不生不滅是則名曰大德多聞欲求真實義者當親近此多聞善知識可也彼所謂善義為善方便次第修習能善開導於他非如食嬰兒以生食者比故當親而近之也若與此多聞相違相背者但善言說不善於義違遠涅槃不離生死應當遠離其可親近之乎黃龍惟清禪師印心於晦堂每謂人曰今之學者未脫生死病在甚處病在偷心未死耳然非其罪為師者之罪也如漢高帝紿韓信而殺之信雖死其心果死乎古之學者言下脫生死效在甚處在偷心已死然非學者自能爾實為師者鉗鎚妙密也如梁武帝御大殿見侯景不動聲氣而景之心已枯竭無餘矣諸方所說非不美麗要之如趙昌𦘕華華雖逼真而非真華也經文業有三喻此更增入三喻宛轉說法無非令人因指見月毋為𦘕華所迷爾時大慧菩薩復承佛威神而白佛言世尊世尊顯示不生不滅無有奇特所以者何一切外道因亦不生不滅世尊亦說虗空非數緣滅及涅槃界不生不滅世尊外道說因生諸世間世尊亦說無明愛業妄想為緣生諸世間彼因此緣名差別耳外物因緣亦如是世尊與外道論無有差別微塵勝妙自在衆生主等如是九物不生不滅世尊亦說一切性不生不滅有無不可得外道亦說四大不壞自性不生不滅四大常是四大乃至周流諸趣不捨自性世尊所說亦復如是是故我言無有奇特惟願世尊為言差別所以奇特勝諸外道若無差別者一切外道皆亦是佛以不生不滅故而世尊說一世界中多佛出世者無有是處如向所說一世界中應有多佛無差別故佛告大慧我說不生不滅不同外道不生不滅所以者何彼諸外道有性自性得不生不變相唐云外道所說有實性相不生不變我不如是墮有無品大慧我者離有無品離生滅非性非無性如種種幻夢現故非無性云何無性為色無自性相攝受現不現故攝不攝故以是故一切性無性非無性唐云我所說法非有非無離生離滅云何非無如幻如夢色種種見故云何非有色相自性非是有故見不見故取不取故是故我說一切諸法非有非無但覺自心現量妄想不生安穩快樂世事永息通曰因上言大德多聞不隨一切外道經論已隱然指出微妙涅槃不生不滅非外道所執不生不滅者比大慧承佛威神詳細翻出一謂外道計作者為因諸法生滅而作者不生不滅與世尊所說虗空無為非擇滅無為及涅槃無為不生不滅法無異二謂外道依諸因緣生諸衆生與世尊所說無明愛業妄想為緣生諸世間彼因此緣名異實同乃至外物如泥團微塵依外因緣而生諸法亦復如是三謂外道計微塵等九物一時二方三虗空四微塵五四大種六大梵天七勝妙天八大自在天九衆生主即神我也皆不生滅與世尊說一切性不生不滅無異四謂外道計四大不壞周流諸趣不捨自性為不生滅與世尊所說四大性真周偏法界無異一切無非外道已說無有奇特勝過外道者若有不同願佛為演有何所以佛說為勝若世尊說法與外道無別者外道皆亦是佛世尊說一世界中無有多佛今應有多佛矣以所說不生不滅法無差別故佛乃謂我說不生不滅與外道異亦不同彼不生無常論也所以者何外道所計不生不滅謂一切有實性相不生不變但於有無相上辨耳見諸法生滅無常而顯自性不生滅常以有顯無究竟所謂無者亦無常論耳故墮於有無法中我不如是說也我所說真我者離有離無本無生滅非彼有自性之說也亦非無自性之說也云何非無如幻夢色種種現故不可謂之無也云何非有夢幻色相本無自性可攝受故不可謂之有也未嘗不現而實未嘗現未嘗不攝而實未嘗攝有而不有無而不無是故我說一切諸法非有非無但能覺了一切諸法唯自心所現如水中月如鏡中像原自非有不於有上生妄想分別原自非無不於無上生妄想分別離有離無誰為生滅生滅既無寂滅為樂所以定穩快樂超越三界世事永息得大解脫我之所以異於外道者此也外道不離世事妄為分別終歸生滅不得安穩彼執有相故不勝也詳如下文所明何謂世尊無有奇特乎昔薛簡問六祖曰京城禪德皆云欲得會道必須坐禪習定不因禪定而得解脫者未之有也未審師所說法何如祖曰道由心悟豈在坐也經云若見如來若臥若坐是行邪道何故無所從來亦無所去若無生滅是如來清淨禪諸法空寂是如來清淨坐究竟無證豈況坐耶簡曰弟子回主上必問願和尚慈悲指示心要祖曰道無明暗明暗是代謝之義明暗無盡亦是有盡相待立名故經云法無有比無相待故簡曰明喻智慧暗況煩惱修道之人倘不以智慧照破煩惱無始生死憑何出離祖曰煩惱即是菩提無二無別若以智慧照煩惱者此是二乘小見羊鹿等機大智上根悉不如是簡曰如何是大乘見解祖曰明與無明其性無二無二之性即是實性實性者處凡愚而不減在聖賢而不增住煩惱而不亂居禪定而不寂不斷不常不來不去不在中間及其內外不生不滅性相如如常住不遷名之曰道簡曰師說不生不滅何異外道祖曰外道所說不生不滅者將滅止生以生顯滅滅猶不滅生說不生我說不生不滅者本自無生今亦無滅所以不同外道汝若欲知心要一切善惡都莫思量自然得入清淨心體湛然常寂妙用恆沙簡蒙指示豁然大悟此經許多疑難只六祖數語便自了然傳佛心印者得一一符契如此愚癡凡夫妄想作事非諸聖賢不實妄想如犍闥婆城及幻化人大慧如犍闥婆城及幻化人種種衆生商賈出入愚夫妄想謂真出入而實無有出者入者但彼妄想故如是大慧愚癡凡夫起不生不滅惑彼亦無有有為無為如幻人生其實無有若生若滅性無性無所有故一切法亦如是離於生滅愚癡凡夫墮不如實起生滅妄想非諸聖賢不如實者不爾唐云言虗妄者不如法性起顛倒見如性自性妄想亦不異魏云如心分別此法如是如是而彼法不如是如是亦非顛倒分別若異妄想者計著一切性自性不見寂靜不見寂靜者終不離妄想是故大慧無相見勝非相見相見者受生因故不勝大慧無相者妄想不生不起不滅我說涅槃大慧涅槃者如真實義見離先妄想心心數法逮得如來自覺聖智我說是涅槃通曰我唯覺自心現量妄想不生故離有離無離生離滅安穩快樂世事永息既不於世事生妄想何處有生滅乎彼外道愚癡以世事為實從中妄想或以為有或以為無但於有作事上虗妄分別不覩真實無生之妙非聖賢智慧者倫也彼惟於不實之事執以為實不知此不實妄想者譬如犍闥婆城空中莊嚴及幻化人變現種種衆生象馬等物或現商賈出入等事愚夫妄想謂真有出入等相其實無有出者入者但由彼迷心分別以為真有故彼凡愚所見生與不生滅與不滅有為無為悉亦如是總不離幻化境上起不生不滅惑也不知彼真實處原無此有為如凡夫等見亦無此無為如二乘等見即如幻師所作商賈出入或見其生或見其滅而彼幻人其實無有若生若滅若有自性若無自性種種分別都無所有故一切諸法唯自心所現亦復如是無有若生若滅非性非無性本自離於生滅故愚癡凡夫執幻以為真執境以為實墮於有無品不如實法中或起生滅想或起不生滅想其所謂生滅者固妄而所謂不生滅者亦妄也執為生滅者固惑而執為不生滅者亦惑也顛倒分別非諸聖賢若聖賢者覺自心所現明知幻事不為幻化所惑故名為智彼墮不如實妄想者不然不如法性起顛倒見曰此法如是彼法不如是是顛倒分別亦非顛倒分別非實有所異也真如自性即是妄想妄想自性即是真如即真即妄即妄即真故如如之體與不實妄想亦無有異若起異見分別計著一切法實有性自性相謂真如與妄想異而妄想之外別有真如如是計著由不見本來寂靜故不見諸法從本來常自寂靜相即不證入真如實際境界終不離於虗妄分別執著自有而無以為涅槃總顛倒見耳是知見本來寂靜者即不見有性自性相是名無相見計著一切實有體性者即不見寂滅現前是名相見二者提衡而論當是無相見者名為勝非是相見者名為勝以彼相見者見有生見有滅雖至滅盡終當復生既為受生之因便非真滅生滅滅生輪轉三界不得涅槃故不勝也此無相見者當體寂靜不見其有而有為妄想不生不見其無而無為妄想不生既無有起即無其滅本自離於生滅我所說名為真涅槃也謂之涅槃者謂見諸法如實住處本來寂靜遠離分別顛倒之見凡先所舉外道妄想或執內法而名之曰心或執外法而名之曰心所其數不一總不出六七八識所轉一切遠離了無一相可得轉識成智證於如來自覺聖智境界此聖智境界即第一義諦但可自證自覺本自不生不滅我所說名涅槃者此也豈外道所執有相見者可同日語乎玄沙上堂佛道間曠無有程途無門解脫之門無意道人之意不在三際故不可升沉建立乖真非屬造作動則起生死之本靜則醉昏沉之鄉動靜雙泯即落空亡動靜雙收顢頇佛性必須對塵對境如枯木寒灰臨時應用不失其宜鏡照諸像不亂光輝鳥飛空中不雜空色所以十方無影像三界絶行蹤不墮往來機不住中間意鐘中無鼓響鼓中無鐘聲鐘鼓不相交句句無前後如壯土展臂不藉他力師子遊行豈求伴侶九霄絶翳何在穿通一段光明未曾昏昧若到這裏體寂寂常的的日赫𦦨無邊表圓覺空中不動搖吞爍乾坤逈然照如玄沙語超過一切證入自覺聖智境界無相見勝極其圓妙外道有此等奇特耶爾時世尊欲重宣此義而說偈言滅除彼生論唐云為除有生執建立不生義我說如來法魏云我說法無因愚夫不能知一切法不生無性無所有唐云亦非是無法犍闥婆幻夢有性者無因不生無自性何因空當說以離於和合覺知性不現是故空不生我說無自性唐云以是故我說空無生無性謂一一和合性現而非有分析無和合非如外道見夢幻及垂髮野馬乾闥婆世間種種事無因而相見折伏有因論申暢無生義申暢無生者法流永不斷熾然無因論恐怖諸外道通曰此頌上無相見勝相見者受生因故不勝也彼相見者妄見一切有遂生有因論妄見一切無遂生無因論是有無邪執皆生論也既有受生之因不免輪轉三界吾欲滅除彼論故建立離有離無本自不生之義我說如是法惟諸聖賢方能明了非彼凡愚所能知也所謂一切法不生者非是無性即此無性亦無所有不得言無也如乾闥婆城見於虗空如幻夢中現諸色相雖現有種種事而實無因也故我說無因即不生之義也既無生因即離言說而又說一切法空一切法不生一切法無自性是何因耶我所當說也以我所建立不生之義本自空寂離於世間因緣和合諸有為相而覺知之性亦自不現雖有智慧莫能窺之外離和合既空其境內無覺知又空其心內外俱空本自不生是故空不生即是無自性之說我嘗說空無生無自性意本相貫無異說也又所謂離諸和合者寧不見有和合諸緣耶謂世間一切諸法皆一一因緣和合而得生起雖現而非有也既已現矣何謂非有謂於和合諸法一一而分析之無與和者無與合者各無自性本自無物即和合無和合非如外道所見昔有和合今無和合之論也我所說如夢之境如幻之變如空中埀髮如野馬陽𦦨及乾闥婆城等以喻世間種種因緣和合所作之事皆無因而相現以為有而實未嘗有也以為無而實未嘗無也生即無生現即不現此我所建立不生之義也所以折伏外道有因之論彼有因論者見一切諸法從因緣和合而生遂謂一切有見一切諸法離因緣和合而滅遂謂一切無不離和合現有之法分別有無雖說無因亦有因也不離有因即受生滅豈真有不生不滅之義乎我所以折伏彼論正以申暢我無生之說我所謂無生者不斷緣起而寂滅現前此說既暢無生之義恆存而如來正法亦相續不斷豈若外道所謂無因者一切斷滅令如來種性亦斷耶故我說無因論謂無生因即彼斷滅見為受生因者亦遠離之熾然說無間說令彼外道知平日所謂有因無因論皆為生論既受生因不離生死寧不知恐怖乎彼若知驚怖庶幾改圖離彼相見此我所謂不如無相勝也玄沙云今時人不悟箇中道理妄自涉事涉塵處處染著頭頭繫絆縱悟則塵境紛紜名相不實便擬凝心斂念攝事歸空閉目藏睛才有念起旋旋破除細想才生即便遏捺如此見解即是落空亡底外道魂不散底死人冥冥漠漠無覺無知塞耳偷鈴徒自欺誑這裡分明則不然也不是隈門傍戶句句現前不得商量不涉文墨本絶塵境本無位次權名箇出家兒畢竟無蹤跡真如凡聖地獄人天秪是療狂子之方虗空尚無改變大道豈有升沉悟則縱橫不離本際若到這裡凡聖也無立處若向句中作意則沒溺殺人若向外馳求又落魔界如如向上沒可安排恰似焰爐不藏蚊蚋此理本來平坦何用剗除動靜揚眉是真解說道不疆為意度建立乖真若到這裡纖毫不受措意則差便是千聖出頭來也安一字不得玄沙如許葛藤極力提醒無相消息據本分中纖毫生見尚不許出頭況外道種種生論乎爾時大慧以偈問曰云何何所因彼以何故生於何處和合而作無因論爾時世尊復以偈答觀察有為法非無因有因彼生滅論者所見從是滅通曰世尊建立不生義為除外道生論也至熾然無因論為除外道有所因也大慧復以偈問外道有何所因復以何故而立為生論有因有生必緣和合而起彼於何處因緣和合為著於有而世尊作無因論以折伏之也為不明於無因之旨恐同於外道無因之說故設此問不知世尊所謂無因者兼彼有因無因而並無之也世尊姑置彼何因何生何處和合以俟後答而先明所說無因論者謂觀察世間一切有為諸法如夢如幻非有因而有亦非無因而有本自離於有無二見外道不察乃於生滅境上或見其有或見其無遂立為有因無因之論是有因無因總不離於生滅若能覺知吾所說無因之論離有離無本無因緣相可得離生離滅本無生滅法可得而邪見自此息矣邪見既息何從有生論乎故作無因論者為斷彼有無執非與彼無見同也玄沙問境清古人道不見一法是大過患你且道不見甚麼法清指露柱云莫是這箇法麼沙云浙中清水白米從你喫佛法未夢見在天童拈云鏡清當時恁麼答玄沙末後恁麼道還相契也無然則鏡清久不作佛法夢也須是玄沙同參始得據二尊宿相見處即佛法也無況有無見乎爾時大慧說偈問曰云何為無生為是無性耶為顧視諸緣有法名無生名不應無義惟為分別說爾時世尊復以偈答非無性無生亦非顧諸緣非有性而名名亦非無義一切諸外道聲聞及緣覺七住非境界是名無生相遠離諸因緣亦離一切事唯有微心住想所想俱離其身隨轉變我說是無生無外性非性亦無心攝受斷除一切見我說是無生如是無自性空等應分別非空故說空無生故說空通曰大慧既領無生之義為除外道生論乃復問佛說無生以何義得名為諸法無性一向是無耶為觀察諸緣非有自性而得名耶其義何居佛謂以一向無性為無生者則墮於空以諸緣非有性為無生者則逐於境境去則無無生矣故皆非也要以無生之名依於自體無生之義唯八地捨藏乃能證知一切外道聲聞緣覺及七地菩薩皆非其境界彼處無生相可得故以是義得名也何言乎無生相耶彼遠離世間因緣一切有為之法亦離息滅因緣一切無為之事有無俱離無有能作者唯依微妙寂靜心湛然常住是名不動地是名住地唯一心建立我說是無生也諸法既無因緣離於有無分別則能想所想俱離萬念俱泯我說是無生也唯識想俱斷得轉所依其身轉變獲意生身生本不生我說是無生也彼所見外物有即非有無實不實其心無所攝取視如幻夢毛輪乾城陽𦦨等斷除一切妄分別見我說是無生也若以諸緣非有性為無生及以一向無性為無生者槩以一切斷滅不生為無生也均失其義矣如是則向所云無自性及空等文句應當即此分別而說以空非空故說名為空以生無生故說名為空有而不有故為妙有無而不無故為真無豈以無自性而槩同於無耶黃檗云聲聞者因聲得悟故謂之聲聞但不了自心於聲教上起解或因神通或因瑞相言語運動聞有菩提涅槃三阿僧祇劫修成佛道皆屬聲聞道謂之聲聞佛唯直下頓了自心本來是佛無一法可得無一行可修此是無上道此是真如佛學道人秪怕一念有即與道隔矣念念無相念念無為即是無學道人若欲得成佛一切佛法總不用學唯學無求無著無求即心不生無著即心不滅不生不滅即是佛八萬四千法門對八萬四千煩惱秪是教化接引門本無一切法離即是法知離者是佛但離一切煩惱是無法可得此黃檗無一法可得直顯無生之旨實與此段暗合因緣數和合則有生有滅離諸因緣數無別有生滅捨離因緣數更無有異性若言一異者是外道妄想有無性不生非有亦非無除其數轉變是悉不可得唐云唯除衆緣會於中見起滅但有諸俗數展轉為鈎鎖離彼因緣鎖生義不可得生無性不起離諸外道過但說緣鈎鎖凡愚不能了通曰上言遠離諸因緣亦離一切事我說是無生何者為因緣何以謂之離哉世間因緣法有十二數曰無明至老死是也若一念無明生與十二因緣數和合即有生有滅不離苦海若一念無明滅與十二因緣數離此外更無別法能為生滅者故能捨離因緣數當下即是無生無明實性即是佛性豈更有異性哉若言性是一十二因緣是異於中復立一異俱不俱見皆是外道妄想分別如除器觀空說空是一彼大虗空何嘗有一異哉既非一異即非有無故有性無性不生有無之性既不可得則非有非無亦不可得唯除衆緣和合其數轉變見有生滅生滅唯是其數是諸一異有無悉不可得也所謂其數轉變者但諸世俗未明真諦說有十二因緣假名施設展轉生滅如鈎如鎖連環不斷然真如性中離彼因緣非有非無本自非縛何更求脫與彼因緣鈎鎖了無干涉而生滅何自生乎我所說無生之義即因緣離因緣求其生義不可得也生即無義即無生性既無生性生即不生是生無自性原不生起不離生法而顯無生離諸外道一切無有斷滅之過但我說因緣鈎鎖當下本自無生則非彼凡愚所能了也諸因不自因必待於緣緣不自緣必待於因因緣各本無生此唯聖智所覺而外道豈能測哉僧問石霜如何是和尚深深處霜云無鬚鎖子兩頭搖投子頌云三更月落兩山明古道程遙苔滿生金鎖搖時無手把碧波心月兔常行又僧問石霜真身還出世也無霜云不出世僧云爭奈真身何霜云琉璃瓶子口天童拈云通身及盡徹底無功撒手興來隨處得用還識石霜老漢麼當堂無影迹遍界不曾藏於此二則公案勘破方解生即無生之旨若離緣鈎鎖別有生性者是則無因論破壞鈎鎖義如燈顯衆像鈎鎖現若然是則離鈎鎖別更有諸性無性無有生如虗空自性若離於鈎鎖慧無所分別復有餘無生賢聖所得法彼生無生者是則無生忍通曰但說緣鈎鎖本自無生此凡愚不能了也由彼執著外緣諸法以為有一有異謂諸因緣是生滅法別有作者是不生不滅法若離因緣鈎鎖別有生性者是則無因之論謂一切說無因生非從無明妄想緣生所以破壞因緣之義如勝妙微塵等是謂別有異因彼徒見因緣鈎鎖生滅顯現常在目前但如燈照衆像燈自燈像自像不相為生也因緣鈎鎖如衆像現衆像先有待燈而見離衆像外別有燈性是則離鈎鎖外別更有諸性諸性不與鈎鎖相生究竟無因究竟斷滅是以顧視諸緣非有性而名無生者其可通乎或謂一切無性故無有生體相如虗空相似原無所有此不能即鈎鎖離鈎鎖必離去鈎鎖而後顯其無生也此乃二乘愚夫所證偏空之見若必離於鈎鎖蕩然一空雖有智慧亦無所施於誰分別生不生義乎此以無性為無生者亦非也復有餘無生有似於二乘而實非二乘者乃三賢十聖所得之法彼於生而無生不離鈎鎖而亦不縛於鈎鎖是則漸證無生由一地入一地至得無生法忍忍力堅定不復更生所謂唯有微心住想所想俱離者也此我所謂無生之義豈彼凡愚所能了乎翠岩真示衆云不見一法是大過患山河大地日月星辰色空明暗不是一法拈起拄杖云凡夫見拄杖喚作拄杖聲聞人見拄杖認得頑空撥無拄杖菩薩人見拄杖幾曾拄著齒牙饑來喫飯困來打睡寒來向火熱則取涼不見道一切智智清淨恁麼說話笑破土地鼻孔說到一切智智清淨一切寂靜一切無生於向上巴鼻尚隔一塵參若使諸世間觀察鈎鎖者一切離鈎鎖從是得三昧癡愛諸業等是則內鈎鎖鑽燧泥團輪種子等名外若使有他性而從因緣生彼非鈎鎖義是則不成就若生無自性彼為誰鈎鎖展轉相生故當知因緣義堅濕暖動法凡愚生妄想離數無異法是則說無性如醫療衆病無有若干論以病差別故為設種種治我為彼衆生破壞諸煩惱知其根優劣為彼說度門非煩惱根異而有種種法唯說一乘法是則為大乘通曰外道凡夫破壞鈎鎖者不知一切世間無非鈎鎖實不可破也二乘愚夫欲離鈎鎖者不知離鈎鎖求法此心終不得定也若使諸世間人依賢聖所得法觀察鈎鎖之義解悟十二緣生本無自性即一切離於鈎鎖不為鈎鎖所縛從是而入證於三昧得寂靜樂與前聖賢不遠矣云何觀察彼因緣鈎鎖有內有外如無明癡愛等十二因緣輪轉三世為內鈎鎖如鑽燧得火泥團成瓶種子生芽等為外因緣各有自性相緣而起若使有他性異因能為世間因緣生法者則鑽燧可以生芽種子可以成瓶而老死病苦不由癡愛業生非鈎鎖之義矣如是則凡不離鈎鎖者皆得三昧世間有是事乎故彼無因之說不成就也若一向斷滅生無自性彼現前有生現前有滅復為誰鈎鎖而不得解脫耶是則無明癡愛展轉相生生生死死輪回不息當知是因緣之義昭然耳目固不可得而破壞也至於堅濕暖動為地水火風四大之性凡愚妄想以為無種因緣生無因身顧視諸緣一一無有自性不知此四大法內有親相分外有疏相分皆從無明生起津潤生水炎盛生火飄動生風分段生地離十二因緣之數更無別異法而為名色緣者地水火風皆名色也彼但緣一切無所有法說各各無有自性離此因緣鈎鎖而說四大本無性生也若如是說無生者一切本無更何有病更何假於修治乎故我說無生因緣體空本自不生為諸衆生業緣鈎鎖世事不息有諸煩惱不得安穩快樂如病者之病種種差別而醫者為設種種治法要於去病而止無有若干虗妄論說也我為衆生滅除煩惱病有枝末煩惱有根本煩惱知其根器優劣不同為說大小三乘之法以度脫之非謂煩惱根異而有種種對法之法也不離鈎鎖即為煩惱能離鈎鎖即為菩提在諸衆生能自觀察何如耳故我為彼說諸度門雖有種種建立唯說一乘之法令彼衆生悟入無生法忍開佛知見當下解脫了無鈎鎖可得此則即鈎鎖離鈎鎖即因緣非因緣煩惱即是菩提生死即是涅槃是名為大乘之法也法華云唯有一乘法無二亦無三除佛方便說但以假名字引導於衆生入大乘為本此之謂也百丈云秪如今於一一境不惑不亂不嗔不喜於自己六根門頭刮削併當得淨潔是無事人勝一切知解頭陀精進是名天眼亦名了照為眼是名法界性是作車載因果佛出世度衆生則前念不生後念不續前念業謝名度衆生前念若嗔即將喜藥治之即名有佛度衆生但是一切言教秪是治病為病不同藥亦不同所以有時說有佛有時說無佛實語治病病若得瘥箇箇是實語治病若不瘥箇箇是虗妄語實語是虗妄語生見故虗妄是實語斷衆生顛倒故為病是虗妄秪有虗妄藥相治佛出世度衆生是九部教語是不了義教語瞋及喜病及藥總是自己更無兩人何處有佛出世何處有衆生可度如經云實無衆生得滅度者亦云不愛佛菩提不貪染有無諸法名為度他亦不守住自己名為自度至哉言乎說到病及藥總是自己更無兩人須具宗眼始得魏云無常品第八爾時大慧菩薩摩訶薩復白佛言世尊一切外道皆起無常妄想世尊亦說一切行無常是生滅法此義云何為邪為正為有幾種無常佛告大慧一切外道有七種無常非我法也何等為七彼有言說作已而捨是名無常有說形處壞是名無常有說即色是無常有說色轉變中間是名無常無間自之散壞如乳酪等轉變中間不可見無常毀壞一切性轉唐云一切諸法相續不斷能令變異自然歸滅猶如乳酪前後變異雖不可見然在法中壞一切法有說性無常有說性無性無常有說一切法不生無常入一切法通曰世尊說種種法引導衆生除煩惱病證無生忍有實因緣有實解脫非若外道虗妄論議也大慧又欲世尊辨明外道無常妄想與我教所說諸行無常是生滅法誰邪誰正欲令將來不墮彼法種種邪論也世尊略舉外道有七種無常此其最精者不容不辨我法謂四大非有五陰皆空此正論也外道欲空四大而失其真欲空五陰而遺其半已知色受想當空窮至行陰新新不住之地遂以無常為真體也行陰中幽隱不可窺處則以為冥諦墮於斷見中間我執不可滅處則以為神我墮於常見有說形處變壞是無常者有說色等即是無常者是以四大所造色為無常也固不能空四大有說始作即捨是名無常者有說物無常者有說性無性有法無法而悉無常者謂無能作所作又無四大可空有說一切法不生無常入一切法者有說色轉變中間是名無常者謂生滅法中有不生者在色轉變中有不變者存如其言也豈不近理彼但對生滅而求不生離轉變而求不變此皆不離外法有無作常無常見也西域崛多三藏者天竺人也於六祖言下契悟後遊五臺見一僧結庵靜坐問曰師孤坐奚為曰觀靜師曰觀者何人靜者何物其僧作禮問曰此理何如師曰汝何不自觀自靜彼僧茫然師曰汝出誰門耶曰秀禪師師曰我西域異道最下種者不墮此見兀然空坐於道何益其僧却問師所師者何人師曰我師六祖汝何不速往曹溪決其真要其僧即往參六祖六祖垂誨與師符合僧即悟入使不遇三藏點破幾何不為外道見也大慧性無性無常者謂四大及所造自相壞四大自性不可得不生唐云能造所造其相滅壞大種自性本來不起彼不生無常者非常無常一切法有無不生唐云謂常與無常有無等法如是一切皆無有起分析乃至微塵不可見是不生義非生是名不生無常相若不覺此者墮一切外道生無常義通曰外道七無常論總不出有無斷常二見世尊先指出第六第七二種斷見破之性無性唐云物無物謂四大之物及所造之物自性俱壞四大能造既造色已自體已壞而所造者非本四大又亦隨壞如種生芽二俱無常既無能造又無所造則四大之性了不可得既無自性即是本來不生此所謂焦芽不作芽事破瓶不作瓶事斷滅種性者也彼不生無常入一切法者非是一切法常與無常及有與無二俱不生之謂也彼以不生無常偏住一切諸法之中乃至分析生法至於微塵亦無所見以是之故說名不生是彼不生之義以生顯不生但可謂之非生猶云有已還無非復昔日之有云爾安可謂之不生乎是名不生無常之相有不生無常相可得雖說不生乃是生無常論也我法弟子若不覺此妄計不生還成生法者即墮彼生無常論彼徒見諸法歸滅以為不生不知生滅相仍滅即是生故以生為無常者其論則壞紙衣道者來參曹山山問莫是紙衣道者否者曰不敢山曰如何是紙衣下事者曰一裘才掛體萬法悉皆知山曰如何是紙衣下用者近前應諾便立脫山曰汝秪解恁麼去何不恁麼來者忽開眼問曰一靈真性不假胞胎時如何山曰未是妙者曰如何是妙山曰不借借者珍重下僧堂便化山示頌曰覺性圓明無相身莫將知見妄疏親念異便於玄體昧心差不與道為鄰情分萬法沉前境識鑒多端喪本真如是句中全曉會了然無事昔時人如外道情分萬法沉前境者固無足道我法中識鑒多端墮生無常論者其可不知所擇乎大慧性無常者是自心妄想非常無常性所以者何謂無常自性不壞大慧此是一切性無性無常事除無常無有能令一切法性無性者如杖瓦石破壞諸物唐云彼立無常自不滅壞能壞諸法若無無常壞一切法法終不滅成於無有如杖槌瓦石能壞於物而自不壞此亦如是現見各各不異是性無常事非作所作有差別此是無常此是事作所作無異者一切性常無因性唐云無差別故能作所作應俱是常不見有因能令諸法成於無故大慧一切性無性有因非凡愚所知非因不相似事生若生者一切性悉皆無常是不相似事作所作無有別異而悉見有異唐云若能生者一切異法應並相生彼法此法能生所生應無有別現見有別云何異因生於異果若性無常者墮作因性相若墮者一切性不究竟一切性作因相墮者自無常應無常無常無常故一切性不無常應是常唐云若無常性是有法者應同所作自是無常自無常故所無常法皆應是常若無常入一切性者應墮三世彼過去色與壞俱未來不生色不生故現在色與壞相俱色者四大積集差別四大及造色自性不壞離異不異故魏云以彼彼不相離故一切外道一切四大不壞一切三有四大及造色在所知有生滅離四大造色一切外道於何所思惟性無常四大不生自性相不壞故唐云一切外道計四大種體性不壞色者即是大種差別大種造色離異不異故其自性亦不壞滅大慧二有之中能造所造莫不皆是生住滅相豈更別有無常之性能生於物而不滅耶通曰外道所說性無常者魏云以無物故名為無常謂於非常非無常處虗妄分別諸法非常是無常性其義云何以自性不滅故自性不滅者無常之性常不壞滅故自性不壞能壞諸法此一切法壞滅無常之事所由成也若除此無常自性即不能令一切法有已還無歸於壞滅如杖捶瓦石等能壞諸物而自體不壞此無常性亦猶是也以性無常故現見諸法無常各各不異種種流轉種種變現是事之無常皆此無常為之性也是性無常事如楞嚴經云性一切心無有能作所作差別雖有智者不能剖析萬象從中分別此是無常此是所作事是能作與所作無異也如是說者有過以彼因果無差別故若作所作無異者則能作所作俱皆是常不見有因能令諸法壞滅歸於無常而彼所立無常為作者其義不成以一切法無因性故然一切諸法有性無性生起壞滅實亦有因無論人天依正有無相傾乃至一人發心歸元十方虗空俱殞莫不有因但非凡愚之所能知耳有是因則有是果果與因必相似若本非因而不相似果生是謂異因若異因能生異果者則一切異法應並相生李應生桃桃應生李皆無常性皆不相似如是則彼法此法能生所生應無差別而今現前諸法悉見有異各有能作所作因果歷然云何異因能生異果故謂彼無因性者有過若謂性無常是有物者必然能作必然為因是有作因性相應同因體所作之事墮有為法不得謂之性也復更有過謂之性者於一法中即應具足一切諸法若墮於有者唯是一切生滅法不能究竟一切不生滅法以同一切所作因果業相無差別故復更有過自性既墮於有作則自無常應同所作無常而不得計能作者為性常矣唯能作無常所作無常故則所作一切無常之法不是無常應同能作不壞之常矣所作之事既不可壞何得有無常之性能壞之耶又謂無常性即住一切法中而無常性是常者應同諸法墮於三世同歸於壞何者若入過去過去色已壞若入未來未來色未生若入現在現在色不住剎那變滅與壞相俱色既壞而無常性亦與之俱壞安得常彼外道妄計四大種體性不壞及所造色自性亦不壞但以色者即是四大積集而成即是四大差別而現體性無二離異不異故以為異則四大積集為所造因固非異也以為不異則色已合成各各差別非復四大又非不異也以彼彼不相離故一切外道以一切四大自性不壞入於一切三有法中而無常之性常自不壞今觀三有之中一切皆依四大及所造色在在處處莫不皆是生住滅相人人皆知四大壞則色亦壞世間豈有離四大造色外別有一無常之性耶離四大造色外即是頑空更無四大諸塵等法外道於何所思惟說有性無常四大性本不生能生於物而自體相常不壞耶吾固謂若無常入一切性者應墮三世同歸於壞也既同歸於壞而所立物不壞之宗墮矣僧問趙州世界壞時此性不壞如何是此性州曰四大五陰僧云此猶是壞底如何是此性州曰四大五陰法眼云是一箇是兩箇是壞不壞且作麼生會試斷看須於此覷得破方不墮外道邪見解離始造無常者非四大復有異四大各各異相自相故非差別可得彼無差別斯等不更造二方便不作當知是無常唐云非大種互造大種以各別故非自相造以無異故非復共造以乖離故當知非是始造無常彼形處壞無常者謂四大及造色不壞至竟不壞大慧竟者分析乃至微塵觀察壞四大及造色形處異見長短不可得非四大四大不壞形處壞現墮在數論唐云此非能造及所造壞但形狀壞其義云何謂分析色乃至微塵但滅形狀長短等見不滅能造所造色體色即無常者謂色即是常彼則形處無常非四大若四大無常者非俗數言說世俗言說非性者則墮世論見一切性但有言說不見自相生轉變無常者謂色異性現非四大如金作莊嚴具轉變現非金性壞但莊嚴具處所壞如是餘性轉變等亦如是如是等種種外道無常見妄想火燒四大時自相不燒各各自相相壞者四大造色應斷唐云如是等種種外道虗妄分別見無常性彼作是說火不能燒諸大自相但各分散若能壞者能造所造則皆斷滅通曰已上三端窮四大非有流入於斷此下四端窮四大造色無常自性是常未離乎有一者謂作已而捨以離始造為無常也彼說發起作事之初實未嘗作以為互造非有四大復造異四大以各各異相故非互造也以為自造則自相非有差別可得安能分而為四非自造也以為共造則彼無差別性各各乖離不能方便和合即彼不能互造於此更無能作二方便者斯四大等不復更共造也由此言之本無作者既無始作不見其同不見其異當知離彼始造即是無常謂能作者為無常也二者謂形處壞無常其說最粗淺謂能造四大及所造色俱不壞但形處壞究竟分析其色乃至微塵觀察其中孰為壞者但四大及所造色形處長短變壞不可得非四大能造所造體性壞也四大不壞但形處壞異相現此僧佉外道所計四大之性周流諸趣體恆不變故謂四大常也三者謂色即無常亦即形處無常之見非四大無常之謂也若四大無常者則諸世間一切無常不得以俗數語言論說世事以無世事可得故若以世俗言說論世事者是諸世事亦非實有當知墮於世論邪見以說一切諸法唯有虗假名字言說不實見有無常自相生故若見自相生者即色即空即知諸行無常是生滅法此我法中收非世論可比也四者計轉變中間無常謂能造所造俱常但兩色中間有無常性能使色法相續轉變故一切色異性現則謂之壞非四大自性壞也如金作莊嚴具莊嚴具有轉變則謂之壞非金性壞此如是餘性轉變亦如是如乳作酥酪等酥酪有轉變則謂之壞非乳性壞如是種種外道虗妄分別作無常見說火燒四大時四大自體俱各分散而自相實不燒若火能燒四大者四大造色當應斷滅誰復為能造所造乎以上四種邪見謂四大有形者畢竟有滅四大無形者終不能壞此以常為無常以無常為常一切矯亂即半生半滅半不生滅之論也仰山指雪師子云還有過得此色者麼雲門云當時便與推倒雪竇云只解推倒不解扶起萬松道既稱為色必與眼對過白之色唯無色者不與眼對雲門所以道當時便與推倒若向至白無白處認著正是墮在無色界中雪竇別指出一條活路向推倒處却教扶起佛眼云若向這裏扶持起來甚生次第事佛覺頌云一色無過指示人白銀世界裡頻呻超然推倒還扶起爭似東風煦日新天童頌云一倒一起雪庭師子慎於犯而懷仁勇於為而見義清光照眼似迷家明白轉身還墮位衲僧家了無寄同生同死何彼何此暖信破梅兮春到寒枝涼颷脫葉兮秋澄潦水據宗門中無色邊尚不可住而況有各各自相不壞者乎大慧我法起非常非無常所以者何謂外性不決定故魏云我不說外境界有故唯說三有微心唐云三界唯心故不說種種相有生有滅四大合會差別四大及造色故妄想二種事攝所攝知二種妄想離外性無性二種見唐云不說諸相故大種性處種種差別不生不滅故非能造所造故能取所取二種體性一切皆從分別起故如實而知二取性故覺自心現量妄想者思惟作行生非不作行離心性無性妄想世間出世間出世間上上一切法非常非無常不覺自心現量墮二邊惡見相續一切外道不覺自妄想此凡夫無有根本謂世間出世間出世間上上從說妄想生非凡愚所覺通曰以上七種無常皆外道邪見非我法也若我法所起唯說大種及諸塵非常非無常是謂真常超過外道心量所以者何外道於外境界起見或謂常或謂無常不知外境界不決定有我不說外境界故我說三界內外無有一法不從微妙真實心生但說三界唯心本無生滅不說種種諸相有生有滅及四大種合會差別之相與四大能造及所造之色以四大種唯是因緣和合非大及塵是實有法是故說言不生不滅故非能造所造故彼外道以虗妄心分別能所二種體性見有能取所取之事攝受計著一切皆從妄分別起故如實而知二種分別本皆虗妄即不見有能取所取遠離外法有無二見不見其有故不取於有不見其無故不取於無唯覺一切諸法皆是自心現量如水中月不可謂之有不可謂之無故能離有無見而不分別能造所造有生有滅也外道二種見起於妄想者由思想作行而生分別所作業相名妄想生非不思想作行而名為妄想也若不生於思不起於想即離於自心所現有無分別離此妄想已即能了知世間法出世間法出世間上上法一切如實唯是一心非常非無常以有世間及出世間上上諸法是故不得說言是常以能覺知唯是自心分別見故是故非無常而諸外道不覺自心現量墮在二邊惡見相續建立七種無常論此諸外道不覺自心虗妄分別無有根本智故非諸聖人分別無常有根本智故所以一切外道不能解了此三種法一者世間法相二者出世間法相三者出世間上上勝法相彼謂三法皆依言語種種說法遂以為妄想分別境界不知所有言說既曰非常又曰非無常豈彼凡愚之所覺乎彼唯不覺自心現量即不能離攝所攝妄想即不能離外法有無二種惡見惡見相續故謂之愚雲門上堂諸和尚子莫妄想天是天地是地山是山水是水僧是僧俗是俗良久曰與我拈案山來僧便問學人見山是山水是水時如何師曰三門為甚麼騎佛殿從這裡過曰恁麼則不妄想去也師曰還我話頭來且道雲門不妄想作如何話會須於此公案了了方名有根本知見爾時世尊欲重宣此義而說偈言遠離於所造及與形處異性與色無常外道愚妄想諸性無有壞大大自性住外道無常想沒在種種見彼諸外道等無若生若滅大大性自常何謂無常想唐云彼諸外道衆皆從不生滅諸大性自當誰是無常法一切唯心量二種心流轉攝受及所攝無有我我所梵天為樹根枝葉普周遍如是我所說唯是彼心量魏云三界上下法我說皆是心離於諸心法更無有可得通曰前長行中分破七種無常亦既備矣此復總括其旨而破之謂一者作已而捨謂能造無常遠離於所造二者形處異三者色無常謂所造無常而能造四大是常與初計相返五者性無常六者性無性無常謂能造所造俱壞中有個無常自性不壞與上計俱返可不謂之愚乎四者謂轉變中間有不壞性七者謂一切法不生遍住於諸法之中四大自性常住不滅既云不壞又云常住而外道於中作無常想以常為無常以無常為常沒在種種妄分別見無論彼所謂常者非真且其言自相違也彼諸外道等皆說一切法不生及物不壞不滅四大各各不相壞而自性常住若是者一切是常也誰是無常法而作無常想乎故彼所謂七無常者其義不成若我所說法三界所有一切唯是自心現量即有無離有無即生滅離生滅本無能所可得若彼能所二種分別妄想皆從自心流轉作意而生見有能取及以所取取著有則以為無常取著無則以為無常其實無有能取者而為之我亦無有所取者而為之我所但由識心逐妄流轉故有二種取耳若心不流轉即原無有我誰為能取原無我所誰為所取二取性既離安所見其有而謂之常安所見其無而謂之無常故我所說者非常非無常也又外道計大梵天初造衆生為有情本如樹根然發為枝條普遍世間如是說者有樹根而為之我有枝條周遍而為之我所唯是彼外道妄想心量非我法所收若我所說三界上下唯是一心離心更不可得覺了唯心現量是為有根本智明於世間及出世間上上等法非常非無常彼以梵天勝妙微塵為能作者是為無根本智但於枝葉上作種種分別建立七無常論總歸於妄而已藍田真禪師上堂成山假就於始簣修途託至於初步上座適來從地爐邊來還與初步同別若言同即不會不遷若言別亦不會不遷上座作麼生會還會麼這裏不是那裏那裏不是這裏且道是一處兩處是遷不遷是來去不是來去若於此顯明得便乃古今一如初終自爾念念無常心心永滅所以道觀方知彼去去者不至方上座適來恁麼來却請恁麼去參此數語發明念念無常心心永滅會得真實不遷處却與唯心之旨暗符魏云入道品第九唐云現證品第四爾時大慧菩薩復白佛言世尊唯願為說一切菩薩聲聞緣覺滅正受次第相續若善於滅正受次第相續相者我及餘菩薩終不妄捨滅正受樂門不墮一切聲聞緣覺外道愚癡佛言大慧諦聽諦聽善思念之當為汝說大慧白佛言世尊唯願為說佛告大慧六地菩薩摩訶薩及聲聞緣覺入滅正受第七地菩薩摩訶薩念念正受離一切性自性相正受非聲聞緣覺諸聲聞緣覺墮有行覺攝所攝相滅正受是故七地非念正受得一切法無差別相非分得種種相性覺一切法善不善性相正受是故七地無善念正受魏云菩薩於七地中念念入滅盡定以諸菩薩悉能遠離一切諸法有無相故聲聞辟支佛不能念念入滅盡定以緣有為行入滅盡定墮在可取能取境界是故聲聞辟支佛不能入七地中念念滅盡定以覺諸法種種異相有法無法善不善法同相異相而入滅盡定是故聲聞緣覺不能入七地中念念滅盡定以無善巧方便智故通曰因上言外道不生不滅與佛無異既指出七種無常是生滅法則外道所說涅槃不足論已然一切菩薩及二乘等同斷三界煩惱入滅盡定彼有次第差等地地相續而進各各謂得涅槃若善其相則知無上涅槃滅正受樂是真實境界不墮二乘及外道愚癡見也世尊一一分別而語之謂初地至六地菩薩得人無我入滅正受與聲聞緣覺無異以定有出入未能念念入也至七地念念入正受遂離一切有無諸相即有涅槃性自性相亦不取著故非二乘所及諸二乘人念正受樂見有正受而攝取之緣有為行入滅盡定墮在能所取境界不能入七地中念念滅盡定是故七地念念正受非念正受非以正受為善而念入之以得一切法無生死涅槃差別相故非彼二乘分量所及也彼二乘人墮有行覺者有種種相性可得所謂覺一切諸法有法無法善不善法同相異相而入滅盡定見有生死可厭見有寂滅可樂以無善巧方便智不能於生滅法中而證涅槃也彼以涅槃為善而攝取之正名善念正受非念念正受也七地念念正受善且忘之故得一切法無差別相豈二乘所敢望乎有僧思𨜶問仰山禪宗頓悟入門的意如何仰曰此意極難若是祖宗門下上根上智一聞千悟得大總持其有根微智劣若不安禪靜處到這裏總須茫然曰除此一路別更有入處否仰曰有曰如何即是仰曰汝是甚處人曰幽州人仰曰汝還思彼否曰常思仰曰能思者是心所思者是境彼處樓臺林苑人馬駢闐汝返思思底還有許多般麼曰某甲到這裏總不見有仰曰信位即是人位未是曰除却這箇別更有意也無仰曰別有別無即不堪也曰到這裏如何即是仰曰據汝所解秪得一玄得坐披衣向後自看天童頌云無外而容無礙而冲門牆岸岸關鎖重重酒常酣而臥客飯雖飽而頽農突出虗空兮風摶妙翹踏翻滄海兮雷送游龍二乘人不能入七地正受秪得一玄耽三昧樂真如酒酣飯飽也安能突出虗空哉大慧八地菩薩及聲聞緣覺心意意識妄想相滅初地乃至七地菩薩摩訶薩觀三界心意意識量離我我所自妄想修墮外性種種相唐云不見外法種種諸相愚夫二種自心攝所攝向無知不覺無始過惡虗僞習氣所熏大慧八地菩薩摩訶薩聲聞緣覺涅槃菩薩者三昧覺所持是故三昧門樂不般涅槃若不持者如來地不滿足棄捨一切有為衆生相故佛種則應斷諸佛世尊為示如來不可思議無量功德聲聞緣覺三昧門得樂所牽故作涅槃想大慧我分部七地善修心意意識相善修我我所攝受人法無我生滅自共相善四無礙決定力三昧門地次第相續入道品法不令菩薩摩訶薩不覺自共相不善七地墮外道邪徑故立地次第大慧彼實無有若生若滅除自心現量所謂地次第相續及三界種種行愚夫所不覺愚夫所不覺者謂我及諸佛說地次第相續及說三界種種行通曰上言二乘滅正受不能入七地滅正受為不能得一切法無差別相故至於八地捨離藏識不但一切法種種相滅乃至聲聞緣覺心意意識虗妄分別想亦滅魏云七地菩薩轉滅聲聞緣覺心意意識至八地轉滅殆盡識陰都盡名不動地初地至七地所修觀行見於三界一切諸法唯是心意意識所現之量心即無心意即無意識即無識本離我我所執不見外法種種諸相彼於自心起妄想分別虗妄修習見有外法可得即墮外性種種相此外道愚夫二種取著以自心攝自心見有能取所取之法便謂一切斷滅一向無知墮於無想境界不覺無始虗僞習氣所熏斷滅種性即是過惡有攝所攝不離我我所是外道涅槃虗僞妄想至八地方滅盡也何也八地菩薩所得三昧與二乘涅槃大略相似然菩薩者於三昧中有正覺所持以諸佛力所加持故雖有三昧之樂而不耽著故不入於涅槃若無正覺所持者便以小乘自安不能滿足如來之地棄捨一切衆生不為說有為諸法漸次引入如來知見佛種則應斷是故諸佛如來於八地菩薩三昧不起咄云善男子當起度生汝所得三昧二乘亦得於是為示如來無緣之慈從妙覺海流出不可思議無量功德令其究竟滿足紹隆佛種故不入於涅槃若聲聞緣覺得三昧門樂為樂所牽得少為足不能回心向大度脫衆生是故於中作涅槃想由此言之七地以前入滅正受者二乘所共故當善為防範我所以分部七地當善巧方便修心意意識相遠離我我所執無能所取已得人無我智更進之得法無我不見自共相可得以二乘所證涅槃有自共相可得終屬生滅應善觀察而遠離之善解四無礙辨所謂義無礙法無礙詞無礙樂說無礙得決定力於三昧門而得自在念念滅正受無出入相至此純無相觀方能漸升八地乃至十地諸地次第相續入於三十七助道品菩提分法我所以分部諸法令善修之者恐諸菩薩不善了知自相共相不善七地以前修行次第墮於外道斷常邪徑故建立地地次第前地所生後地滅之至於金剛道後滅無所滅方證入不生不滅無餘涅槃也要而言之彼實無有若生若滅一切諸法唯心所現心本無心現本無現除自心現量原無生滅此唯有根本智者始能覺了至所謂地地次第相續及斷三界九品惑種種諸行凡以對治衆生之病此無智愚夫所不覺也所不覺者何也謂不覺我及諸佛建立諸法為令衆生證入不生不滅無餘涅槃說即無說相即無相乃謂我及諸佛說地次第相續相及說三界種種行相但於言說而生執著本無根本智謂如來一切法從言說妄想生此其所以為愚也僧問馬祖如何是修道祖曰道不屬修若言修得修成還壞即同聲聞若言不修即同凡夫又問作何見解即得達道祖曰自性本來具足但於善惡事中不滯喚作修道人取善捨惡觀空入定即屬造作更若向外馳求轉疏轉遠但盡三界心量一念妄心即是三界生死根本但無一念即除生死根本即得法王無上珍味無量劫來凡夫妄想諂曲邪僞我慢貢高合為一體故經云但以衆法合成此身起時唯法起滅時唯法滅此法起時不言我起滅時不言我滅前念後念中念念念不相待念念寂滅喚作海印三昧攝一切法如百千異流同歸大海都名海水住於一味即攝衆味住於大海即混衆流如人在大海中浴即用一切水所以聲聞悟迷凡夫迷悟聲聞不知聖心本無地位因果階級心量妄想修因證果住於空定八萬劫二萬劫雖即已悟悟已却迷諸菩薩觀如地獄苦沉空滯寂不見佛性若是上根衆生忽爾遇善知識指示言下領會更不歷於階級地位頓悟本性故經云凡夫有反覆心而聲聞無也馬祖如許葛藤却從坐禪學佛翻然而悟磨磚非鏡鞭車不行一明心要便語語踏殺天下人復次大慧聲聞緣覺第八菩薩地滅三昧門樂醉所醉不善自心現量自共相習氣所障墮人法無我法攝受見妄想涅槃想非寂滅智慧覺大慧菩薩者見滅三昧門樂本願哀愍大悲成就知分別十無盡句不妄想涅槃想彼已涅槃妄想不生故唐云以入涅槃不生果故離攝所攝妄想覺了自心現量一切諸法妄想不生不墮心意意識外性自性相計著妄想非佛法因不生隨智慧生得如來自覺地如人夢中方便度水未度而覺覺已思惟為正為邪非正非邪餘無始見聞覺識因想種種習氣種種形處隨有無想心意意識夢現大慧如是菩薩摩訶薩於第八菩薩地見妄想生魏云見分別心從初地轉進至第七地見一切法如幻等方便度攝所攝心妄想行已作佛法方便未得者令得大慧此是菩薩涅槃方便不壞唐云所得涅槃非壞滅也離心意意識得無生法忍大慧於第一義無次第相續說無所有妄想寂滅法唐云第一義中無有次第亦無相續遠離一切境界分別此則名為寂滅之法通曰上言自心現量其實無有若生若滅諸法從本來常自寂滅相若能覺此者所謂寂滅智慧覺也諸二乘人但得人空未得法空尚未能證入初地何況八地寂滅樂門佛說聲聞乘有二種此是先修菩薩行退墮聲聞位者還依本心修菩薩行即入第八地滅正受門樂為寂滅酒之所昏醉一味耽寂不善了達自心現量心外無法法外無心見有涅槃自相共相可得不知為無始識陰習氣所障墮人法無我見以人無我之法即涅槃法見有能證所證而攝取之此但以虗妄分別名為涅槃而不能知諸法本自寂靜本無生滅非有智慧覺也若八地菩薩雖見有寂滅三昧門樂而不耽著憶念度生本願哀愍一切智悲雙運思欲成就而具足之知分別修行十無盡句所謂衆生界無盡世界無盡虗空界無盡法界無盡涅槃界無盡佛出現無盡如來智無盡心所緣無盡佛智所入無盡轉法輪智無盡如實而知究竟滿足如來不可思議無量功德以是之故不妄想涅槃果而自取證不即入於涅槃彼已自性涅槃而虗妄分別得果之心不生故遠離能取所取妄想境界覺了諸法唯是自心現量是故不生一切分別之心內不墮於心意意識而分別法相外不計著有無諸法而分別事相以非是佛法正因故故妄想分別不生妄想寂滅本來不生即是佛法正因此非說情可到隨轉識成智慧用現前而得生起以此不生為因地心故能得入如來自證之地圓成果位真不生滅如人夢中度大海水起大方便欲度自身未度中間忽然便覺作是思惟此為是實為是虗妄便復思惟如是之相非實非虗非正非邪唯餘無始虗妄分別見聞覺知為因此因非佛法因故生於想見種種色形相顛倒不離有無二法良由心意意識多生熏習於夢中現覺已即無心意意識可得故八地菩薩不墮於心意意識者能轉識而成智智能辨識不為識所轉所以能見妄想分別心生此妄想心如夢中所見生死大海種種分別心也乃從初地轉進至於七地見一切修行之法皆如幻等但以方便度脫離諸能取所取妄想分別之心是有為功行如是行已更進之勤作佛法方便廣大功用為於未得上上佛法修行者令得如夢中設立船筏方便令未度者得度也菩薩以此方便得入涅槃是以修行勝法名為涅槃非一切壞滅之謂也既不壞涅槃方便遠離心意意識虗妄分別剎那無有生相剎那無有滅相得證入無生法忍此無生法忍於第一義而不動無功可施無行可修如夢既覺不復用方便功力也第一義中本無地地次第相續本無三界種種行相遠離一切境界分別我於第一義中說諸法無所有分別無所施是名妄想寂滅之法是真涅槃唯可與智者道豈愚夫所能知乎僧問芭蕉徹和尚有一人不捨生死不證涅槃師還提携也無徹云不提携僧云為甚麼不提携徹云老僧粗識好惡投子頌云百歲兒童出戶來滿身紅爛惹塵埃火中間步清涼地識者無因敢近擡此第一義中清涼寂滅之法不離火宅生死而證涅槃即涅槃亦不住著明乎此者庶知好惡矣爾時世尊欲重宣此義而說偈言心量無所有此住及佛地去來及現在三世諸佛說心量地第七無所有第八二地名為住佛地名最勝自覺智及淨此則是我地自在最勝處清淨妙莊嚴照耀如盛火光明悉遍至熾𦦨不壞目周輪化三有唐云摩醯最勝處色究竟莊嚴譬如大火聚光焰熾然法化現於三有悅意而清涼化現在三有或有先時化於彼演說乘皆是如來地十地則為初初則為八地第九則為七七亦復為八第二為第三第四為第五第三為第六無所有何次通曰此本大慧所問一切菩薩二乘滅正受次第相續世尊為分別諸地善修行法而示以第一義無次第相續此心量無所有寂滅法門唯住地菩薩及如來自覺地可與究竟乃三世諸佛所說不可思議無量功德之法也何以謂之住地耶第七地所修人法二無我智一切遠離名遠行地尚餘藏識心量未滅至第八地捨離藏識心量都滅名不動地方證法空一無所有此二均謂之住地得不退轉不名最勝也唯等妙覺證入佛地妙莊嚴海方名究竟果地更無勝於此者彼所得自覺聖智亦且遠離無能覺所覺至極清淨此則覺而無覺故名妙覺乃佛所自證之地也然如來法身不解說法惟法自流出報化佛身方解說法故佛於色究竟天最勝之處成等正覺示現清淨莊嚴之身光明照耀如盛火熾𦦨化現三有周悉遍至毒龍放光即損人目如來光明不損人目見者自得悅意而清涼也其所化現周輪三界而化衆生不住著於一處處處皆有佛也或有先時而化者以時未至未可即說一乘法於彼演說諸乘之法雖說三乘其實皆是一乘究竟歸於如來自覺地而已既以一乘為教法雖設立諸地而實無諸地次第相續之相故十可為初初可為八九可為七七亦可為八二可為三四可為五三可為六彼無所有中一切寂滅更何次第可得哉於第一義無次第相續此是去來今諸佛之所說也彼愚夫唯耽著滅正受以為涅槃其可與語此乎青原思禪師問六祖曰當何所務即不落階級祖曰汝曾作甚麼來思云聖諦亦不為祖曰落何階級思云聖諦尚不為何階級之有祖深器之令思首衆既乃命化一方偈曰心地含諸種普雨悉皆萌頓悟華情已菩提果自成投子頌云無見頂露雲攢急劫外靈枝不帶春那邊不坐空王殿爭肯耘苗向日輪丹霞頌云卓爾難將正眼窺逈超今古類何齊苔封古殿無人侍月鎖蒼梧鳳不棲僧問瑞岩作麼生商量即得不落階級岩云排不出曰為甚麼排不出岩曰他從前無階級曰未審居何位次岩曰不坐普光殿曰還理化也無岩曰名聞三界重何處不歸朝合二則細玩之所云不坐空王殿即不住著涅槃也然化佛說法化現三有又何處非如來之地乎必深明無階級次第然後可分化一方也魏云問如來常無常品第十唐云如來常無常品第五爾時大慧菩薩復白佛言世尊如來應供等正覺為常為無常佛告大慧如來應供等正覺非常非無常謂二俱有過若常者有作主過常者一切外道說作者無所作是故如來常非常非作常有過故若如來無常者有作無常過陰所相相無性陰壞則應斷而如來不斷大慧一切所作皆無常如瓶衣等一切皆無常過一切智衆具方便應無義以所作故一切所作皆應是如來無差別因性故是故大慧如來非常非無常魏云大慧若言一切皆無常者一切智一切智人一切功德亦應無常以同一切作法相故又復有過若言一切皆無常者諸佛如來應是作法而佛如來非是作法以無更說有勝因故通曰因上文只破外道七無常論至我法起非常非無常尚未詳示故大慧復有此問上言外道妄想者思想作行生非不作行亦言之未詳至此乃詳出其過常與無常二俱有過若如來是常者有能作過一切外道說微塵等為作者作者不生本無所作故以為常既有作者又計是常即是作常非真常也是故如來真常尚且無常相可得況作而為常者乎作而常者即不能常故說常者有過也若如來是無常者亦有所作過謂無常非自無常因作而后見其無常彼以五陰是所作者五陰能見之相及所見之相皆無自性畢竟斷滅是無常由作而成也是以五陰壞滅為無常也若五陰壞滅者諸佛如來亦應斷滅而諸佛如來非斷滅法常住不壞安所見其無常耶故說無常者亦有過也夫無常何以亦謂之作彼以生必有滅作必有壞一切作法皆是無常如瓶衣車屋等有作有壞畢竟無常若如是說者有無窮過所作既皆無常則如來一切智所作一切功德衆具萬行方便權巧有義存焉皆應無常總空無益以同所作法相故又復有過若一切皆無常者如來功行同於所作則世間一切所作諸法皆應是如來法更無差別相矣然而諸佛如來非是作法以有差別勝因性故外道必待作法而後顯其無常非勝因也如來不待作法而顯其真常是勝因也若無作法即無無常故謂外道無常亦是作也常與無常皆有作主過是故如來遠離彼過非常非無常也僧問長沙岑禪師曰本來人還成佛否沙曰你道大唐天子還割茅刈草麼投子頌云苔殿重重紫氣深星分辰位正乾坤金輪不御閻浮境豈共諸侯寶印尊彼有為正法智者所不屑況外道邪見乎復次大慧如來非如虗空常如虗空常者自覺聖智衆具無義過大慧譬如虗空非常非無常離常無常一異俱不俱常無常過故不可說是故如來非常復次大慧若如來無生常者如兔馬等角以無生常故方便無義以無生常過故如來非常復次大慧更有餘事知如來常所以者何謂無間所得智常故如來常大慧若如來出世若不出世法畢定住聲聞緣覺諸佛如來無間住不住虗空亦非愚夫之所覺知大慧如來所得智是般若所熏非心意意識彼諸陰界入處所熏大慧一切三有皆是不實妄想所生如來不從不實虗妄想生大慧以二法故有常無常非不二不二者寂靜一切法無二生相故是故如來應供等正覺非常非無常大慧乃至言說分別生則有常無常過分別覺滅者則離愚夫常無常見不寂靜慧者永離常無常非常無常熏通曰外道所謂常無常者以有作過如來非常非無常者以無作也然則無作寧不同於虗空乎如來非如虗空常也若如虗空者不待因成頑空無知而如來自覺聖智靈覺不昧衆具莊嚴不捨一法應無實義豈不有斷滅之過如來嘗言圓同太虗無缺無餘但以取譬實體湛然常寂遠離常無常一異俱不俱種種戲論悉墮常無常二見過故以自體真常實不可說乃以虗空取譬而如來非虗空常也故曰非常無作既不同於虗空毋乃以無生為常乎如來亦非無生常也若執著無生以為常者即如外道兔馬等角邪見畢竟不生執以為常然則如來所修萬行方便法門空無實義俱不必生以無生為常者有如是絶無之過而如來非無生常也故曰非常既非虗空又非無生然則何以見如來之常耶更有餘事知如來常即前復有餘無生賢聖所得法彼生無生者是則無生忍謂於生而證無生於一切無常法中而證真常之理彼離生法以為無生者則於生有間今惟不離生法而得無生之智不離無常而得真常之智是名無間之智也智無間斷豈不是常有此無間聖智故知如來是常也此無間聖智者自覺之境界前後智斷非去來今故不論有佛出世無佛出世此法畢竟無間而住唐云諸佛如來所證法性法住法位如來出世若不出世常住不易在於一切二乘外道所得法中非是空無然非凡愚之所能知夫聲聞緣覺皆有如來無間智性而不能知如來常者為不能離心意意識虗妄分別故輪轉三界不得真常耳若如來所得無間聖智乃是自性般若所熏何以謂之般若世間智慮不出心意意識所熏而般若非心意意識也世間智慮不出陰界入處所熏而般若非陰界入處也一切智慮所不能緣故謂之般若般若智無間故如來名為常也一切三有不出心意意識不實妄想所生故有生滅故不能常如來不從心意意識不實妄想所生是為如實是為真常唯一真實更無生滅此所謂寂靜一心也而常無常見何自而起乎以見有二法故或謂之常或謂之無常虗妄分別非真實不二之見也若見於不二者煩惱即是菩提生死即是涅槃本來寂靜不生一切法無二無別何從見其常而生一常相耶又何從見其無常而生一無常相耶是故如來一切寂靜非常非無常也不但作常無常見者妄計有無有支離之過但有言說分別心生此是常此是無常此是非常非無常即為意流即墮常無常過咎若一切分別覺滅者不分別妄亦不分別真真妄兩忘喧寂無二則遠離外道之過矣彼愚夫常無常見種種分別種種虗妄常在生滅縱有黠慧亦不寂靜良由平昔為常無常法所熏故也若滅此不寂靜慧者唯在永離彼常無常法勿令少住既不習近其說即非常無常所熏而為般若所熏也熏於般若智者是為無間智是為自覺聖智得盡分別不生分別既無分別即非常無常非常無常即是真常如是真常似虗空非虗空似無生非無生豈外道凡愚所可測乎慈明住石霜當解夏謂衆曰昨日作嬰孩今朝年已老未明三八九難踏古皇道手鑠黃河乾腳踢須彌倒浮生夢幻身人命夕難保天堂并地獄皆由心所造南山北嶺松北嶺南山草一雨潤無邊根苗壯枯槁五湖參學人但問虗空討死脫夏天衫生披冬月襖分明無事人特地生煩惱喝一喝下座若石霜斯語直於無常境界獨露真常可謂得無間智矣爾時世尊欲重宣此義而說偈言衆具無義者生常無常過若無分別覺永離常無常唐云遠離常無常而現常無常恆如是觀佛不生於惡見若常無常者所集皆無益為除分別覺不說常無常從其所立宗則有衆雜義等觀自心量言說不可得魏云所有立法者皆有諸過失若能見唯心彼不墮諸過通曰唐魏二譯皆有前四句謂如來遠離於常無常二法故現而為常非同外道之常也現而為無常非同外道之無常也故曰非常非無常若如是觀佛者則遠離諸過矣若外道惡見建立常無常論言常則衆具不生言無常則衆具同壞一切功德同歸斷滅皆生於常無常之過若如來弟子不於此二法生言說分別覺者即不為常無常所熏分別既無湛然寂靜永離常無常二邊惡見矣且彼常無常皆由於作從其所立宗則有衆多雜亂宗因譬喻種種多端自語相違無決定義彼唯不悟唯心所現但於外境自生分別故不能離於言說過耳若能等觀自心現量生死與涅槃無異相常與無常無異相但一寂靜更無分別即言說亦不可得況復建立常無常論而墮諸惡見乎吾固謂如來非常非無常也昔行昌問於六祖曰弟子常覽涅槃經未曉常無常義乞為解說祖曰無常者即佛性也有常者即一切善惡諸法分別心也曰和尚所說大違經文祖曰吾傳佛心印安敢違於佛經曰經說佛性是常和尚却言無常善惡諸法乃至菩提心皆是無常和尚却言常此即相違令學人轉加疑惑祖曰涅槃經吾聽尼無盡藏誦讀一遍便為講說無一字一義不合經文乃至為汝終無二說曰學人識量淺昧願和尚委曲開示祖曰汝知否佛性若常更說什麼善惡諸法乃至窮劫無有一人發菩提心者故吾說無常正是佛說真常之道也又一切諸法若無常者即物物皆有自性容受生死而真常性有不遍之處故吾說常者正是佛說真無常義佛比為凡夫外道執於邪常諸二乘人於常計無常共成八倒故於涅槃了義教中破彼偏見而顯說真常真樂真我真淨汝今背義以斷滅無常及確定死常而錯解佛之圓妙最後微言縱覽千遍有何所益行昌忽然大悟乃說偈曰因守無常心佛說有常性不知方便者猶春池拾礫我今不施功佛性而現前非師相授與我亦無所得祖曰汝今徹也宜名志徹禮謝而退此常無常甚深義却與此段經文相契魏云佛性品第十一唐云剎那品第六爾時大慧菩薩復白佛言世尊唯願世尊更為我說陰界入生滅彼無有我誰生誰滅愚夫者依於生滅不覺苦盡不識涅槃佛言善哉諦聽當為汝說大慧白佛言唯然受教佛告大慧如來之藏是善不善因能遍興造一切趣生譬如伎兒變現諸趣離我我所不覺彼故三緣和合方便而生外道不覺計著作者為無始虗僞惡習所熏名為識藏生無明住地與七識俱如海浪身長生不斷離無常過離於我論自性無垢畢竟清淨通曰大慧因世尊說一切三有皆是不實妄想所生由彼陰界入處所熏是陰界入實有生滅若五陰無主即無有我既無有我誰生誰滅三界愚夫常在生滅之中與生滅相依不見生死苦盡是故不知涅槃之相故願世尊為說生滅因生滅識不生滅也佛言陰界入實無有我以如來藏為一切衆生根本故是世間善不善因能遍興造六道生死形色實不與六道作生死因緣譬如伎兒變現諸趣諸趣種種相狀不同其中無我無欣無厭故如來藏性變起一切本離我我所而外道不知不覺故謂陰界入從根塵識三緣和合而生是故三界生死因緣不斷諸外道等不能如實見如來藏於彼因緣和合生法執為作者計著冥初生起二十五諦要歸於神我此神我者虗僞不實終從變滅而外道為無始惡習所熏計著不捨遺失真常墮無常之過此如來藏性本無生滅為有無始熏習與生滅和合故名為識藏是第八識含藏善不善因即為生滅種子名為無明住地與第七識俱善法為淨不善法為染染淨二者皆是無明皆以七識為依七識細分內依於八識故八識為無明住地八識本無生滅以與七識俱故如海浪身八識如海七識如浪海本湛然浪有生滅其體相續流注長見其生未嘗斷絶故三界善不善法有無相傾皆由如來藏一念無明變起而陰界入實無自性也若能覺知無我我所遠離外道無常斷滅之見亦離於所執神我有常之論如風恬浪靜大海圓澄如來藏自性本自無垢不但無濁邊垢亦且無清邊垢無垢即無無明而善不善業何自而起三界生死何從而出畢竟清淨畢竟常住是為涅槃之真相也大梅上堂云汝等諸人各自回心達本莫逐其末但得其本其末自至若欲識本唯了自心此心元是一切世間出世間法根本故心生種種法生心滅種種法滅心且不附一切善惡而生萬法本自如如又魯祖問南泉摩尼珠人不識如來藏裏親收得如何是藏泉云王老師與汝往來者是祖曰不往來者泉云亦是藏祖曰如何是珠泉召云師祖祖應諾泉云去汝不會我語天童頌云別是非名得喪應之心指諸掌往來不往來只這俱是藏輪王賞之有功黃帝得之罔象轉樞機能伎倆明眼衲僧無鹵莽佛果云盡大地是如來藏向甚麼處著珠盡大地是摩尼珠喚甚麼作藏雪竇別云嶮百丈竿頭作伎倆不是好手這裏作得箇眼賓主互換便能深入虎穴或不恁麼縱饒師祖悟去也是龍頭蛇尾然則如來藏性非具上眼上智者不達何怪乎外道其餘諸識有生有滅意意識等念念有七因不實妄想取諸境界種種形處計著名相不覺自心所現色相不覺苦樂不至解脫名相諸纏貪生生貪若因若攀緣彼諸受根滅次第不生餘自心妄想不知苦樂入滅受想正受第四禪善真諦解脫修行者作解脫想不離不轉名如來藏識藏七識流轉不滅唐云或復善入諸諦解脫便妄生於得解脫想而實未捨未轉如來藏中識藏之名魏云如來藏識不在阿黎耶識中是故七種識有生有滅如來藏識不生不滅所以者何彼因攀緣諸識生故非聲聞緣覺修行境界不覺無我自共相攝受生陰界入見如來藏五法自性人法無我則滅地次第相續轉進餘外道見不能傾動是名住菩薩不動地得十三昧道門樂三昧覺所持觀察不思議佛法自願不受三昧門樂及實際唐云為三昧力諸佛所持觀察不思議佛法及本願力不住實際及三昧樂向自覺聖趣不共一切聲聞緣覺及諸外道所修行道得十賢聖種性道及身智意生離三昧行是故大慧菩薩摩訶薩欲求勝進者當淨如來藏及識藏名通曰上言自性無垢畢竟清淨即是如來藏識本無生滅其餘諸識則有生滅謂意與意識等七識念念生滅新新不住然彼七識所以生滅者以不實妄想為因外取境界種種形色為緣和合而生諸識計著名相以為實有不知此境界色等諸法唯是自心之所顯現以不了故貪著名相逆順境界生憎愛心起苦樂受不得解脫為彼於種種名相更相纏縛既從貪生復生於貪種子熏起現行名貪生現行復熏種子名生貪七識輪轉生滅不停一切愚夫依於生滅不知苦盡不識涅槃良以此也若妄想為因所謂七識者滅若境界為緣所謂第六識者滅則彼諸取境根所謂前五識者滅念念停息不相續生但餘自心慧能分別苦樂不生苦樂受者或離苦或離樂或苦樂俱捨以厭苦趣寂或入少想定證滅盡定或入三摩跋提正受至第四禪得寂滅樂或復善修四諦出於三界得真諦解脫證偏空理如二乘所證諸修行者便各自謂涅槃妄生於得解脫想此但灰滅六識得離前境解脫未得一切處解脫其實未離乎識未轉乎識但名為如來藏中之識藏耳所謂在纏如來藏也出纏如來藏即無生滅在纏如來藏猶有生滅謂之八識八識未轉種子習氣尚在故七識流轉不滅所以者何七識所以流轉不滅者因彼八識及六識攀緣依之而得生故藏識未捨生滅猶存中間微細之惑豈易究盡然非一切外道二乘諸修行者所知境界以彼唯了人無我執不了法無我執於陰界處取於自相及共相故攝受自共相者謂有涅槃可證及有證涅槃者不離能所取即以離陰界入即為識陰所覆安能知識藏中有我之過哉若能轉乎識藏而見如來藏真不生滅性則所謂五法者已離名相妄想而證於正智如如所謂三自性者已離妄想緣起而證於圓成實性所謂二無我者不但得人無我且得法無我向所云七識流轉者當下隨滅以五法等皆依藏識而立故今識轉而得法無我進於八地由前悟入得預初地地地轉進一切外道惡見不能傾動至此生滅既滅對治亦亡無功可用是名菩薩住不動地住此地已即得十種三昧門樂所謂離著虗空不染三昧有一百八名離著虗空亦自離著為三昧力諸佛所持觀察不可思議佛法無量功德及本願力悲愍衆生所以不受三昧之樂雖證涅槃而不住於實際回空向假回智向悲趣向自覺聖智究竟之果不共一切二乘外道取證涅槃更不前進所修行路得三賢十聖菩薩種性入於如來意生身智身如十百明門能以一身化百類身往百佛國教化衆生地地增進故能離三昧樂而不取著也若耽著三昧有法可極樂識中便不清淨不得名為如來藏唯菩薩住不動地離三昧行不動地前才捨藏以捨此藏識染污之名即是如來清淨之藏諸菩薩欲求勝進滿足如來地者當淨如來藏中藏識之名此一如來藏也能遍現諸趣故有陰界入凡夫輪轉七識則為不善因二乘能滅七識則為善因菩薩能轉八識則善不善因俱滅吾固謂自性無垢畢竟清淨何生滅之有馬祖云一切衆生從無量劫來不出法性三昧長在法性三昧中著衣喫飯言談秪對六根運用一切施為盡是法性不解返源隨名逐相迷情妄起造種種業若能一念返照全體聖心汝等諸人各達自心莫記吾語縱饒說得河沙道理其心亦不增縱說不得其心亦不減說得亦是汝心說不得亦是汝心乃至分身放光現十八變不如還我死灰來淋過死灰無力喻聲聞妄修因證果未淋過死灰有力喻菩薩道業純熟諸惡不染若說如來權教三藏河沙劫說不盡猶如鈎鎖亦不斷絶若悟聖心總無餘事久立珍重馬祖深入楞伽境界此段葛藤一一與經文相契所謂傳佛心印信不虗也大慧若無識藏名如來藏者則無生滅大慧然諸凡聖悉有生滅修行者自覺聖智現法樂住不捨方便大慧此如來藏識藏一切聲聞緣覺心想所見雖自性清淨客塵所覆故猶見不淨非諸如來大慧如來者現前境界猶如掌中視阿摩勒果此果似胡桃大慧我於此義以神力建立令勝鬘夫人及利智滿足諸菩薩等宣揚演說如來藏及識藏名七識俱生聲聞計著見人法無我唐云令識聲聞見法無我故勝鬘夫人承佛威神唯佛及餘利智依義菩薩智慧境界是故汝及餘菩薩摩訶薩於如來藏識藏當勤修學莫但聞覺作知足想唐云我為勝鬘夫人及餘深妙淨智菩薩說如來藏名識藏與七識俱起令諸聲聞見法無我大慧為勝鬘夫人說佛境界非是外道二乘境界大慧此如來藏藏識是佛境界與汝等比淨智菩薩隨順義者所行之處非是一切執著文字外道二乘之所行處通曰承上言當淨如來藏及識藏名若能轉識成智即不名識藏而名如來藏矣識藏依生滅有分別如來藏依不生滅無分別純是智體故無生滅然一切凡夫及諸聖人依彼識藏故悉有生滅凡夫不知修行有生有滅無足怪已謂之曰聖所謂修行者何以亦有生滅耶以依阿賴耶識故入自內身得自覺聖智現法樂住而不捨於勇猛精進方便有修有證即有生有滅此如來藏中之識藏也論如來藏本自清淨本離心想一切聲聞緣覺以心想憶度起見謂有涅槃可證雖如來藏自性清淨以此客塵之見覆之猶見不淨心想所見有去來名之曰客有動搖名之曰塵此識藏微細客塵障於本體即為不淨但見不淨不見本來清淨即不能分別真如即不能現證真如非諸如來境界也若如來者於如來藏性分明現見大用現前如觀掌中菴摩勒果菩薩觀佛性尚且如隔縠見月唯如來寂滅現前如觀掌果方為究竟清淨豈二乘心想所可及乎是故佛於此如來藏第一義以神力建立不可思議境界為勝鬘夫人及餘深妙淨智菩薩宣揚演說如來藏及識藏名與七識俱生令諸聲聞已離人我計著法我者於此捨離藏識見法無我而證於清淨如來藏也勝鬘夫人即波斯匿王女為踰闍王夫人勝鬘經中說二種如來藏一空如來藏脫離一切煩惱二不空如來藏具過恆沙不思議佛法佛為勝鬘夫人說此二種如來藏非勝鬘夫人不能承佛威神說於如來不思議境界此非外道二乘境界外道所執神我墮在七識二乘所證偏空未離八識但見識藏不見如來藏此二種空不空如來藏即是識藏識藏即是如來藏是佛境界唯佛與餘上根利智菩薩隨順於義不依文字智慧現前能了分別此二種法諸餘外道二乘無智慧者執著文字不能了知如此二法是故汝等菩薩於如來藏識當勤觀察真見現前與佛無二不可以聞知覺了便作止足之想也欲識涅槃真相必至是而極乎百丈云寶積經云法身不可以見聞覺知求非肉眼所見以無色故非天眼所見以無妄故非慧眼所見以離相故非法眼所見以離諸行故非佛眼所見以離諸識故若不作如是見是名佛見同色非形色名真色同空非大虗名真空色空亦是藥病相治語法界觀云不可言即色不即色亦不可言即空不即空眼耳鼻舌身意不納一切有無諸法名轉入第七地七地菩薩不退向上三地菩薩心地明白易染說火即燒從色界向上布施是病慳貪是藥從色界向下慳貪是病布施是藥有作戒者割斷世間法但不身手作無過名無作戒亦云無表戒亦云無漏戒但有舉心動念盡名破戒秪如今但不被一切有無諸境惑亂亦不依住不惑亂亦無不依住知解是名遍學是名勤讚念是名廣流布未悟未解時名母悟了名子亦無無悟解知解是名母子俱喪妙哉至論可為此篇利智菩薩勤學如來藏之法式也爾時世尊欲重宣此義而說偈言甚深如來藏而與七識俱二種攝受生智者則遠離如鏡像現心無始習所熏如實觀察者諸事悉無事如愚見指月觀指不觀月計著名字者不見我真實心為工伎兒意如和伎者五識為伴侶妄想觀伎衆通曰本一如來藏而曰甚深如來藏者謂空如來藏離於生滅人所易知不空如來藏不捨方便示現生滅與七識俱生人所難測故曰甚深也唯其與七識俱凡愚不了染淨諸緣依之而立見有能取所取二種攝受即歸生滅智者了達染淨俱非心境俱亡而能取所取之相當下遠離空即不定不空即空悟入甚深如來藏故名為智也所云遠離者豈離境以求心哉三界諸法唯心所現如種種形像現於鏡中非有非無以無始染淨二習之所熏故但如其像耳於鏡了無干涉若能真實觀察甚深如來藏者求於去來迷悟生死了不可得種種諸事悉本無事種種諸相悉本無相無始習氣其實非有故能遠離於攝受也此甚深如來藏即事而無事即像而無像當依於義莫依名字名字者如標月指愚人見指指月但觀其指不觀其月計著名字不見真實者亦猶是也如實觀察者即以如實之智觀察如實之體不著語言文字故能見於真實之義見真實義者遠離心意意識已轉識而成智故見智為真實識為處假也以觀其心則隨緣現變如工伎兒以觀其意則傳送出入如和伎者以觀五識則攬境逐塵與識俱起有如伴侶以觀六識則妄想分別執為實有如觀伎衆一切如幻本來不有若計著心意意識名字者即攝受幻境不見於如來藏真實義矣王文公觀俳優偈曰諸優戲場中一貴復一賤心知本自同所以無欣怨若此偈亦可謂如實觀察者五祖演禪師示衆云山僧昨日入城見一棚傀儡不免近前看或見端嚴奇特或見醜陋不堪動轉行坐青黃赤白一一見了子細看時元來青布幔裏有人山僧忍俊不禁乃問長史高姓他道老和尚看便休問甚麼姓山僧被他一句直得無言可對無理可伸還有人為山僧道得麼昨日那裡落節今日這裏拔本若明得拔本消息即能遠離攝受而見如來藏性矣
