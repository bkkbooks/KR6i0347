front:
  text: 楞伽宗通緣起余甲申自長洲歸暫憩嘉禾遘達觀密藏二衲若夙契云日從咨詢禪悅遊意乎方之外一夕夢履兜羅綿界覩慈尊容貌甚偉肅躬伏謁欽承教語語曰分別是識無分別是智旦起問二衲此語當出何經僉曰似楞伽語遽取楞伽遍索之弗得逮丁酉鄉衲度門入京師快説楞伽三譯津津不倦曰安所得覺範筆一論著之耶時大行王道安於諸內典靡不精詣余謂非道安莫成此論已道安請告歸里聞憨山清公入道出螺川敬拜以屬之憨山寓雷陽不三載而筆記出矣余於憨山稱莫逆自癸巳造訪牢山後音問寥寥得筆記讀之不啻面潭始讀之灑然再讀之則疑三讀之則有所更定不覺盈紙復取三譯核之宋譯雋永有餘味故不可易至棘句倒語非證之魏唐二譯則不可曉筆記節分條列燦如指掌令讀者易於參訂余亟取之更為斟酌舊注融會三譯間出胸臆或前人所未道要於申暢簡奧不使有楞伽難讀之嘆而已昔初祖語二祖曰此楞伽四卷可以印心不數傳後當為名相之學嗟乎千載而下求其能明名相者亦罕矣況印心乎哉竊計宗門證入自覺境界一期垂語未必不與楞伽符乃謬取尊宿機緣綴附章末與其以經明經之為通也毋寧以宗明經之為通也以經明經僅以意為分別以宗明經似當分別於無分別者分別則説通無分別則宗通宗通則心一經也經一心也庶幾無違於初祖印心之義而此四卷佛語心品其指歸端不外是何意慈尊以夢詔之垂二十年而余始以夢成之豈亦事有前定而幾先見之耶且魏唐二譯多前勸請品及末偈品陀羅尼品余所夢無分別是智語實在倡品中因并録之無敢忘慈尊所以詔余之意若夫智證無分別則茫乎未有入也然偈品中授記龍拊已得初地於此經典大有闡明竟能生於淨土是則傳祖衣者當持此經歷階級者當持此經而求生淨土者尤不可不篤信此經也敬述其顛末以付剞劂俾明眼者觀之咄云何更夢中説夢是所望於同參南嶽山長金簡曾鳳儀舜徵父書楞伽宗通題辭廬陵劉日升扶生父書曾舜徵父懸儀部大夫之車歸臥衡陽杜門却掃一切無關惟孳孳竺乾教指尊宿機緣廣翻恣搜博參密證垂二十年鉛槧之勤幾無虗日所嗜在茲不知其為憊也所著楞嚴金剛宗通業盛行於時至是復輯楞伽宗通成余卒業於古取材宋魏唐三譯於今折衷筆記而通以宗夫宗於經二乎哉經盛於西而明星悟道拈華破顏受授皆宗宗盛於東而東度壁觀門風險峻獨付二祖是經謂可印心故知明宗明經非一非二惟是義學封執滯礙一切紛然取舍遂令經晦離析名相甚至禪講兩家枘鑿水火分門交擊惟不通宗之故若夫狂解後生抵掌禪悅頽波倒瀾一唱百和不可收拾又使憂時君子計無復之宗通謂何而非宗之過也故非上根異智夙障氷解攀緣盡淨謬稱禪那祗令傷教無有是處嗟乎宗之難言久矣余性懶于諸內典不能槩讀譯取可常誦數種間有解領謬謂會心唯嘆楞伽詞旨簡奧每讀中輟以為業重固然此生已矣一獲舜徵所輯倒語棘句始有分疏綱提領挈粗嫺義趣佐以群宗古德單提諸則參稽合印是經佛語心自覺聖智真燦然指掌夫剗削文字説法熾然迷者相誹知者皆為導師舜徵所輯富矣余視之等於壁觀舜徵以為何如余方欲是編流通激揚大事而光祿孫君懋誠捐如干金梓行長干嘉其嗜善勇助次是語授之俾質於諸方高流強學君子
