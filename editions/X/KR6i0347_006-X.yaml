body:
  text: 一切佛語心品第三之餘大慧復白佛言如世尊所說以彼彼妄想妄想彼彼性非有彼自性但妄想自性耳唐云如世尊說由種種心分別諸法非諸法有自性但妄計耳世尊若但妄想自性非性自性相待者非為世尊如是說煩惱清淨無性過耶一切法妄想自性非性故魏云世尊若唯自心分別非彼法相者如世尊說一切諸法應無染淨何以故如來說言一切諸法妄分別見無實體故佛告大慧如是如是如汝所說大慧非如愚夫性自性妄想真實此妄想自性非有性自性相然唐云一切凡愚分別諸法而諸法性非如是有此但妄執無有性相大慧如聖知有性自性聖知聖見聖慧眼如是性自性知通曰大慧前問不實妄想相世尊答以種種義種種不實妄想計著妄想生是種種妄想分別種種諸法本無實性但虗妄分別耳若但妄想自性非有彼法自性相待而起者則諸法絕無自性矣豈不是世尊說煩惱染習與清淨涅槃總皆無性耶若染淨悉壞將無墮斷滅諸法過耶何以故以世尊說一切法但是妄想分別無實體故一切法無實體豈不成斷滅耶不知一切法無實體乃所以為真如實際也故佛以大慧所說諸法無自性為是非如凡夫虗妄分別諸法體相以為實有而彼諸法實未甞有也此但妄想執著自性非有彼法自性相可得性相俱無即無實體此凡夫之所執為真實者非真實也汝之言誠然也然凡夫有分別總歸於虗而聖智無分別乃可言實未可以諸法無性而并疑清淨涅槃無性也故聖智知一切諸法有性自性者非如凡夫妄想知見乃依聖人知依聖人見依聖慧眼見其有而不有不有而有如實知諸法自體相如是性自性知豈有斷滅之過哉論云由彼彼遍計遍計種種物此遍計所執自性無所有依他起自性分別緣所生圓成實於彼常遠離前性前愚夫性自性即遍計依他二自性屬妄想分別不可有也後聖智性自性即圓成實性遠離前二性者未甞無也前云妄想無性此乃聖智之所以為性也昔佛在時有弟兄三人聞毗耶離國有婬女曰菴羅婆利又舍衛國有婬女曰須曼那又王舍城有婬女曰優鉢羅槃那皆有美色晝夜念之便夢與之從事覺已念曰彼女不來我亦不往而婬事不辨因是而悟一切諸法皆如是耶於是頓證唯心若此三人者能明妄想無性即證唯心可不謂具聖智眼乎大慧白佛言若使如聖以聖知聖見聖慧眼非天眼非肉眼性自性如是如非如愚夫妄想世尊云何愚夫離是妄想不覺聖性事故世尊彼亦非顛倒非不顛倒所以者何謂不覺聖事性自性故不見離有無相故世尊聖亦不如是見如事妄想不以自相境界為境界故世尊彼亦性自性相妄想自性如是現不說因無因故謂墮性相見故唐云聖亦不如凡所分別如是得故非自所行境界相故彼亦見有諸法性相如妄執性而顯現故不說有因及無因故墮於諸法性相見故異境界非如彼等如是無窮過世尊不覺性自性相故魏云餘人見境不如是見如是說者有無窮過何以故以不覺知所有法相無自體相故通曰大慧因佛說聖智有性自性如是性自性知以聖知聖見聖慧眼而知非如天眼肉眼凡夫妄想分別而知是妄想卜度不足以見性明矣云何愚夫得離是妄想耶唯如實覺知聖人境界轉虗妄識故能遠離前塵妄想分別以不覺了聖性事故即不離妄想不離妄想即不能如是性自性知據彼凡夫能分別種種法非顛倒見也然不能離種種分別非不顛倒見也何以故以不能見聖人境界如實法故聖人所見法遠離有無相故曷言乎聖人境界遠離有無相也聖人亦有分別但不如凡夫所分別如事妄想想不離事即著於相著相者凡夫境界也不著相者自所行境界也故聖人不以自相境界為凡夫境界而自心見境界相唯一無相也無相之體即是法體彼諸聖人亦見有法體性自性相於中分別法相亦如凡夫妄想自性如是顯現但不說有因而謂之有亦不說無因而謂之無所以不說有無者謂說有說無即墮諸法性相見故唯不墮於相見乃自相境界故非凡夫所及其餘凡夫境界異此境界不如是見或見以為有因而墮於有或見以為無因而墮於無如是說者有無窮過何以故以不覺性自性相故性自性無自體相故何得以有無妄分別耶此聖智境界非凡夫妄想所測也洞山問僧世間甚麼物最苦僧云地獄最苦山云不然向此衣線下不明大事始是苦丹霞頌曰鑊湯爐炭幾多般地獄三毒未苦酸須信新豐親切語袈裟之下莫顢頇此可知不覺聖性事者有無窮過世尊亦非妄想自性因性自性相魏云非因分別有法體相彼云何妄想非妄想如實知妄想世尊妄想異自性相異世尊不相似因妄想自性相彼云何各各不妄想而愚夫不如實知唐云諸法性相不因分別云何而言以分別故而有諸法諸法相異妄想相異云何諸法而由分別復以何故凡愚分別不如是實有然為眾生離妄想故說如妄想相不如實有世尊何故遮眾生有無有見事自性計著聖智所行境界計著墮有見說空法非性而說聖智自性事唐云令眾生捨分別說如分別所見法相無如是法何故令眾生離有無見所執著法而復執著聖智境界墮於有見何以故不說寂靜空無之法而說聖智自性事故通曰上言妄想分別不能知性自性相亦以妄想自性非性自性之因故不能得性自性之相是不因分別有法體相其理甚明然聖人見有法體亦如凡夫妄想如是現云何以妄想分別而能分別非分別者非分別者乃法體實相也真如實際理地如是知如是分別見有諸法性相可得似未離乎妄想也然諸法相異妄想相異本不相似妄想有分別諸法無分別不相似即不相為因云何諸法由妄想分別而有以彼彼分別法體相異因有妄想自性相何得謂聖智各各不分別耶既聖智以各各分別得如實知云何凡夫各各分別而不如實知有性自性乎在聖智分別即知有在凡愚分別即不如是實有豈妄想自性有異耶然世尊欲令眾生捨妄想故作如是說如妄執性而顯現謂之曰如似妄想非妄想不如實有即不可謂之有不可謂之無也是世尊令諸眾生離有無見於事自性相不許計著何故又說性自性如是知於聖智所行境界計著寧不墮於有見乎所云墮於有見者非同凡夫執著事相之有也謂世尊說寂靜空無之法無有自性即不應有空相可得而今說聖知聖見聖慧眼如是性自性知即是聖智自性事亦有事相可得有可得者即謂之相著於相者即謂之有故謂世尊墮有見為墮性相見也大慧此疑亦具向上手眼不容輕覷修山主垂語云具足凡夫法凡夫不知具足聖人法聖人不會聖人若會即同凡夫凡夫若知即是聖人天童拈云収得安南又憂塞北到這裏十成底事一時颺却始得穩坐地還端的麼一等平懷泯然自盡又裴休作圓覺經序云終日圓覺而未甞圓覺者凡夫也具足圓覺而住持圓覺者如來也徑山寶印禪師倒其語曰具足圓覺住持圓覺者凡夫也終日圓覺未甞圓覺者如來也合二則觀之可知先後所見略同佛告大慧非我說空法非性亦不墮有見說聖智自性事然為令眾生離恐怖句故眾生無始以來計著性自性相聖智事自性計著相見說空法大慧我不說自性相大慧但我住自得如實空法離亂相見離自心現性非性見得三解脫如實印所印於性自性得緣自覺觀察住離有無事見相通曰大慧所疑非謂世尊墮有無見如凡夫二乘所見第謂世尊說有空法即墮於空說聖智自性事即墮於相故謂為有也其疑甚微故世尊謂非我說空法無性而墮於空見亦非我說聖智自性事而著於有見然所以說聖智自性事是實有者為令眾生離恐怖句故眾生聞空生怖恐成斷滅欲使之捨妄想之假歸自性之真故說聖智自性事是權也非實也所以說空法者為眾生無始以來計著性自性相有法體可得計著聖智自性事相有自行境界可得總之不離乎見故說所見法相無如是法令其捨頑空而歸之真空亦權也非實也然我所說性自性如是知了無性自性相可得所云聖知聖見聖慧眼唯不著於相方謂之聖我固未甞說性自性相也然我不說性自性相不說言法體有無但於言說辨法體也我說自身如實證法唯是自得如實空法空法而謂之如實空而不空是謂真空如來常住於中自性本空了無一法可得此但可以自悟自得而不可以妄想分別者以聞我法修行寂靜得真如無相境界遠離凡夫惑亂妄想相見亦離二乘自心現性非性見曰性非性者見外法有已還無皆自心所現虗妄邪見能遠離之得空無相無願三大解脫法門非頑空比也乃真如實際心印所印善印諸法心心不異於性自性真如法體得緣自覺觀察住自性自覺自觀自住以自性緣自性如是而知不由妄想分別也由轉第六識為玅觀察智即分別非分別即離惑亂妄想而不墮於有事見相矣即離性非性邪見而不墮於無事見相矣若有若無有是二悉皆離本自寂滅本自無事是之謂如實空法為自覺之境界又何相見之有我不說性自性相者以此障蔽魔王領諸眷屬一千年隨金剛齊菩薩覓起處不得忽一日得見乃問曰汝當依何而住我一千年覓汝起處不得齊曰我不依有住而住不依無住而住如是而住故知金剛齊菩薩如是而住魔王覓起處不得則知世尊住自得如實空法了無性自性相境界矣復次大慧一切法不生者菩薩摩訶薩不應立是宗所以者何謂宗一切性非性故及彼因生相故說一切法不生宗彼宗則壞彼宗一切法不生彼宗壞者以宗有待而生故通曰上言但我住自得如實空法謂妄想與聖智俱空真妄俱遣本自無生非一切法不生之謂也一切法不生者對萬法而顯其不生是有對待是外道邪見世尊恐其相混故詳破之謂一切法不生此言雖似於無生之說內教弟子不應以是為宗其故何也彼外道宗一切性非性以為不生是有已還無就滅處見其不生也及彼別有異因能生諸法謂是作者就生處見其不生也作者如前指士夫微塵等作者原屬所生非能生者以不能生者為生因已是邪見況有生相可得胡乃謂一切法不生耶故以一切法不生為宗者彼宗則壞何謂之壞謂彼自壞不生之義故彼宗一切性非性以諸法滅盡而謂之不生也彼宗作者為因以作者不生而謂之不生也滅然後見不生是不生待滅而後生也因作者而後見不生是不生待作者而後生也有待而生明是生義不生之義不成故謂彼宗一切法不生彼宗則壞也僧問泐潭會禪師自知生處否師云未曾死何用論生知生即是無生法無離生法有無生祖師曰當生即不生曰不見性人亦得如此否師云自不見性不是無性何以故見即是性無性不能見識即是性故名識性了即是性喚作了性能生萬法喚作法性亦名法身馬鳴云所言法者謂眾生心若心生故一切法生若心無生法無從生亦無名字若如此不生立宗者即不可壞又彼宗不生入一切法故不壞相不生故立一切法不生宗者彼說則壞大慧有無不生宗彼宗入一切性有無相不可得大慧若使彼宗不生一切性不生而立宗如是彼宗壞以有無性相不生故不應立宗五分論多過故展轉因異相故及為作故不應立宗分謂一切法不生如是一切法空如是一切法無自性不應立宗唐云又彼宗即入一切法中不生相亦不生故又彼宗諸分而成故又彼宗有無法皆不生此宗即入一切法中有無相亦不生故是故一切法不生此宗自壞不應如是立諸分多過故展轉因異相故如不生一切法空無自性亦如是通曰承上文言彼宗有待而生不生之義不成其宗壞矣又彼以不生之宗入於一切法中謂一切法皆悉不生然一切法有可壞相者有不可壞相者可壞相者說名不生其說猶可不壞相者說為不生其可通乎如無始流注是滅不得者彼亦滅之是於不生不滅正法亦以為不生也彼宗由諸分而成所立一切法不生以三法五法彼彼因不同故生相宛然言自相違其說自壞彼說有無不生宗謂生相不生一切有法不可得也不生相亦不生一切無法不可得也非但於相上見其不生彼宗入於一切法性之中謂有無之性不可得故如是說者不徒斷滅其相且斷滅其性矣若使彼宗所謂不生者以一切性不生而立宗有無俱不可得彼將依何處而立宗耶如是則彼宗壞以有無性相俱不生故所以不應如是立宗也又彼立一切法不生宗者依諸分而成有五分論一宗二因三喻四合五結其中多有相違之過宗有九過因有十四過同喻有五過異喻有五過共有三十三過詳具因明入正理論大都展轉相因建立許多生法所云作有為無常因不轉喻不齊異相顯然故不生之說壞其說既壞故不應立宗分如一切法不生既不可立宗則謂一切法空義亦如是謂一切法無自性義亦如是俱不應立宗也前云自共性相不可得故說一切法不生何故於此說一切法不生不應立宗前云一切諸法離作者及因是故不生是佛說一切法不生離作者及因是真不生也外道說一切法不生不離作者及因猶屬生滅邊事故不應立宗彼惟對一切法說空說不生說無自性對生滅而顯不生滅但戲論耳文殊問菴提遮女曰生以何為義女曰生以不生生為生義殊曰如何是生以不生生為生義女曰若能明知地水火風四緣未甞自得有所和合而能隨其所宜是為生義殊曰死以何為義女曰死以不死死為死義殊曰如何是死以不死死為死義女曰若能明知地水火風四緣未嘗自得有所離散而能隨其所宜是為死義菴提遮女問文殊曰明知生是不生之理為甚麼却被生之所流轉殊曰其力未充夫明知不生之理尚且不免流轉況彼非得真不生義何得妄自立宗哉大慧然菩薩摩訶薩說一切法如幻夢現不現相故及見覺過故當說一切法如幻夢性除為愚夫離恐怖句故大慧愚夫墮有無見莫令彼恐怖遠離摩訶衍魏云以凡夫聞如幻如夢生驚怖故遠離大乘通曰一切法不生不應立宗為墮無見非大乘法也然大乘菩薩說一切法如幻如夢彼幻夢雖現起種種事其實未甞現也而眾生見覺執為實有一切皆是惑亂相迷惑見智是愚癡之過也故菩薩當說一切法如幻夢性幻夢性即是真性以為有未甞有也以為無未嘗無也有而不有無而不無即是中道諦即是大乘法凡夫墮有無見聞說如幻如夢即生恐怖恐墮於空為令愚夫離恐怖句故權說聖智自性事性自性如是知令彼知趣大乘不墮有無等見其實性自性相了不可得本自無生非一切法不生之謂也故外道說一切法不生必斷滅一切法而後謂之不生也是屬斷見菩薩說一切法如幻夢即一切法生而見其不生也是為正宗若疑性自性不離乎有而一切空之寧不墮外道邪見乎所以佛辨之詳也僧問利山和尚不歷僧祇獲法身請師直指師曰子承父業曰如何領會師曰貶剝不施曰恁麼則大眾有賴去也師曰大眾且置作麼生是法身僧無對師曰汝問我與汝道僧問如何是法身師曰空華陽𦦨且道利山說空華陽𦦨是法身不是法身於此處理會透脫方可與利山相見爾時世尊欲重宣此義而說偈言無自性無說無事無相續彼愚夫妄想如死屍惡覺一切法不生非彼外道宗至竟無所生性緣所成就唐云以彼所有生非緣所成故一切法不生慧者不作想彼宗因生故覺者悉除滅通曰一切法不生者即是一切法無自性即是一切法空惟無自性即無可言說惟空即無有事相無說無事即無計著相續及阿賴耶識無依處也彼愚夫於此妄想分別說一切法不生即無始流注亦說斷滅是為惡覺如死屍然彼死者不生是斷滅相以此立一切法不生非為慧者故我說一切法不生不應立宗彼外道以是為宗誠非也彼謂諸法畢竟不生凡所有生法非因緣所能成就竟無所生竟無成就如是一切法不生惟彼惡覺外道作是妄想分別在慧者不應作如是想建立如是法也彼宗因生故謂有異因為作者以作者不生能為生因既有生相即非不生之旨因相不同其說不成是故彼所建立一切法不生乃是惡覺作此覺者一切悉歸於除滅將至斷佛種性故名為惡覺也昔臥輪有偈云臥輪有伎倆能斷百思想對境心不起菩薩日日長六祖聞之謂此偈未明心地若依而行之是加係縛因示一偈曰慧能沒伎倆不斷百思想對境心數起菩提作麼長此可知邪正之辨矣天童拈云葵華向日柳絮隨風更須另具一雙眼始得譬如瞖目視妄見垂髮相計著性亦然愚夫邪妄想施設於三有無有事自性施設事自性思惟起妄想相事設言教意亂極震掉佛子能超出遠離諸妄想唐云三有唯假名無有實法體由此假施設分別妄計度假名諸事相動亂於心識佛子悉超過遊行無分別通曰彼外道所立一切法不生譬如瞖目妄見毛輪彼空中本無垂髮相以目瞖故見有其相外道於一切有無諸法生種種計著性乃是凡愚虗妄見妄生分別所云一切法不生不離三界事相而生計度使三界事相真有者彼所計度良不虗也然三有但假名施設耳更無有真實法體為事自性者於此假名施設執為實事以有自性可得思惟妄想種種計度或以為性非性或以為作者無因生於假名諸事相上說一切法不生何異於空中毛輪妄生分別也彼所設言教如五分論等不離相事支離漶漫動亂於心識心意既亂震掉不寧終當輪轉三界所謂不生者安在乎佛子所以能超出三界者正惟遠離諸妄想耳分別不起心識俱融凝然鎮定本自無生何必更說一切法不生耶佛子超出三有不於三有中虗妄分別如晴明眼唯見一空故非外道惡覺所敢望也玄沙上堂我今問汝諸人且承當箇甚麼事在何世界安身立命還辨得麼若辨不得恰似揑目生華見事便差知麼如今目前見有山河大地色空明暗種種諸物皆是狂勞華相喚作顛倒知見夫出家人識心達本源故號為沙門汝今既已剃髮披緇為沙門相即便有自利利他分如今看著盡黑漫漫地墨汁相似自救尚不得爭解為得人仁者佛法因緣事大莫作等閑相似聚頭亂說雜話趂謴過時光陰難得可惜許大丈夫兒何不自省察看是甚麼事秪如從上宗乘是諸佛頂族汝既承當不得所以我方便勸汝但從迦葉門接續頓超去此一門超凡聖因果超毗盧玅莊嚴世界海超他釋迦方便門直下永劫不教有一物與汝作眼見何不自急急究取未必道我且待三生兩生久積淨業仁者宗乘是甚麼事不可由汝用工莊嚴便得去不可他心宿命便得去會麼秪如釋迦出頭來作許多變弄說十二分教如瓶瀉水大作一場佛事向此門中用一點不得用一毛頭伎倆不得知麼如同夢事亦如寐語沙門不應出頭來不同夢事葢為識得知麼識得即是大出脫大徹頭人所以超凡超聖出生離死離因離果超毗盧越釋迦不被凡聖因果所謾一切處無人識得汝知麼若秪長戀生死愛網被善惡業拘將去無自由分饒汝鍊得身心同虗空去饒汝到精明湛不搖處不出識陰古人喚作如急流水流急不覺妄為恬靜恁麼修行盡出他輪迴際不得依前被輪迴去所以道諸行無常真是三乘功果如是可畏若無道眼亦不究竟何似如今博地凡夫不用一毫工夫便頓超去解省心力麼還願樂麼勸汝如今立地待汝搆去更不教汝加功煉行如今不恁麼更待何時還肯麼便下座此段葛藤大似此段偈語註脚實指示佛子能超出三有一段大事非水水想受斯從渴愛生愚夫如是惑聖見則不然聖人見清淨三脫三昧生遠離於生滅遊行無所有修行無所有亦無性非性性非性平等從是生聖果唐云常行無相境修行無相境亦復無有無有無悉平等是故生聖果云何性非性云何為平等謂彼心不知內外極漂動若能壞彼者心則平等見通曰上重頌一切法不生不應立宗已竟此下重頌住自得如實空法離惑亂有見離自心現性非性見得三解脫如實印所印故謂愚夫所以有惑亂者以於三界假名施設見為實有如渴鹿逐𦦨於非水處作水想愛斯從渴極生愛故於非水作水想也愚夫從愛起惑貪著三有亦復如是唯其惑亂即不能清淨便隨三界淪溺不離生死聖人則不然聖人見地清淨所見三界空洞無物由於得空無相無願三解脫法門即此證定獲如實印證於寂靜遠離於世間生滅之法生滅不停者為著相故也今既離相即常行無相境修行無相境不但離於有相亦且離於無相有無俱泯性自平等此平等性智即是聖果從聖人見清淨而生也夫三界唯一云何凡夫見有見無業果相續云何聖人一切平等遂成聖果謂彼愚夫不了三界唯心不知自心所現內外諸法一切無常於彼妄生計著不了內法斯為內法所動不了外法斯為外法所動如海波因風漂動不得寧靜若能壞彼所見不作有見不作無見一念不生萬法皆如如風恬浪息波紋不生非平等而何上言得緣自覺觀察住轉第六識為玅觀察智也此云心則平等見轉第七識為平等性智也惟能轉識成智故云聖知聖見聖慧眼豈識想分別所能及乎昔溈山一日指田問仰山這丘田那頭高這頭低仰曰却是這頭高那頭低溈曰你若不信向中間立看兩頭仰曰不必立中間亦莫住兩頭溈曰若如是著水看水能平物仰曰水亦無定但高處高平低處低平溈便休溈仰父子說平等處重重關鎻其義無盡惟得如實印所印方解其玅爾時大慧菩薩復白佛言世尊如世尊說如攀緣事智慧不得是設施量建立施設所攝受非性攝受亦非性以無攝受故智則不生唯施設名耳唐云如佛所說若知境界但是假名都不可得則無所取無所取故亦無能取能取所取二俱無故不起分別說名為智云何世尊為不覺性自相共相異不異故智不得耶為自相共相種種性自性相隱蔽故智不得耶為山巖石壁地水火風障故智不得耶為極遠極近故智不得耶為老小盲冥諸根不具故智不得耶世尊若不覺自共相異不異智不得者不應說智應說無智以有事不得故若復種種自共相性自性相隱蔽故智不得者彼亦無智非是智世尊有爾𦦨故智生非無性會爾𦦨故名為智唐云以知於境說名為智非不知故若山巖石壁地水火風極遠極近老小盲冥諸根不具智不得者此亦非智應是無智以有事不可得故通曰因上施設於三有無有事自性聖人見清淨三脫三昧生故問如世尊說聖人智慧觀察於前境攀緣諸法不見有一法可得但是假名施設無法可取亦無能取能取所取二俱無故智亦不能分別而取分別不生說名為智智名亦是假施設耳故謂不得相是智然則智之所以不得相者為智不能知境耶為境相隱蔽而智不能知耶境相如山巖石壁等如極遠極近等均為境足以障智而智不得耶抑為老小盲冥不能悉知諸根不具本無能知均為智不能達境而智不得耶佛所云智慧不得必居一於此矣若不覺陰界入處自相共相亦異亦不異名不得者不應說智以有境界而不知此心不照乎境故非智也若自共相諸法自性隱蔽吾智名不得者亦非是智何以故以有所知之境故能知之智生非無能知之性合會所知之境而得名為智者此境不會於心亦非智也彼自共相性自性相猶曰隱蔽不可覩者若山巖石壁極遠極近者寧無現前之實境耶彼外境自有智不能得猶曰境障於心而不得也若老者盲小者冥諸根欠缺智不具足故有實事而不得耶均之不可名智夫所貴乎智者為其能分別前境也若以智慧不得為智誠所未解是大慧所疑但知有分別為智而不知無分別為智也但以對境了知者為智而不知對境無心者為智也磁洲神藏禪師上堂知而無知不是無知而說無知便下座南泉云恁麼依師道始道得一半黃檗云不是南泉要駁地要圓前話然則何以圓他話將無曰無知而知不是知而說知於此剖析分明即得聖智聖見聖慧眼佛告大慧不如是無智應是智非非智我不如是隱覆說攀緣事智慧不得是施設量建立覺自心現量有無有外性非性知而事不得不得故智於爾𦦨不生順三解脫智亦不得非妄想者無始性非性虗偽習智作如是知是知彼不知故於外事處所相性無性妄想不斷自心現量建立說我我所相攝受計著唐云此實是知非如汝說我之所說非隱覆說我言境界唯是假名不可得者以了但是自心所見外法有無智慧於中畢竟無得以無得故爾燄不起入三脫門智體亦忘非如一切覺想凡夫無始以來戲論熏習計著外法有無形相如是而知名為不知不覺自心現量於智爾𦦨而起妄想妄想故外性非性觀察不得依於斷見通曰大慧以智慧不得為智不能知境遂疑為非智是以能分別者為智也故世尊語之不如是說汝但知有知之智而不知無知之智也此智則不生雖若無智應實是智非為非智我之所說非隱覆說其實明白顯示容易曉了我說攀緣事智慧不得者但是假名施設建立實無一法可得以覺了一切外法皆是自心現量若有若無皆無自性性即非性生本無生如是而知知而不知雖有覺知而事境界竟不可得以無有境界與智相對智亦不能分別而取故智於爾𦦨不生爾𦦨所知之境也境不可得則境不生心不可得則智不生心境無生即隨順入於三解脫法門既入三解脫空無相無願即能知之智亦不可得此智體亦忘即般若智必由正悟乃能知之非如一切覺想凡夫無始以來計著外法有無形相虗偽習智如是而知是名不知為不知無知之知於境而忘境故曰是知彼不知彼惟於外事境界處所若有若無種種形相妄想分別相續不斷於自心現量所見建立為有本無事自性而為之我亦無施設事自性而為之我所說有我及我所相攝受計著內有能取之心外有所取之境依於常見此固名為非智也又有不覺自心現量外性非性本自空寂無所容其分別乃內起能知之智外會所知之境從中分別謂一切事相有已還無終歸斷滅如是觀察以為不得者依於斷見此亦名為非智也此無始虗偽習智總屬妄想故不名智若攀緣事智慧不得者雖若無智實乃正智豈可謂之非智乎昔南泉示眾云三世諸佛不知有狸奴白牯却知有僧問長沙為甚麼三世諸佛不知有沙云未入鹿苑時猶較些子僧云狸奴白牯為甚麼却知有沙云汝爭怪得伊天童頌云跛跛挈挈㲯㲯毿毿百不可取一無所堪默默自知田地穩騰騰誰謂肚皮憨普周法界渾成飰鼻孔纍垂信飽參此知有不知有關頭須從有智無智參入爾時世尊欲重宣此義而說偈言有諸攀緣事智慧不觀察此無智非智是妄想者說於不異相性智慧不觀察障礙及遠近是名為邪智老小諸根冥而智慧不生而實有爾𦦨是亦說邪智通曰有諸攀緣事不壞世間相也智慧觀察而不見有一法可得心境不相到也此若無智實乃正智若以此無智為非智者乃妄想分別之說徒知有分別者為智而不知無分別者為智也彼既落於分別安能分別無分別者乎故亡知之智非彼妄想者所知若必以有知為智是世間之邪智非正智也故於自共相異不異觀察不得山壁等障礙及遠近觀察不得謂境能障心不以為智即使能見種種境界但名邪智不名正智謂其逐物為邪也又謂老而盲小而冥及諸根不具自無能知之智非無所知之境以是為不智者亦但說邪智不說正智謂其以六用為智體也此世間邪見不為正論吾固謂汝說非是當信無智應是智也僧問黃檗既言性即見見即性秪如性自無障礙無劑限云何隔物即不見又於虗空中近即見遠即不見者如何師云此是你妄生異見若言隔物不見無物言見便謂性有隔礙者全無交涉性且非見非不見法亦非見非不見若見性人何處不是我之本性所以六道四生山河大地總是我之性淨明體故云見色便見心色心不異故秪為取相作見聞覺知去却前物始擬得見者即墮二乘人中依通見解也虗空中近則見遠則不見此是外道中收分明道非內亦非外非近亦非遠近而不可見者萬物之性也近尚不可見更道遠而不可見有什麼意旨黃檗此段說話適與此偈符契復次大慧愚癡凡夫無始虗偽惡習妄想之所迴轉迴轉時自宗通及說通不善了知著自心現外性相故著方便說於自宗四句清淨通相不善分別通曰上言非妄想者無始性非性虗偽習智作如是知是知彼不知彼何以不知是知也良由愚癡凡夫依無始以來有無戲論煩惱妄想之所迴轉性不能轉物而為物所轉故於如實自宗及言說法不善了知自宗性宗也說即說此性宗也善了知者不著於相不著於說即善分別自心現量名之曰宗通及說通彼外道不明乎此即著自心所現外境性相不著於有即著於無既著於相去自性宗遠矣於是有所言說即所現外境性相方便而說或言有或言無或言亦有亦無或言非有非無執著名字章句言說而不能修習正行於真實自宗離四句清淨之法不善分別其義其說亦遠於自宗矣既不善自宗通相又不善言說通相故曰是知彼不知也臨濟云你一念心秪向空拳指上生寔解根境法中虗揑怪自輕而退屈言我是凡夫他是聖人禿屢生有甚死急披他師子皮却作野干鳴大丈夫漢不作丈夫氣息自家屋裏物不肯信秪麼向外覔上他古人閑名句倚陰博陽不能特達逢境便緣逢塵便執觸處惑起自無准定道流莫取山僧說處何故說無憑據一期間塗畫虗空如彩畫像等喻此臨濟宗通及說通故善能了知善能分別如此大慧白佛言誠如尊教惟願世尊為我分別說通及宗通我及餘菩薩摩訶薩善於二通來世凡夫聲聞緣覺不得其短佛告大慧善哉善哉諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧三世如來有二種法通謂說通及自宗通說通者謂隨眾生心之所應為說種種眾具契經是名說通自宗通者謂修行者離自心現種種妄想謂不墮一異俱不俱品超度一切心意意識自覺聖境界離因成見相唐云離諸因緣相應見相一切外道聲聞緣覺墮二邊者所不能知我說是名自宗通法大慧是名自宗通及說通相汝及餘菩薩摩訶薩應當修學爾時世尊欲重宣此義而說偈言我謂二種通宗通及言說說者授童蒙宗為修行者通曰自宗通及說通固非凡夫二乘所知然不善分別二通彼反得執其短何以使來世外道二乘不墮邪見乎故大慧重請說通宗通二種法為度生軌範也故佛告以說通者隨眾生心應說何法為說種種方便眾具契經梵語修多羅此云契經謂契理契機也契理則玅符中道契機則巧被三根以經含多義故云眾具謂理無不該機無不攝也是之謂說通自宗通者謂菩薩修行者離自心現種種分別謂不分別有無四句一異俱不俱品此外道虗偽惡習皆從心意意識所現為彼有無等妄想迴轉即著於外境性相不能超出唯修行者離彼妄想即超度一切心意意識境界而證入自覺聖智境界夫自覺聖智境界者本自如如本自圓成不容擬議不容造作若作因緣見若作自然相應見因功行而成就者皆未離乎相非自覺聖智境界也此自覺境界遠離諸相但可自知非人所知況一切外道二乘墮有無二邊見者豈能知之哉是之謂自宗通法前大慧問宗通相而兼及於說佛謂一切聲聞緣覺菩薩有二種通相所云宗通者緣自得勝進相趣無漏界緣自覺趣光明輝發似屬漸次此則離心意意識即自覺聖境界則頓矣所云說通者隨順眾生如應說法但九部教法此則眾具契經無所不備矣而又歸之三世如來建立二種法豈但外道二乘邪見不得其短實為來世說法利生之定式也故偈復申明說通所以接初機說即所以說乎宗也宗通所以為修行者設謂其遊行無所有修行無所有即離言說相可也宗通非言說所及豈妄想分別者所能知乎而又何以能得其短前偈亦云宗及說通相緣自與教法善見善分別不隨諸覺想唯不隨諸覺想轉故能轉諸覺想凡夫也良遂禪師參麻谷谷見來便將鉏頭去鉏草師到鉏草處谷殊不顧歸方丈閉却門師次日復去谷又閉門師乃敲門谷問阿誰師曰良遂纔稱名忽然契悟曰和尚莫謾良遂良遂若不來禮拜和尚泊被經論賺過一生谷便開門相見及歸講肆謂眾曰諸人知處良遂總知良遂知處諸人不知何意千載而下有良遂禪師為此段經文證據魏云盧伽耶品第五爾時大慧菩薩白佛言世尊如世尊一時說言世間諸論種種辨說慎勿習近若習近者攝受貪欲不攝受法世尊何故作如是說佛告大慧世間言論種種句味因緣譬喻採集莊嚴誘引誑惑愚癡凡夫不入真實自通不覺一切法妄想顛倒墮於二邊凡愚癡惑而自破壞諸趣相續不得解脫唐云隨順世間虗妄言說不如於義不稱於理不能證入真實境界不能覺了一切諸法恒墮二邊自失正道亦令他失輪迴諸趣永不出離不能覺知自心現量不離外性自性妄想計著是故世間言論種種辨說不脫生老病死憂悲苦惱誑惑迷亂通曰上言宗通及說通凡夫外道不得其短而世尊又戒內教弟子於世間惡論慎勿習近若習其說近其人但攝世間欲味不攝出世法味何故教誡之嚴若此耶佛說世間言論種種辨才巧妙辭句但飾文字莊嚴誑惑凡愚不依如法說不依如義說但隨世間情所樂故說世俗事不能證入真實境界不善宗通不能覺了一切諸法不善說通秪憑妄想分別顛倒知見虗妄言說恒墮有無二邊自失正道亦令他失不但自破壞亦能破壞於人凡愚為其所惑躭著欲味輪迴諸趣相續不已永不出離何得有解脫之期乎良由不能覺知一切諸法皆自心現量離有無相離言說相外性非性乃於外法執為實有妄想計著言論種種不離外法自性而生分別雖有巧妙辨才樂說諸法失正理故不得出離生老病死憂悲苦惱諸趣相續輪轉不息此但以種種辨說誑惑於人彼此迷亂不得解脫吾故謂不攝受法味者以此韶國師上堂秪如諸方老宿言教在世如恒河沙如來一大藏經卷卷皆說佛理句句盡言佛心因甚麼得不會去若一向織絡言教意識解會饒上座經塵沙劫亦不能得徹此喚作顛倒知見識心活計並無得力處此葢為根脚下不明若究盡諸佛法源河沙大藏一時現前不欠絲毫不剩絲毫諸佛時常出世時常說法度人未曾間歇乃至猿啼鳥叫草木叢林常助上座發機未有一時不為上座有如是奇特處可惜許諸上座大家究取令法久住世間增益人天壽命國王安樂無事珍重由是而觀若不入真實自宗通者即佛說亦不宜習近況世論乎大慧釋提桓因廣解眾論自造聲論彼世論者有一弟子持龍形像唐云現作龍形詣釋天宮建立論宗要壞帝釋千輻之輪隨我不如斷一一頭以謝所屈作是要已即以釋法唐云論法摧伏帝釋釋墮負處即壞其車還來人間如是大慧世間言論因譬莊嚴乃至畜生魏云現畜生身亦能以種種句味惑彼諸天及阿修羅著生滅見而況於人是故大慧世間言論應當遠離以能招致苦生因故慎勿習近大慧世論者唯說身覺境界而已大慧彼世論者乃有百千但於後時後五百年當破壞結集惡覺因見盛故惡弟子受如是大慧世論破壞結集種種句味因譬莊嚴說外道事著自因緣無有自通大慧彼諸外道無自通論於餘世論廣說無量百千事門無有自通亦不自知愚癡世論通曰論外道之惡論豈但自壞壞人諸趣相續而已哉昔釋提桓因廣解眾論自造聲論一落聲言便可指摘故世論弟子證世間通現作龍形直詣天宮建立所習論法作是要言憍尸迦我共汝論汝若不如汝當隨我破汝千輻之輪我若不如寧節節分解以謝所屈人天眾前作是要已即以帝釋所造論法為難摧伏帝釋帝釋不勝即壞其車還來人間如是世間言論其言之有理其持之有據乃至現畜生形依種種文詞尚能迷惑諸天修羅屈彼聲論有屈有伸著生滅見不得解脫何況於人有不為其誘引誑惑者哉以是義故應當遠離世論不應親近以因彼說能生苦聚是生苦之因輪轉諸趣豈可習近之耶且彼世論唯說身覺境界有身必有覺推原所自從冥初生覺漸及五陰四大二十五法卒歸於神我大約不離世間相說世間法而已故謂之世論彼世論者有百千字句種種莊嚴於最後五百年正法當滅時彼當建立論宗分為多部各各異名惡見乖離破壞結集吾法十二部經教為彼壞滅由彼惡覺熾盛世間各執自因各持自見因見既盛其論益熾惡見弟子樂受其法是故後世邪眾崩散破壞結集分成多部所為種種句味因譬莊嚴但說外道邪見事或說有或說無執著自因緣相不以為有因則以為無因總不越身覺境界而已至於非身所覺非覺所知非因緣非自然但可自悟自通不容以言論示人者彼固未之覺也彼諸外道內心既無有如實解自宗不通則不知有自覺聖智事亦即不能建立教法有自通論以發明自性之旨而為人說但於餘弟子習世論者廣說百千事門支離蔓延去性愈遠亦皆無有自通夫不通自性而攀緣於百千事法者謂之愚癡彼亦不自知愚癡世論能招致苦果常在生滅而不自覺亦可哀也已彼世論惡覺有如是過故吾戒諸弟子慎勿習近之也世尊因長爪梵志索論義預約曰我義若墮我自斬首世尊曰汝義以何為宗志曰我以一切不受為宗世尊曰是見受否志拂袖而去行至中路乃省謂弟子曰我當回去斬首以謝世尊弟子曰人天眾前幸當得勝何以斬首志曰我寧於有智人前斬首不於無智人前得勝乃歎曰我義兩處負墮是見若受負門處麤是見不受負門處細一切人天二乘皆不知我義墮處唯有世尊諸大菩薩知我義墮回至世尊前曰我義兩處負墮故當斬首以謝世尊曰我法中無如是事汝當回心向道於是同五百徒眾一時投佛出家證阿羅漢夫梵志敢與世尊論義視彼要約帝釋者不啻過之乃世尊卒能摧伏梵志而帝釋反為世論所屈世論之惡覺誠未易破末法時安得深明世尊意旨者而化導之乎爾時大慧白佛言世尊若外道世論種種句味因譬莊嚴無有自通自事計著者世尊亦說世論為種種異方諸來會聚天人阿修羅廣說無量種種句味亦非自通耶亦入一切外道智慧言說數耶佛告大慧我不說世論亦無來去唯說不來不去大慧來者趣聚會生去者散壞不來不去者是不生不滅我所說義不墮世論妄想數中所以者何謂不計著外性非性自心現處二邊妄想所不能轉相境非性覺自心現則自心現妄想不生妄想不生者空無相無作入三脫門名為解脫通曰大慧問外道種種論說執著自宗非如實法者然則世尊亦為十方國土諸來會眾廣說種種句味亦以世間種種名字章句譬喻說法不說自身內智證法若爾亦即同於外道自法中智慧言說數量耶佛謂我為異方諸來會眾廣說種種句味不說世論法世論見有人天來去相不知人天實無來去也我唯說不來不去之法夫來者緣會而生去者緣散而滅但於相上見有來去即屬生滅法我說不來不去即是不生不滅法我所說不生不滅義趣來無所從去無所至是真如實際境界不墮世論虗妄分別數中何以不墮彼數中也彼惟不覺自心現量外性非性乃於外境妄想分別說有說無為二見所轉不得解脫我則不計著外境有無唯建立說於自心所現故有無二邊妄想分別不能轉我而為我所轉以我如實了知外境無性但由自心所現如夢如幻不得謂之有不得謂之無故自心所現妄想分別無自而生相境非性境不生也妄想不生心不生也心境無生即證入空無相無作三解脫門遠離生滅諸趣相續名為解脫我唯了知心境俱空本自不生不滅法能轉生滅而不為生滅所轉故不墮於世論妄想數中豈亦無有自通耶有太守楊衒之問於初祖曰西天五印師承為祖其道如何祖曰明佛心宗行解相應名之曰祖又問此外如何祖曰須明他心知其今古不厭有無於法無取不賢不愚無迷無悟若能是解故稱為祖又曰弟子歸心三寶亦有年矣而智慧昏蒙尚迷真理適聽師言罔知攸措願師慈悲開示宗旨祖知懇到即說偈曰亦不覩惡而生嫌亦不觀喜而勤惜亦不捨智而近愚亦不拋迷而就悟達大道兮過量通佛心兮出度不與凡聖同纏超然名之曰祖祖師門下凡聖俱離寧同於外道耶大慧我念一時於一處住有世論婆羅門來詣我所不請空閒便問我言瞿曇一切所作耶我時報言一切所作是初世論彼復問言一切非所作耶我復報言一切非所作是第二世論彼復問言一切常耶一切無常耶一切生耶一切不生耶我時報言是六世論大慧彼復問我言一切一耶一切異耶一切俱耶一切不俱耶一切因種種受生現耶唐云一切皆由種種因緣而受生耶我時報言是十一世論大慧彼復問言一切無記耶一切記耶有我耶無我耶有此世耶無此世耶有他世耶無他世耶有解脫耶無解脫耶一切剎那耶魏云空耶一切不剎那耶虗空耶非數滅耶涅槃耶瞿曇作耶非作耶唐云虗空涅槃及非擇滅是所作耶非所作耶有中陰耶無中陰耶大慧我時報言婆羅門如是說者悉是世論非我所說是汝世論我唯說無始虗偽妄想習氣種種諸惡三有之因不能覺知自心現量而生妄想攀緣外性如外道法我諸根義三合知生唐云如外道說我及根境三和合生我不如是婆羅門我不說因不說無因唯說妄想攝所攝性施設緣起非汝及餘墮受我相續者所能覺知魏云唯說自心分別見有可取能取境界之相我說假名因緣集故而生諸法非汝婆羅門及餘境界以墮我見故大慧涅槃虗空滅非有三種但數有三耳唐云虗空涅槃及非擇滅但有三數本無實體何況而說作與非作通曰此世尊廣明世論欲令來世洞知其非不復習近之也婆羅門自稱其祖自梵天口生因從梵姓或云梵志即此之類其種各有經論世承為業故長於辯說彼自負其辯遽問世尊以一切法為所作為非所作所作是有為法非所作是無為法大段不出此二見見其有作則以為常以為生以為一以為俱見其無作則以為斷以為滅以為異以為不俱上至梵天下及眾生遠及八萬劫細至微塵從中分別作有無四句議論其詰慧者根究生因見種種因緣生法謂由作者生說此世他世似身後有相無相說解脫剎那念念遷流似後後有為說虗空涅槃及非擇滅三無為法似緣覺聲聞於此復問有作無作露出本相作則迷於有為非作則入於無想又問中陰身有為分明執著神我不出識陰區宇學道之人不識真只為從來認識神無始以來生死本癡人喚作本來人正此是也故佛答以如此世論非我所說縱汝說得種種分明不離世法若超出三界者總不作如是見也我唯說無始虗偽妄想習氣種種諸惡為三界之因欲界色界無色界染淨不同何以謂皆謂之惡以欲界視色界則色界為善以三界視超出三界者則色與無色未為純善也若不能覺知三界諸法皆自心現量外法非性實無可得於中生起妄想分別攀緣諸法或以為有作或以為無作如外道種種議論說有我及根境三緣和合而知識生是以一切法從因緣生也以為有因生者謂冥初生覺以為無因生者謂有異因但於外性計著作有無分別總歸戲論我不如是說也我說三界諸法唯心所現於一切法不說有因不說無因唯說無始虗偽妄想見有能取所取境界之相我說此攝所攝性但名假名施設因緣集故而生諸法依緣而起者本自無根生即不生安所見其有乎安所見其無乎不見其有故不說有因不見其無故不說無因此非汝婆羅門及餘世論弟子墮受我見執著神我生死相續者之所能知也汝唯取著我相攝所攝性不離三界常墮輪轉我唯無我離攝所攝超出三界汝豈能測哉且虗空無為涅槃無為及非擇滅無為在我法中但有三數本無體性云何而說作與非作彼攀緣外法說作非作虗妄分別猶之可也至三無為離言說相離名字相乃以生滅心說不生滅法安得為智故佛不與之語而以語大慧也三祖信心銘曰至道無難唯嫌揀擇但莫憎愛洞然明白毫釐有差天地懸隔欲得現前莫存順逆違順相爭是為心病不識玄旨徒勞念靜圓同太虗無欠無餘良由取捨所以不如莫逐有緣勿住空忍一種平懷泯然自盡止動歸止止更彌動唯滯兩邊寧知一種一種不通兩處失功遣有沒有從空皆空多言多慮轉不相應絕言絕慮無處不通歸根得旨隨照失宗須臾返照勝却前空前空轉變皆由妄見不用求真唯須息見二見不住慎莫追尋纔有是非紛然失心二由一有一亦莫尋一心不生萬法無咎無咎無法不生不心能由境滅境逐能沉境由能境能由境能欲知兩段元是一空一空同兩齊含萬象不見精麤寧有偏黨大道體寬無易無難小見狐疑轉急轉遲執之失度必入邪路放之自然體無去住任性合道逍遙絕惱繫念乖真昏沉不好不好勞神何用疎親欲取一乘勿惡六塵六塵不惡還同正覺智者無為愚人自縛法無異法妄自愛著將心用心豈非太錯迷生寂亂悟無好惡一切二邊良由斟酌夢幻空華何勞把捉得失是非一時放却眼若不睡諸夢自除心若不異萬法一如一如體玄兀爾忘緣萬法齊觀歸復自然泯其所以不可方比止動無動動止無止兩既不成一何有爾究竟窮極不存軌則契心平等所作俱息狐疑盡淨正信調直一切不留無可記憶虗明自然不勞心力非思量處識情難測真如法界無他無自要急相應唯言不二不二皆同無不包容十方智者皆入此宗宗非促延一念萬年無在不在十方目前極小同大忘絕境界極大同小不見邊表有即是無無即是有若不如是必不須守一即一切一切即一但能如是何慮不畢信心不二不二信心言語道斷非去來今三祖自宗通言言破的中多指迷警錯之詞不但佉外道邪見我法中外道當為汗流復次大慧爾時世論婆羅門復問我言癡愛業因故有三有耶為無因耶我時報言此二者亦是世論耳彼復問言一切性皆入自共相耶我復報言此亦世論婆羅門乃至意流妄計外塵皆是世論復次大慧爾時世論婆羅門復問我言頗有非是論者不我是一切外道之宗說種種句味因緣譬喻莊嚴我復報言有非汝有者非為非宗非說非不說種種句味非不因譬莊嚴婆羅門言何等為非世論非非宗非非說我時報言婆羅門有非世論汝諸外道所不能知以於外性不實妄想虗偽計著故謂妄想不生覺了有無自心現量妄想不生不受外塵妄想永息是名非世論此是我法非汝有也婆羅門略說彼識若來若去若死若生若樂若苦若溺若見若觸若著種種相若和合相續若愛若因計著婆羅門如是比者是汝等世論非是我有大慧世論婆羅門作如是問我如是答彼即默然不辭而退唐云不問於我自宗實法默然而去思自通處作是念言沙門釋子出於通外說無生無相無因覺自妄想現相妄想不生魏云沙門釋子外於我法是可憐愍說一切法無因無緣無有生相唯說自心分別見法若能覺知自心見相則分別不生大慧此即是汝向所問我何故說習近世論種種辯說攝受貪欲不攝受法通曰外道因世尊說無始虗偽妄想習氣種種諸惡三有之因遂復問癡愛業為因能生三有耶抑本無因耶又問一切性皆入五陰自共相耶彼亦知妄想習氣種種諸惡不出五陰自共相無明與愛能起惑造業為三有因亦彷彿似佛平日所說此乃學佛法中外道不能捨有因無因見其見所分別處即是心識流動妄計外塵不離外境而生分別縱說到本分內自共相亦是法塵故均之屬世論也婆羅門伎倆既盡乃問有非世論者否意以一切外道所有詞論種種文句因喻莊嚴莫不皆從我法中出安得有非世論者世尊說有之但非汝有汝所有者不出作為宗因喻等法我所有者非為非不為非宗非不宗非說非不說本無言說而亦未嘗無因譬莊嚴非汝外道所能知也汝等所以不知者以妄計著外不實法分別戲論故吾所謂非世間論者一切妄想分別不生所云妄想不生者非謂有妄想而滅除之之謂也謂覺了現前有無諸境皆是自心所現心外無法法外無心即真即妄即妄即真故妄想無自而生也若見有外塵則心與境對妄猶未盡息也唯心境兩忘外不見塵內無受者雖欲分別外塵原無外塵可得妄想何所依而立乎所以妄想永息住自住處寂靜境界不生不滅故不生不滅者不起分別超出三界是名非世論此是我法非汝有者略說汝法不離諸識心意流轉若來去若死生若樂苦若沈溺若顯見若觸著種種諸相於中妄計若和合相續者不離七識若貪愛為緣者不離六識若冥初為因者略近八識汝所云癡愛業因一切性入自共相如是比量分別建立宗說執有神我流轉三界此名世論非我有者婆羅門聞是非世論法當即問我自宗實法云何建立乃默然而去思所自通處但能通於平日有無妄見而不能通於無生之旨返謂沙門所見出於我通之外說一切法無因無緣無有生相宜乎一切皆無已又說能覺知自心見相則分別不生既有自心見相即是相即是生又說妄想不生誠吾所未解也味其語意只是貪戀有無邪見種種句味而不能信受緣起無生之正法諸趣相續不得解脫亦大可哀也已我故說習近世論但攝受欲不攝受法即此是也昔十七祖僧伽難提尊者度持鑑童子更名伽耶舍多付法眼偈曰心地本無生因地從緣起緣種不相妨華果亦復爾後十八祖伽耶舍多付法於鳩摩羅多偈曰有種有心地因緣能發萌於緣不相礙當生生不生此緣起無生旨也豈外道所能測乎大慧白佛言世尊攝受貪欲及法有何句義佛告大慧善哉善哉汝乃能為未來眾生思惟咨詢如是句義諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧所謂貪者若取若捨若觸若味唐云所言財者可觸可受可取可味繫著外塵墮二邊見復生苦陰生老病死憂悲苦惱如是諸患皆從愛起斯由習近世論及世論者我及諸佛說名為貪是名攝受貪欲不攝受法大慧云何攝受法謂善覺知自心現量見人無我及法無我相妄想不生善知上上地離心意意識一切諸佛智慧灌頂具足攝受十無盡句於一切法無開發自在前云無開發行自心自在是名為法所謂不墮一切見一切虗偽一切妄想一切性一切二邊大慧多有外道癡人墮於二邊若常若斷非黠慧者受無因論則起常見外因壞因緣非性則起斷見大慧我不見生住滅故說名為法大慧是名貪欲及法汝及餘菩薩摩訶薩應當修學通曰世尊常說世間諸論種種辯說慎勿習近若習近者攝受貪欲不攝受法前已詳答至是大慧又欲分別句義何者名貪句義何者名法句義非如外道但思自通處而不咨詢正法也故佛善之乃謂貪者謂其有取有捨有觸有受係著外塵而生分別墮在有無二見自失正道於是諸趣相續不脫苦陰生老病死憂悲苦惱如是諸患皆從一念愛生所謂無明緣行行緣識識緣貪愛取乃至生老病死苦由彼貪愛種種句味習近世論并習近善為世論者我及諸佛超出世外說此等輩總屬於貪但攝受欲食不攝受法食也所謂法者謂善覺知一切法唯心所現外性非性無取無捨無觸無味見人無我斷煩惱障及法無我斷所知障不但分別外境之妄想不生即分別內法之妄想亦不生也俱生無明漸次斷盡由一地入一地至於上上地遠離心意意識轉識成智所謂轉前五識為成所作智轉第六識為玅觀察智轉第七識為平等性智轉第八識為大圓鏡智至大圓鏡智即具一切諸佛智慧乃法雲灌頂位也諸佛手灌其頂光光相映授如來位即具足十無盡句一眾生界無盡二世界無盡三虗空界無盡四法界無盡五涅槃界無盡六佛出現無盡七如來智無盡八心所緣無盡九佛智所入無盡十轉法輪智無盡一切攝受於一切法無功用行自心自在是名為法若他一切見一切虗偽一切妄想一切性一切二邊皆無始以來虗妄想相不離心意意識轉變能善覺知自心現量自不墮彼一切戲論彼外道說種種法不過斷常二見多令癡人墮於二邊非黠慧者墮於二邊唯無智者受彼無因論計四大不從因生謂從來如此則起常見或計造色外因壞滅不復更生謂因緣之性本無則起斷見彼論雖多大約不出二者彼唯見外法生住滅相而不見自性本無生滅故不得名正法我唯不著於相不見有生住異滅可得斷常二見何從而起如是則一切覺了不墮於見一切真實不墮虗偽一切正思惟不墮妄想一切無自性不墮於性一切中道不墮二邊乃從上諸佛所說名為法食者也是名貪欲及法兩者句義汝及餘菩薩應當修學使未來眾生灼知正法所在毋為世論所惑黃檗云今時人只欲得多知解廣求文義喚作修行不知多知多解翻成壅塞唯知多與兒酥乳喫消與不消都總不知三乘學道人皆是此㨾盡名食不消者所謂知解不消皆為毒藥盡向生滅中收真如之中都無此事故云我王庫內無如是刀從前所有一切解處盡須併却令空更無分別即是空如來藏如來藏者更無纖塵可有即是破有法王出現世間亦云我於然燈佛所無少法可得此語只為空汝情解知量但消融表裏情盡都無依執是無事人三乘教網只是應機之藥隨宜所說各各不同但能了知即不被惑第一不得於一機一境邊守文作解何以如此實無有定法如來可說我此宗門不論此事但知息心即休更不用思前慮後由黃檗言內教議論尚不可執況世論種種無益於身心者乎爾時世尊欲重宣此義而說偈言二譯皆有我攝取眾生依戒降諸惡智慧滅邪見三解脫增長一切世間論外道虗妄說妄見作所作彼則無自宗唯我一自宗離於作所作為諸弟子說遠離諸世論心量不可見不觀察二心攝所攝非性斷常二俱離乃至心流轉是則為世論妄想不轉者是人見自心來者為事生去者事不現明了知去來妄想不復生有常及無常所作無所作此世他世等斯皆世論通通曰世尊謂彼諸外道無自通論乃於偈言重發其旨謂我調伏眾生以戒降諸惡以智慧滅諸見令三解脫得以增長此我所說法也若一切世間有無等論皆是外道虗妄之說以彼橫計因果有能作者有所作者但就虗妄外境為宗實無自宗唯我建立一心以為自宗不著於能作所作離彼虗妄因見為諸弟子說外道世論但攝受欲食不攝受法食慎勿習近遠離諸世論可也彼世論所以無自通者謂於自心現量不善觀察唯心無所有境界以無二邊心故能取所取非性斷見常見俱離不落有無不落方所乃是自心本體彼唯不見本體自宗不通乃至種種虗妄分別心為境轉流浪不息不但攀緣外性名為逐物即分別法相亦是意流總歸於世論也若能觀察妄想無性不為所轉是人則見自心現量本自寂滅本無動搖所謂自宗通者也外道寧有此乎然外道為妄想所轉則何以故以不明於生滅之相故來者見因生去者見果滅不知一切諸法來者暫現如電速滅去則不現本無所有能如實明了去來生滅之相本自無生分別安從起乎妄想不生心無流轉即是不生不滅之法我所說法但以一心為自宗者此也若夫常與無常作與無作此世及他世等總不離有無二邊即是世間去來之相而外道執之以為實有斯皆不離世間建立論宗彼各自以為通而不知其虗妄也內教弟子亦慎所習哉僧問黃檗如何是世諦檗云說葛藤作什麼本來清淨何假言說問答但無一切心即名無漏智汝每日行住坐臥一切言語但莫著有為法出言瞬目盡同無漏如今末法向去多是學禪道者皆著一切聲色何不與我心心同虗空去如枯木石頭去如寒灰死火去方有少分相應若不如是他日盡被𨶒老子栲你在嗟乎諸趣相續不得解脫可畏如是學者只貪句味何哉魏云涅槃品第六爾時大慧菩薩復白佛言世尊所言涅槃者說何等法名為涅槃而諸外道各起妄想佛告大慧諦聽諦聽善思念之當為汝說如諸外道妄想涅槃非彼妄想隨順涅槃唐云如諸外道分別涅槃皆不隨順涅槃之相大慧白佛言唯然受教佛告大慧或有外道陰界入滅境界離欲見法無常心心法品不生不念去來現在境界諸受陰盡如燈火滅如種子壞妄想不生斯等於此作涅槃想大慧非以見壞名為涅槃通曰因上佛謂大慧曰涅槃虗空滅非有三種但數有三耳未曾發明涅槃至一之處恐混於外道故大慧問何等法方名涅槃而諸外道各起妄想分別為得真涅槃否彼諸外道分別涅槃皆不隨順涅槃之相且涅槃真相非彼妄想所及故世尊一一出其過而以我法說名涅槃者示之總之外道無有自通或有外道於五陰六入十八界滅處離欲界繫縛不貪境界見一切法無常以心及心數法不現在前持心一境不見有過去未來現在三世之相此由諸受陰盡但以一切不受為宗故於陰界入種種欲塵按伏不起如燈火滅不令復明如種子壞不令復生諸取不起分別不生此但除滅一切境界而謂之不生耳即楞嚴所云以永滅依為所歸依斯外道論師等於此作涅槃想且以見滅為涅槃故不知涅槃玅果轉諸生滅成不生滅剎那無有生相剎那無有滅相一切現前一切寂滅不見有滅相可得豈可以見一切法壞遂名為涅槃乎此外道分別涅槃不能隨順涅槃之相一也提婆論以此為第一小乘外道說黃檗云凡夫取境道人取心心境雙忘乃是真法妄境猶易忘心至難人不敢忘心恐落空無撈摸處不知空本無空唯一真法界耳此靈覺性無始以來與虗空同壽未曾生未曾滅未曾有未曾無未曾穢未曾淨未曾喧未曾寂未曾少未曾老無方所無內外無數量無形相無色象無音聲不可覓不可求不可以智慧識不可以語言取不可以境物會不可以功用到諸佛菩薩與一切蠢動含靈同此大涅槃性性即是心心即是佛佛即是法一念離真皆為妄想不可以心更求於心不可以佛更求於佛不可以法更求於法故學道人直下無心默契而已能透黃檗語即知涅槃真相所在大慧或以從方至方名為解脫身境界想滅猶如風止或復以覺所覺見壞名為解脫或見常無常作解脫想唐云或謂不見能覺所覺或謂不起分別常無常見或見種種相想招致苦生因思惟是已不善覺知自心現量怖畏於相而見無相深生愛樂作涅槃想通曰外道涅槃之想不出斷滅見如楞嚴云或計身滅或欲盡滅或苦盡滅或極樂滅或極捨滅此其大略也前段境界離欲是欲盡滅外道也此從方至方是計身滅不見能覺所覺是極樂滅不起分別常無常見是極捨滅畏相招苦是苦盡滅但錯綜舉之耳從方至方者第二外道方論師說最初生諸方從方生世間人從人生天地天地滅沒還入彼處說方是常名涅槃因身境界想滅猶如風止者第三外道風仙論師說謂風能生物風能殺物身境界有生滅而風無生滅說風為常是涅槃因今合為一猶云捨生趣生如風暫止耳覺所覺見壞者不幾於離覺所覺乎彼但於能覺所覺之見按伏不行趣寂滅樂不覺有樂苦相是極樂滅外道也論以韋陀論師說大蓮華生梵天等語多不經與此不符於常無常見不起分別者不幾於離斷常乎彼但以苦樂是無常唯捨是常拜其捨而忘之不作分別見是極捨滅外道也論以第五外道伊賖那論師說形不可見遍一切處能生萬物能生是常所生是無常似為近理種種相想者分別種種異相能生諸苦不知相即自心所現乃怖畏於相而著於無相厭苦斷集貪愛偏空是苦盡滅外道也論以為倮行外道論師所說彼其習苦行也正欲免於苦耳身屬欲界兼人與天欲盡屬初禪攝苦盡屬二禪攝極樂屬三禪攝極捨兼四禪無色二種此入無想天外道所謂窮盡七際現前銷滅皆以死後斷滅為涅槃者也據所見處亦非尋常爭奈不出三界何僧問雲門不起一念還有過也無門云須彌山白雲端頌云須彌山兮塞宇宙千眼大悲看不透除非自解倒騎牛一生不著隨人後天童頌云不起一念須彌山韶陽法施意非慳肯來兩手相分付擬去千尋不可攀滄海濶白雲閑莫將毫髮著其間假雞聲韻難謾我未肯模胡放過關彼諸外道雖滅盡念念至湛不搖處亦是假雞聲韻耳豈得為真涅槃乎或有覺知內外諸法自相共相去來現在有性不壞作涅槃想或謂我人眾生壽命一切法壞作涅槃想或以外道惡燒智慧見自性及士夫彼二有間士夫所出名為自性如冥初比求那轉變求那是作者作涅槃想或謂福非福盡魏云外道說如是罪盡故福德亦盡名為涅槃或謂諸煩惱盡或謂智慧唐云或計不由智慧諸煩惱盡或見自在是真實作生死者作涅槃想或謂展轉相生生死更無餘因如是即是計著因而彼愚癡不能覺知以不知故作涅槃想通曰覺知內外諸法有性不壞者如楞嚴四徧常論內法如六根心境循環不失外法如四大等咸皆體恒計微塵常以為不壞此常見外道也論以為第七毗世師論師說我人眾生壽命俱滅此斷盡證悟了覺四相所謂見苦斷集證滅修道居滅已休更不前進者乃定性聲聞所證亦係偏空非正覺也論以為第八苦行論師說或以外道惡見火燒滅智慧者計有自性我見之本也及有士夫十六見之一也見得自性及士夫二者微有間隔謂士夫神我能生自性是士夫所出者名為自性如冥初生覺之比比類也求那者塵也依也謂此微塵能依諸緣轉變作一切物計此求那是為作者謂從微塵而生四大與從士夫而生自性比類相同此即執有神我徧十方界一切眾生皆我身中一類流出之見也論以為第九外道女人眷屬說摩醘首羅作八女人生天龍八部等以是為涅槃者可笑或謂福非福盡謂罪福皆空此正撥無因果外道也論以為第十外道行苦行論師說或謂煩惱盡依智慧故唐云不由智慧修斷而諸煩惱自盡此正計縷丸數極時熟得道自然煩惱與智慧依也論以為十一外道淨照論師說或見自在天能造作眾生遂計彼天是真實能司人生死者此即自疑身心從彼流出十方虗空咸其生起之見也論以為十二外道摩陀羅論師說或謂眾生展轉相生死此生彼輪迴不息八萬劫來無因自有故謂生死更無餘因不知如是計著即是生死之因而彼外道愚癡不能覺了無明愛業為其根本以不知故乃謂生死無因遂指無因以為涅槃論以為尼犍子論師說以上七種總不出斷常二見不可語於佛知見也忠國師問僧何方來曰南方來師曰南方知識如何示人曰彼方知識直下示學人即心即佛佛是覺義汝今悉具見聞覺知之性此性善能揚眉瞬目去來運用徧於身中挃頭頭知挃脚脚知故名正徧知離此之外更無別佛此身即有生滅心性無始以來未曾生滅身生滅者如龍換骨蛇蛻皮人出故宅即身是無常其性常也南方所說木約如此師曰若然者與彼先尼外道無有差別彼云我此身中有一神性此性能知痛癢身壞之時神則出去如舍被燒舍主出去舍即無常舍主常矣審如此者邪正莫辨孰為是乎吾比遊方多見此色近光盛矣聚却三五百眾目視雲漢云是南方宗旨把他壇經改換添糅鄙談削除聖意惑亂後徒豈成言教苦哉吾宗喪矣若以見聞覺知是佛性者淨名不應云法離見聞覺知若行見聞覺知是則見聞覺知非求法也僧又問法華了義開佛知見此復若為師曰他云開佛知見不言菩薩二乘豈以眾生顛倒便同佛之知見乎即此可知外道所指涅槃皆不能隨順涅槃之相也或有外道言得真諦道作涅槃想唐云或計證於諦道虗妄分別以為涅槃或見功德功德所起和合一異俱不俱作涅槃想或見自性所起孔文彩種種雜寶及利刺等性見已作涅槃想唐云或計諸物從自然生孔雀文彩棘針銛利生寶之處出種種寶如此等事是誰能作即執自然以為涅槃大慧或有覺二十五真實或王守護國受六德論作涅槃想唐云或有說言能受六分守護眾生斯得涅槃或見時是作者時節世間如是覺者作涅槃想或謂性或謂非性或謂知性非性魏云外道言見有物見無物見有無物如是分別或見有覺與涅槃差別作涅槃想唐云或計諸物與涅槃無別作涅槃想通曰言得真諦道者乃第十四外道僧佉論師說謂從自性生大從大生意從意生智從智生五分從五分生五知根從五知根生五業根從五業根生五大是名二十五諦自性是常能生諸法還入自性即離一切生死此計冥諦以為真諦作涅槃想者也或見功德等論說有作所作而共和合唐云或計求那與求那者而共和合此勝論師計六句為生生之因謂一實二德三業四大有五和合六同異又從實句中執有九法謂地水火風空時方和合又計微塵以成器界唐譯所謂求那與求那者指微塵生起世界微塵即是能作世界即是所作能作即是功德所作即是功德所起和合而成地水火風空等不可謂一不可謂異不可謂一異俱不可謂一異不俱此說甚微論以為摩醘首羅論師說謂一切從自在天生從自在天滅三界渾然一自在天身也語多不經或見自性所起者論以為十六外道無因論師說無因無緣生一切物如棘刺針無人作孔等種種畵色皆無人作自然而有即楞嚴所云烏從來黑鵠從來白計自然外道也或有覺二十五諦真實者即覺前數論師所計冥諦以為真實者也或受六德論者即受前勝論師所計六句為生因者也能解此二法守護眾生令得安樂安樂之從即是涅槃論無此段似屬重出或見時是作者論以為十七外道時論師說以時節為因能生世間法時不至不生時不至不滅世間一切無常時是常或謂性者論作見有物名涅槃乃十八外道服水論師說謂水能生物水能壞物說水是常或謂非性者論作見無物名涅槃乃十九外道口力論師說謂虗空是萬物因一切從空生還從空滅說虗空是常或謂知性非性者論作見有無物是涅槃因乃二十外道安荼論師說謂本無日月星辰虗空及地惟有大水時大安荼生如雞子破為二段在上作天在下作地彼二中間生梵天一切眾生從梵天生還歸彼處名為涅槃此三種不離地水火風空而生計著不出有無及亦有亦無見也或見有覺與涅槃差別者唐作或計諸物與涅槃無別謂萬物是喧動涅槃是寂靜此二無別於中分別精麤疏決真偽有覺者存涅槃即不應有覺此有覺者不離涅槃即非想非非想境界彼之所謂涅槃也提婆論闕此一種并前小乘外道論師及苦行論師皆無發明深談理諦則彼所無略能記述麤淺者耳似非真出提婆所傳智者當能燭之有道流問大珠曰世間還有法過於自然否珠曰有曰何法過得曰能知自然者曰元氣是道否珠曰元氣自元氣道自道曰若是者則應有二也珠曰知無兩人又問云何為邪云何為正珠曰心逐物為邪物從心為正只此數語而種種邪正之辨自見於言外有如是比種種妄想外道所說不成所成智者所棄大慧如是一切悉墮二邊作涅槃想如是等外道涅槃妄想彼中都無若生若滅唐云於此無有若住於出大慧彼一一外道涅槃彼等自論智慧觀察都無所立如彼妄想心意來去漂流馳動一切無有得涅槃者通曰以上二十一種涅槃但略舉其最著者耳此外九十餘種有如是比類種種妄想所說涅槃大率虗謬邪見而說諸論不與如實正法相應不如於理不成其說智者所棄而遠離之也如是一切說有說無說常說無常進之說亦有亦無亦常亦無常又進之說非有非無非常非無常凡六十二見虗妄分別悉墮二邊不離對待作涅槃想如是虗妄分別以為涅槃彼中都無住於世間而若生者亦無入於涅槃而若滅者一切斷滅誰為生滅彼諸外道等依彼自宗建立自論以正智正慧觀察之違背正理自相破壞無如實知都無所立其說既支離矯亂徒錯用心妄為分別令其心意掉散往來漂馳無有寧止心意既流念念不停正沒溺於生死苦海中諸趣相續不得解脫豈有真得涅槃者乎故曰一切無有得涅槃者此諸外道妄計涅槃皆不隨順涅槃之相非我法所名為涅槃者也雲葢山志元禪師因潭州道正表聞馬王乞師論義王請師上殿相見茶罷師就王乞劍師握劍問道正曰你教中道恍恍惚惚其中有物是何物杳杳冥冥其中有精是何精道得不斬道不得即斬道正茫然便禮拜懺悔師謂王曰還識此人否王曰識師曰是誰王曰道正師曰不是其道若正合對得山僧秪是箇無主孤魂因茲道士更不紛紜直饒對得分明也不出冥諦與本來人大相遠在大慧如我所說涅槃者謂善覺知自心現量不著外性離於四句見如實處不墮自心現妄想二邊攝所攝不可得一切度量不見所成愚於真實唐云不入諸量不著真實不應攝受棄捨彼已得自覺聖法知二無我離二煩惱盡除二障永離二死上上地如來地唐云轉修諸地入於佛地如影幻等諸深三昧離心意意識說名涅槃大慧汝及餘菩薩摩訶薩應當修學當疾遠離一切外道諸涅槃見通曰上既辨諸外道無有得涅槃者此下乃詳我法涅槃非外道所能窺也如我所說涅槃謂善覺了自心現量心外無法法外無心不著外境而生分別遠離有無一異俱不俱四句邪見實見得真如實際不生不滅之處故不墮於自心所現分別有無二邊邪見即能收所取心量亦不可得何以離能所取也見世間一切建立不出妄想度量虗妄不實無所成就由其愚昧迷真實理是不應攝受者攝所攝不可得一切棄捨不取諸法即名真實斯得自覺聖智所現證法所證之法謂何謂知人法二無我遠離根本枝末二煩惱淨除惑智二障永超分段變易二生死漸歷諸地至於佛地得如幻等諸深三昧覺自心所現如幻猶未為深也即幻即真即真即幻一切外境常自寂滅乃為深三昧也此唯轉識成智者方能證此故轉心意意識生滅種子成不生滅智用然後號名涅槃也三德涅槃如伊三點為如來秘密之藏此中自覺聖體即是真如知二無我等即是般若永離二死即是解脫三一圓融故名涅槃絕思絕議如是安住豈外道所能測哉汝等菩薩應當修學遠離一切外道諸涅槃見可也僧志道問六祖曰學人自出家覽涅槃經十載有餘未明大意願和尚垂誨祖曰汝何處未明曰諸行無常是生滅法生滅滅已寂滅為樂於此疑惑祖曰汝作麼生疑曰一切眾生皆有二身謂色身法身也色身無常有生有滅法身無常有知無覺經云生滅滅已寂滅為樂者不審何身寂滅何身受樂若色身者色身滅時四大分散全然是苦苦不可言樂若法身寂滅即同草木瓦石誰當受樂又法性是生滅之體五陰是生滅之用一體五用生滅是常生則從體起用滅則攝用歸體若聽更生即有情之類不斷不滅若不聽更生則永歸寂滅同於無情之物如是則一切諸法被涅槃之所禁伏尚不得生何樂之有祖曰汝是釋子何習外道斷常邪見而議最上乘法據汝所說即聲色外別有法身離生滅求於寂滅又推涅槃常樂言身有受用斯乃執吝生死躭著世樂汝今當知佛為一切迷人認五陰和合為自體相分別一切法為外塵相好生惡死念念遷流不知夢幻虗假枉受輪迴以常樂涅槃翻為苦相終日馳求佛愍此故乃示涅槃真樂剎那無有生相剎那無有滅相更無生滅可滅是則寂滅現前當現前時亦無現前之量乃謂常樂此樂無有受者亦無不受者豈有一體五用之名何況更言涅槃禁伏諸法令永不生斯乃謗佛謗法聽吾偈曰無上大涅槃圓明常寂照凡愚謂之死外道執為斷諸求二乘人目以為無作盡屬情所計六十二見本妄立虗假名何為真實義惟有過量人通達無取捨以知五蘊法及以蘊中我外現眾色相一一音聲相平等如幻夢不起凡聖見不作涅槃解二邊三際斷常應諸根用而不起用想分別一切法不起分別想劫火燒海底風吹山相擊真常寂滅樂涅槃相如是吾今強言說令汝捨邪見汝勿隨言解許汝知少分志道聞偈大悟禮拜而退六祖一偈該盡此篇玅義傳佛心印豈在言語文字間耶爾時世尊欲重宣此義而說偈言外道涅槃見各各起妄想斯從心想生無解脫方便愚於縛縛者遠離善方便外道解脫想解脫終不生眾智各異趣外道所見通彼悉無解脫愚癡妄想故一切癡外道妄見作所作有無有品論彼悉無解脫凡愚樂妄想不聞真實慧言語三苦本真實滅苦因譬如鏡中像雖現而非有於妄想心鏡愚夫見有二不識心及緣則起二妄想了心及境界妄想則不生心者即種種遠離相所相事現而無現如彼愚妄想三有唯妄想外義悉無有妄想種種現凡愚不能了經經說妄想終不出於名若離於言說亦無有所說通曰此頌上外道涅槃之見如前二十一種但從各各自心妄想所起此妄分別既從心想流動所生非有解脫善巧方便之法外道執有涅槃可取已為所縛更以妄見取之是為能縛彼愚為能縛不自覺悟乃復遠離善巧方便之法雖作解脫想而解脫終不生也彼外道眾各出邪智各各異趣或見其常則以常為解脫或見其斷則以斷為解脫據彼自所通處各各自謂解脫其實悉無解脫也則何以故唯智可以破愚唯真可以除妄彼既愚於縛縛不離乎癡意想漂流不離乎妄即無善巧方便其何以得解脫乎故一切癡外道妄見能作所作或以為無因或以為有因建立有品無品諸論悉無有得解脫者為彼凡愚但樂虗妄分別不聞真實解脫之慧故至此耳彼虗妄分別者不離言語言語乃三苦之本三苦謂苦苦壞苦行苦苦苦者謂三界已苦欲界復苦壞苦者謂樂壞時苦等於三途行苦者即處中苦通於無色此三苦不離欲界色界無色界外道所建立言論不過分別三界生滅諸法實三苦之本也豈能超出三界而得解脫耶若真實慧者不作有見不作無見本無能作亦無所作真如實際中不起一念分別本無三界之相可得何從有三界之苦乎是真實慧者實滅苦之因是真解脫是真涅槃彼固未之聞也所云滅苦因者豈必斷滅三界一切等法而後無苦哉譬如鏡中之像雖現而非有也真如實際即鏡也三界等法即像也三界等法唯自心所現不可謂之有不可謂之無愚夫於自心鏡中所現之相妄想分別或見謂之有或見謂之無作此二見良由不識自心本體及外緣境界如鏡中像像有去來鏡無生滅緣有去來心無生滅彼不依真實而依虗妄起二分別建立有品無品言論自造苦因無足恠者若能了心及境界覺知自心現量外性非性如鏡中像雖現而非有豈有於虗妄影像而生虗妄分別者乎其不生妄想者何也以三界諸法唯心所現是心即種種種種即心心境一如本來寂滅遠離能相所相能所既無即無實事可得現起三界種種事業現而無現不可定執為有如彼凡愚外道種種妄想分別也且三界所有種種諸法不出生滅去來影相唯是妄想分別建立於外境界執為實義不知外性非性一切影相原無所有以妄想故現有種種事法種種所現既從妄想生妄本無根即是不生此自心現量未易窺也凡愚不能了此輪轉三界不得解脫亦大可哀哉不徒外道言語為三苦本但有言說都無實義即如諸經所說妄想云者欲令眾生返妄歸真安住涅槃然終不出於名言既落名言即非真實若達名言體空於言說而離言說默契不可思議境界即所說之法亦不可得一法不存方證真實是為我所說涅槃義也豈凡愚所能了乎雜華偈曰眼耳鼻舌身心意諸情根以此常流轉而無能轉者法性本無生示現而有生是中無能現亦無所現物眼耳鼻舌身心意諸情根一切空無性妄心分別有如是而觀察一切皆無性此偈大旨實與此偈無二青州法本禪師上堂揚聲止響不知聲是響根弄影逃形不知形為影本以法問法不知法本非法以心傳心不知心本無心心本無心知心如幻了法非法知法如夢心法不實莫謾追尋夢幻空華何勞把捉到這裏三世諸佛一大藏教祖師言句天下老和尚露布葛藤盡使不著何故太平本是將軍致不許將軍見太平便下座若此等言說而無說雖終日咬嚼不為分外提婆菩薩釋楞伽經中外道小乘涅槃論藏中錄出備覽卍云原本錄出全文今讓藏中茲省略焉
