body:
  text: 魏云集一切佛法品第三之一唐云集一切法品第二之一爾時大慧菩薩摩訶薩復白佛言世尊諸識有幾種生住滅佛告大慧諸識有二種生住滅非思量所知諸識有二種生謂流注生及相生有二種住謂流注住及相住有二種滅謂流注滅及相滅通曰以上百八句俱非獨不言識句非識句者何也以阿賴耶識即如來藏性一切萬法皆從此出故不可遣此識若可遣者即同外道斷見且如來藏中有空如來藏有不空如來藏有空不空如來藏約心真如門一切皆非是空如來藏也約心生滅門不妨現起種種德用是不空如來藏也空有圓融不墮偏空乃為真空論性宗但一真理更有何事論相宗則多生以來生滅種子未易明了若一一勘破復還一真如性其究則一而已矣大慧初問云何名為藏云何意及識云何生與滅因佛未云非故復問諸識有幾種生住滅佛告以諸識有二種生住滅非思量所知隱隱謂不思議熏不思議變也又分二種生二種住二種滅謂流注及相粗細不同而其生住滅亦先後不一故曰二也流注細相依藏性而起本一真如性不生不滅因無明不覺忽與生滅和合則變而為識名流注生此識念念不停歷生相續名流注住直至金剛道後異熟空證等妙覺方名流住滅始還不生不滅本體也其生也以不思議熏變不知幾千萬劫而生其滅也亦以不思議熏修不知幾千萬劫而滅真非思量所知若流注粗相但就流注住中分為三相七識初生名為相生與前境和合相續不斷名為相住至七地滿心證無漏果名為相滅其間分齊頭數亦不易知也起信論云心真如者即是一法界大總相法門體所謂心性不生不滅一切諸法唯依妄念而有差別若離心念則無一切境界之相藥山坐次僧問兀兀地思量箇甚麼山曰思量箇不思量底曰不思量底如何思量山曰非思量僧問蜀州西禪如何是非思量處禪云誰見虗空夜點頭丹霞頌云一點靈明六不收昭然何用更凝眸箇中消息人難委獨有虗空暗點頭此非思量所知明明指出箇悟門以諸老宿話頭參之當益躍然大慧諸識有三種相謂轉相業相真相通曰上言諸識有二種生住滅謂流注及相然流注之生住滅最為微細故非思量所知若夫相之生住滅但指半分末那粗相則有可得而言者相有三種所謂轉相業相真相下文云種種諸識浪騰躍而轉生又云藏識如巨海巨海即真相也識浪轉生即轉相業相也轉相即轉識下文云展轉因即八轉為七七轉為六起信所謂無明不覺生三細是也論云一者無明業相以依不覺故心動説名為業二者能見相以依動故能見即名轉相三者境界相以依能見故境界妄現謂能現一切境界如鏡現像名為現相此三細中原有轉相不必別為注腳然三細業相居先而此業相居後者何也此指現相之後起惑造業起信所謂境界為緣起六粗是也論云以有妄境染法緣故即熏習妄心令其念著種種造業受於一切身心等苦此業繫苦相生死相續為業相之終一念無明為業相之始未始不相通也若約三性釋者轉相乃依他起如波浪依海水起業相乃遍計執如但見波浪不知是水真相則圓成實唯一海水也轉相業相有生住滅真相無生住滅此並舉真相者正欲轉彼轉相業相歸之乎真也僧問南嶽讓禪師如鏡鑄像像成後未審光向甚麼處去師曰如大德為童子時像貌何在法眼別云阿那箇是大德鑄成底像僧曰秪如像成後為甚麼不鑑照師曰雖然不鑑照謾他一點不得可知轉相業相滅則真相見真相見則無明消盡渾是一大圓鏡智也大慧略説有三種識廣説有八相何等為三謂真識現識及分別事識大慧譬如明鏡持諸色像現識處現亦復如是大慧現識及分別事識此二壞不壞相展轉因唐云此二識無異相互為因大慧不思議熏及不思議變是現識因大慧取種種塵及無始妄想熏是分別事識因唐云現識以不思議熏變為因分別事識以分別境界及無始戲論習氣為因通曰上云諸識不知有幾種故此釋云略説有三廣説有八八即八識等名各有流注各有其相總之一類相續試言其略一者真識二者現識三者分別事識唐魏二譯俱缺真識但曰略則惟二現識屬前五識隨其五塵對至即現但能明了未入分別若分別事相妄想則屬第六識也真如不可言識而此云真識者蓋指藏識而言依不生不滅則謂之出纏如來藏名白淨識依微細生滅則謂之在纏如來藏名第八識此第八識即名真識譬如明鏡現衆色像明鏡者八識也能持衆像而顯現者現識也此現識及分別事識展轉相因而生其展轉者即相續識也此諸識壞不壞相猶言異不異相詳如下文泥團微塵之喻何以明分別事識為現識因也本一真如不變以隨緣故遂為染法所熏而真如不覺變而為識其熏也以不思議而八識田中忽有種子其變也亦以不思議而黏湛發覺觸境即應遂為現識此現識猶未離不思議境界即是現量故名之曰現識良由分別事識染法熏變為之因也何以明現識為分別事識因也現識攝受種種外塵見取愛取攬為己有及無始妄想熏變種子背覺合塵已非一日凡外六塵一入明了即生分別而妄想計度紛然雜出起惑造業莫可紀極是現識又為分別事識因也起信論云無明熏習義有二種一者根本熏習以能成就業識義故即經所云不思議熏也二者所起見愛熏習以能成就分別事識義故即經所云無始妄想熏也八識如鏡而現影處名現影固不可為鏡八識如田而含種處名熏種亦不可為田此真識現識及分別事識相因而起如海水起波浪非異非不異雖略舉二識流注生而轉相業相之生亦在其中矣龐居士偈曰一羣六箇賊生生欺殺人我今識汝也不與汝為鄰汝若不伏我我即到處説教人盡識汝使汝行路絶汝若肯伏我我即不分別共汝一處住同證無生滅若居士者信知真識所在而現識及分別事識不能欺矣大慧若覆彼真識種種不實諸虗妄滅則一切根識滅是名相滅大慧相續滅者相續所因滅則相續滅所從滅及所緣滅則相續滅大慧所以者何是其所依故依者謂無始妄想熏緣者謂自心見等識境妄想唐云所依因者謂無始戲論虗妄習氣所緣者謂自心所見分別境界通曰上言現識及分別事識展轉因即有轉相即有業相相生而流注之生可知矣流注生而真如本體不得顯露可知矣是無始無明覆彼真識譬如太虗為浮雲所覆故阿賴耶識中虗妄分別種種習氣倐生倐滅皆非真實若此種種不實諸虗妄滅譬如浮雲散盡大虗朗然內無種子不復熏起現行則一切根識從六根緣六塵者當下消滅此現識及分別事識所由滅也又何轉相業相之有是名相滅轉相既滅是七識相續不斷半分粗相於是乎滅矣相續之所以滅者內無所因即無所傳而出故相續滅外無所從及所緣即無所傳而入故相續滅所以者何相續無本位內依於八識外依於六識是其所依故內所依者即無始妄想熏習種子今種種不實諸虗妄滅是所依因滅故相續滅也外所緣者六塵本是八識所變相分還為八識見分所緣之境故六識於自心所見塵境妄想計著今一切根識滅則所從六根滅及所緣六塵滅故相續滅也此言相滅而詳明相續之所以滅者見諸識有二種生住滅微有不同相續即七識有生有住有滅但指流注住中立此三相即此能斷俱生我執亦可言滅若流注細相必俱生法執俱忘而後可言滅也此不言流注而言相續者良有深意僧問保福家貧遭劫時如何福曰不能盡底去曰為甚麼不能盡底去福曰賊是家親曰既是家親為甚麼翻成家賊福曰內既不應外不能為曰忽然捉敗功歸何所福曰賞亦不曾聞曰恁麼則勞而無功福曰功則不無成而不處曰既是成功為甚麼不處福曰不見道太平本是將軍致不許將軍見太平是可知轉相業相滅而真相現現識分別事識滅而真識現亦自還我本來耳何功之有大慧譬如泥團微塵非異非不異金莊嚴具亦復如是大慧若泥團微塵異者非彼所成而實彼成是故不異若不異者則泥團微塵應無分別如是大慧轉識藏識真相若異者藏識非因若不異者轉識滅藏識亦應滅而自真相實不滅是故大慧非自真相識滅但業相滅若自真相識滅者藏識則滅大慧藏識滅不異外道斷見論議通曰上言諸識有三種相略説有三種識轉相業相以對真相現識分別事識以對真識真識即藏識真相也藏識真相無生滅而轉相業相現識分別事識有生住滅似乎異矣其實非異非不異何以明之譬如泥團微塵以為異則泥團應非微塵所成以為不異則泥團與微塵應無分別金莊嚴具亦復如是故現識及分別事識展轉相因皆謂之轉識猶泥團也猶莊嚴具也其藏識真相猶微塵也猶金也泥團莊嚴具種種不齊而微塵與金一也若謂轉識與藏識異者則第八藏識不應與前七作生起因今前七非八識不生既與之為因矣是不異也若謂藏識與轉識不異者則前七滅時而第八藏識亦應滅然藏識真相即係本覺真如原自不生又誰可滅其實不滅也故前云相續所因滅者非自真相識滅但其中虗妄習氣無始妄想所熏名無明業相者為可滅耳真相識若滅誰為如來藏誰為出生諸佛不幾於焦芽敗種乎是轉識可滅而藏識不滅則又非不異也譬如泥團可壞而微塵不壞莊嚴具可壞而金性不壞其有分別又如此起信論云所言滅者唯心相滅非心體滅又云唯癡滅故心相隨滅非心智滅是藏識真相故不滅也若其可滅即不異外道斷滅論以滅窮研於無盡中發宣盡性非正論也僧問雲居膺禪師才生為甚麼不知有師曰不同生日未生時如何師曰不曾滅曰未生時在甚麼處師曰有處不收曰甚麼人不受滅師曰是滅不得者故知雲居落處即此段真識真相可窺其矣大慧彼諸外道作如是論謂攝受境界滅識流注亦滅唐云取境界相續識滅則無始相續識滅若識流注滅者無始流注應斷大慧外道説流注生因非眼識色明集會而生更有異因大慧彼因者説言若勝妙若士夫若自在若時若微塵唐云彼諸外道説相續識從作者生不説眼識依色光明等緣和合而生唯説作者為生因故作者是何彼所計勝性丈夫自在時及微塵為能作者通曰外道斷見論議其詳何如彼謂攝取境界之六識滅并七識半分粗相外緣六識相續之識滅遂謂七識內緣八識半分細相及八識無始流注之識亦滅不知八識自體真常流注自無始以來是滅不得者若七識內依八識流注不息者可滅則無始真常流注為如來藏者亦應斷滅若其可斷誰為出生一切諸法至今流注不已乎由此言之如來藏識能生起前七能生一切相分見分諸法其為生生之因明矣外道不明乎此乃謂相續之識流注不斷別有異因由作者生不説眼等六識依色光明等緣集會而生內不根於八識故為異因彼所因者以冥諦為勝性從冥生覺為二十五諦以神我為能作者如數論師所説至謂大梵天丈夫常住實有能生一切如勝論師所説又謂自在天體實遍常能生諸法如塗炭師所説是以人天為能作者如計時運具諸功能能生萬物如時敬外道所説又計微塵積小至大能成色心等法如路伽師所説皆取外境為能作者真所謂異因也楞嚴經彌勒菩薩所修識心三昧乃至盡空如來國土淨穢有無皆是我心變化所現又了如是唯心識故識性流出無量如來然則外道所指勝妙士夫自在為有情者時及微塵為無情者總不外藏識所流出彼不以藏識為因而以藏識所流出者為因非正因矣若果識流注滅誰為出生士夫自在時微塵等而以為作者哉彼所因作者是生滅法反執為常而八識真常流注反作斷滅論以常為無常以無常為常均為斷見論議也鏡清問靈雲混沌未分時如何雲曰露柱懷胎清云分後如何雲曰如片雲點太清裏清云秪如太清還受點也無雲不對清云恁麼則含生不來也雲亦不對清云直得純清絶點時如何雲曰猶是真常流注清云如何是真常流注雲曰似鏡常明清曰向上更有事否雲曰有清雲如何是向上事雲曰打破鏡來與子相見天童拈云分與不分玉機夜動點與不點金梭暗拋直是一色純清未得十成安穩且道打破鏡來向什麼處相見還會麼清秋老兔吞光後湛水蒼龍蛻骨時真常流注猶帶識在若能轉識成智則湛水蒼龍脫骨而出矣復次大慧有七種性自性所謂集性自性性自性相性自性大種性自性因性自性緣性自性成性自性通曰因上外道謂識流注滅是以性無性也不知有七種性自性實不可滅所謂集性自性即眼識色明集會而生此八識和合根境之自性也既成集自性則法法自爾故成性自性既成性自性則性隨質顯故成相自性既成相自性則相假形分故成大種自性既成大種自性則因生萬物故成因自性既成因自性則因待緣生故成緣自性既成緣自性則因緣事大故成圓成實性也性而曰自性發見之性有七而根本之性惟一也散而為七不謂之有會而為一不謂之無本來如是其可斷乎昔六祖三鼓入室五祖以袈裟遮圍不令人見為説金剛經至應無所住而生其心六祖於言下大悟一切萬法不離自性遂啓五祖言何期自性本自清淨何期自性本不生滅何期自性本自具足何期自性本無動搖何期自性能生萬法五祖知悟本性謂曰不識本心學法無益若識自本心見自本性即名丈夫天人師佛故七自性種種具足成就如來世間出世間出世間上上法唯六祖徹證最盡復次大慧有七種第一義所謂心境界慧境界智境界見境界超二見境界超子地境界如來自到境界通曰大慧問自性幾種異心有幾種別此乃詳答既曰第一義心但一心耳何為有七種七種境界不同同歸於第一義也心境界即寂滅一心心光發慧故有慧境界慧力既勝則成智用故有智境界智用既成則正見現前故有見境界正見現前則超過斷常二見以至超過十地佛子到如來自覺之境界前六種通於菩薩所行後一種唯佛自證總之名第一義心梁武帝問達磨大師如何是聖諦第一義磨云廓然無聖帝云對朕者誰磨云不識帝不契遂渡江至少林面壁九年天童頌云廓然無聖來機徑庭得非犯鼻而揮斤失不回頭而墮甑寥寥冷坐少林默默全提正令秋清月轉霜輪河淡斗垂夜柄繩繩衣鉢付兒孫從此人天成藥病此達磨單傳如來自到境界并前六音而掃除之所以名出世間上上法也那知後來兒孫因藥發病未有智慧即説絶智慧未至十地即説超十地更須穿過七種第一義始得大慧此是過去未來現在諸如來應供等正覺性自性第一義心以性自性第一義心成就如來世間出世間出世間上上法聖慧眼入自共相建立如所建立不與外道論惡見共大慧云何外道論惡見共所謂自境界妄想見不覺識自心所現分齊不通大慧愚癡凡夫性無性自性第一義作二見諭唐云自相共相種種安立其所安立不與外道惡見共謂外道惡見不知境界自分別現於自性第一義見有見無而起言説通曰三世諸佛以性自性第一義心成就俗諦真諦中道第一義諦唯有聖慧眼入佛知見乃能於三諦圓融雖無自共相可得不妨入自共相建立真如所建立稱性而起與真如相應不落二見故不與外道惡見共也自相即真如自性共相即隨緣成事如此建立境界云何不與外道惡見共耶謂諸外道於自境界作妄想分別見不自覺了由自心所現如鏡中像如水中月不可謂之有不可謂之無此等分齊外道不通但於境界生則謂之有於境界滅則謂之無所云性無性自性者魏云無有實體即愚癡外道所謂流注亦滅是為無見無與有對便成二見於自性第一義中既見其有復見其無而起言説作斷滅議論不知自性第一義乃藏識真相諸佛非此無由成就一切世間出世間出世間上上法其可以斷滅論乎僧問南陽忠國師曰某甲曾讀大小乘教亦見有説不生不滅中道正性之處亦見有説此陰滅彼陰生身有代謝而神性不滅之文那得盡撥同外道斷常二見師曰汝學出世無上正真之道為學世間生死斷常二見耶汝不見肇公云談真則逆俗順俗則違真違真故迷性而莫返逆俗故言淡而無味中流之人如存如亡下士拊掌而笑之汝今欲學下士笑於大道乎曰師亦言即心是佛南方知識亦爾那有異同師不應自是而非他師曰或名異體同或名同體異因滋濫矣只如菩提涅槃真如佛性名異體同真心妄心佛智世智名同體異緣南方錯將妄心言是真心認賊為子有取世智稱為佛智猶如魚目而亂明珠不可雷同事須甄別曰若為離得此過師曰汝但子細返觀陰入界處一一推窮有纖毫可得否曰子細觀之不見一物可得師曰汝壞身心相耶曰身心性離有何可壞師曰身心外更有物否曰身心無外寧有物耶師曰汝壞世間相耶曰世間相即無相那用更壞師曰若然者即離過矣故能知陰入界處無纖毫可得即不墮於有知世間相那更用壞即不墮於無可無二見過患矣復次大慧妄想三有苦滅無知愛業緣滅自心所現幻境隨見今當説唐云我今當説若了境如幻自心所現則滅妄想三有苦及無知愛業緣魏云我為汝説虗妄分別以為有物為斷三種苦何等為三謂無知愛業因緣滅通曰外道不覺識自心所現如幻之境必欲滅境歸於斷滅不知無始流注是滅不得者雖欲滅三有苦不可得也雖欲斷癡愛業緣不可得也即使入非非想定總不出於三界欣寂厭動正是其妄想癡愛處為不了知幻故也若見得一切境界如幻皆隨自心所現即幻即空當下即是無生何處更有三界苦果何處更有無明愛緣彼無明妄想緣起愛業既有愛業便招苦果惑業苦三流轉三界非實有物可斷但了境如幻不作二見即通達藏識真相是名第一義諦悉檀今當説之黃檗云凡夫多為境礙心事礙理常欲逃境以安心併事以存理不知乃是心礙境理礙事但令心空境自空但令理寂事自寂勿倒用心也凡人多不肯空心恐落於空不知自心本空愚人除事不除心智者除心不除事只此數語可為斷滅寂滅定案矣大慧若有沙門婆羅門欲令無種有種因果現及事時住緣陰界入生住或言生已滅魏云本無始生依因果而現復作是説實有物住依諸緣故有陰界入生住滅故以生者滅故大慧彼若相續若事若生若有若涅槃若道若業若果若諦破壞斷滅論所以者何以此現前不可得及見始非分故大慧譬如破瓶不作瓶事亦如焦種不作芽事魏云彼沙門等説相續體本無始有若生若滅若涅槃若道若業若果若諦破壞諸法是斷滅論非我所説何以故以現法不可得故不見根本故譬如云云通曰外道有內外二種內即沙門外即婆羅門妄計無種有種即是無因而生魏云本無始生今實有事物依因果而現依時而作非真有也但依諸緣故緣五陰六入十八界有生住滅故緣滅即滅生者畢竟滅故始生既無因生者畢竟滅總歸於斷滅而已然生而滅滅而生中間相續之體彼亦以為未始有也魏云彼沙門等説相續體本無始有相續者既無則若作用之事若生滅之法若三界諸有為世間等法若涅槃若聖道若善業若四果若四諦為出世間等法彼皆一切而空之破壞諸法成斷滅論是外道邪見非我所説所以者何以此現前自心所現如幻之境了不可得故本自無生何須破滅外道不見根本第於境上見有見無究竟歸於斷滅至於本來離有離無非彼所見且非其分量所及也苟見及此則如來藏識真常流注出生一切如來正因正果是滅不得者彼既不見妄謂相續等一切斷滅譬如破瓶不作瓶事是無果也亦如焦種不作芽事是無因也豈不斷滅佛種乎此斷滅論所以為惡見也百丈上堂常有一老人聽法隨衆散去一日不去丈乃問立者何人老人云某甲於過去迦葉佛時曾住此山有學人問大修行底人還落因果也無對他道不落因果墮野狐身五百生今請和尚代一轉語丈云不昧因果老人於言下大悟天童頌云一尺水一丈波五百生前不奈何不落不昧商量也依前撞入葛藤窠阿呵呵會也麼若是你灑灑落落不妨我哆哆和和神歌社舞自成曲拍手其間唱哩囉據教中論不落因果是撥無斷見不昧因果是隨流得妙若作如是商量未夢見百丈在如是大慧若陰界入性已滅今滅當滅自心妄想見無因故彼無次第生大慧若復説無種有種識三緣合生者龜應生毛沙應出油汝宗則壞違決定義有種無種説有如是過所作事業悉空無義大慧彼諸外道説有三緣合生者所作方便因果自相過去未來現在有種無種相從本已來成事相成覺想地轉自見過習氣作如是説如是大慧愚癡凡夫惡見所噬邪曲迷醉無智妄稱一切智説通曰因上外道言諸陰界入有生住滅依諸緣故緣滅則滅不知陰界入有生住滅其性無生住滅今於過去未來現在見陰界入滅便謂其性亦滅於自心所現境界妄想分別作如此見謂一切無因終歸斷滅不知自心所現陰界入等生矣而滅滅矣而生次第相續皆由無始流注為之根本彼不見根本乃謂一切無因生故無次第相續生夫次第相續生生不已者即識也外道復説相續體本無始有謂此識亦是無種而有種但以神我根塵三緣和合而生緣合則生緣離則滅若果本無而今有龜應生毛沙應出油亦合本無而今有龜決定無毛沙決定無油外道所立無因之宗其説不成與決定之義自相違背故有種本無種之説有是過患也不但其説自壞即彼所作苦行事業如灰凝等咸歸斷滅悉空無益又何必作此苦行耶此其説非始於一人此其過非始於一日彼諸外道謂陰界入第皆由三緣和合而生者總不離緣故所作方便教理及事時住現有因果相狀終當已滅今滅當滅雖有種而實無種總歸一無因相也如是妄見從本已來師徒授受事業相承但於覺想地轉以覺想分別妄生計度所謂八萬劫前冥初生覺覺生性性生塵塵生根次第轉生二十五諦皆由自惡見過從無始來熏習餘氣作如是説彼固未覩覺想地前有如來藏識妙真如性明乎此者斯可稱一切智也愚癡凡夫不見根本是謂無智不覺識自心所現如幻境界是謂無一切智今以斷滅種性惡見所噬傷其慧命為有無二邊邪曲迷醉昏迷不謂本自無智妄謂得一切智以此無因之説通一切法一盲引衆盲相牽入火坑豈不深可痛哉九峰在石霜作侍者霜遷化後衆欲請堂中首座接續住持峰不肯乃云待某甲問過若會先師意如先師侍奉遂問首座云先師道休去歇去一念萬年去寒灰枯木去古廟香爐去一條白練去且道明甚麼邊事座云明一色邊事峰云恁麼則未會先師意在座云你不肯我那裝香來座乃焚香云我若不會先師意香煙起處脫去不得言訖便坐脫峰乃撫其背曰坐脫立亡則不無先師意未夢見在天童頌云石霜一宗親傳九峰香煙脫去正脈難通月巢鶴作千年夢雪屋人迷一色功坐斷十方猶點額密移一步看飛龍丹霞頌云戴角披毛異類身寒灰枯木眼中塵雖然未會先師意爭奈臨行一句新只為首座執著功勳以當尊貴故為九峰所抑大慧若復諸餘沙門婆羅門見離自性浮雲火輪乾闥婆城無生幻𦦨水月及夢內外心現妄想無始虗偽不離自心唐云觀一切法皆離自性如空中雲如旋火輪如尋香城如幻如焰如水中月如夢所見不離自心由無始虗妄見故取以為外妄想因緣滅盡離妄想説所説唐云作是觀已斷分別緣亦離妄心所取名義觀所觀受用建立身之藏識於識境界攝受及攝受者不相應無所有境界離生住滅自心起隨入分別唐云無能所取及生住滅如是思惟恆住不捨魏云如是思惟觀察自心以為生故通曰外道不覺知自心所現幻境於第一義中見有見無作二見論是為惡見非正見也若復諸餘沙門婆羅門不為惡見所噬於我法中觀一切法皆離自性如浮雲如火輪如尋香城觀一切法本自無生如幻事如陽𦦨如水中月觀一切法如夢所見種種妄想不離內外心現內心即無始虗偽種子外心即虗妄分別取著外境故曰內外心現如夢中事總之即前自心所現幻境而能隨處見得是妄也作是觀時能令妄想所因滅及妄想所緣滅煩惱消歇已除事障又離意言分別之説及所説境名字性空又除理障復以自心觀於所觀第八藏識現起相分其疏者受用建立所謂器界即六塵境也其親者身建立所謂根身即六根境也藏識是能觀而又觀乎藏識境界故曰觀所觀於此藏識境界有能取之心名之曰攝受即是七識細相也有所取之境名之曰攝受者即是八識自體也有能有所即不離生住滅也今觀於藏識境界不見有能取者不見有所取者於能所二者皆不相應唯離能所人法俱空即無影響蹤迹至無所有處既至無所有處入寂靜境界流注滅盡誰為生住滅耶是藏識純然一不生不滅境界也如是思惟觀察恆住不生不滅法中非是一向枯寂也不思議中自生法用一切無心故起隨入分別如下文隨入如來身隨入如如化隨入衆生微絀之心是也豈斷滅惡見可比哉起信論云菩薩創發心時即觀本識自性緣起因果之體若欲入唯識觀且識性無體又何所觀然但緣意言分別為境耳以一切境界但以名言為體故若離意言分別則無所有昔天台國清靜上座始遇玄沙示衆曰汝諸人但能一生如喪考妣吾保汝究得徹去靜躡前語問曰秪如教中道不得以所知心測度如來無上知見又作麼生沙曰汝道究得徹底所知心還測度得及否靜從此信入後居天台遐邇欽重時謂大靜上座常有人問弟子每當夜坐心念紛飛未明攝伏之方願垂示誨靜曰如或夜間安坐心念紛飛却將紛飛之心以究紛飛之處究之無處則紛飛之念何存反究究心則能究之心安在又能照之智本空所緣之境亦寂寂而非寂者蓋無能寂之人也照而非照者蓋無所照之境也境智俱寂心慮安然外不尋枝內不住定二途俱泯一性怡然此乃還源之要道也又因覩教中幻義乃述一偈問諸學流曰若道法皆如幻有造諸過惡應無咎云何所作業不亡而藉佛慈興接誘時有小靜上座答曰幻人興幻幻輪圍幻業能招幻所治不了幻生諸幻苦覺知幻幻本無為觀此二靜上座所見是深於唯識觀者必如是而後妄想三有苦滅無知愛業緣滅外道能及此乎大慧彼菩薩不久當得生死涅槃平等大悲巧方便無開發方便大慧彼於一切衆生界能悉如幻不勤因緣遠離內外境界心外無所見次第隨入無相處次第隨入從地至地三昧境界解三界如幻分別觀察當得如幻三昧度自心現無所有得住般若波羅蜜捨離彼生所作方便金剛喻三摩提隨入如來身隨入如如化神通自在慈悲方便具足莊嚴等入一切佛剎外道入處魏云一切衆生所樂處離心意意識是菩薩漸次轉身得如來身通曰正修行者入唯識觀則得二轉依號謂轉生死依涅槃轉煩惱依菩提總之轉識而成智也故於識境界無能所取及生住滅不久當得生死涅槃平等由七識滅盡染淨依亡不見有生死相不見有涅槃相所以一切平等彼自心生起隨入分別不離慈憫是大悲巧方便不假功行是無開發方便唯大悲巧故於衆生不捨然視之如幻實無衆生得滅度者惟無開發故不勤因緣修證遠離內外境界心境一如心外無法更無所見前者內外心現即是妄想因緣今者內外境離唯一真心故妄想因緣滅盡既無所見即無所受次第隨入無相處此即初住破無明顯法性處次第隨入從地至地三昧境界此即入行向地從假入真證無相三昧即正受也又從八地至十地出真入假解三界如幻以如幻智分別觀察度一切衆生是得如幻三昧功用繁興而寂靜自在乃能度越自心現無所有境界不墮偏空而住般若正智到彼岸也前者無所有境界雖無生住滅猶是聲聞緣覺所共今者度而越之并其人空法空而空之矣已得三空故名般若智既住般若智得無生法忍入等覺位捨離彼生所作方便頓斷俱生二障種子如金剛喻定初地所作方便二地破之二地所作方便三地破之至金剛後心所得之定更無能破者即超入妙覺故能隨入如來廣大法身隨入如如妙覺之化神通而且自在遊戲無礙不徒得其通而已慈悲方便而且具足莊嚴福慧兩足不徒得其慧而已等入一切佛剎魔剎無所不可外道入處即是魔剎即一切衆生所樂處蓋得無分別智普見色身三昧故也起信論云菩薩地盡滿足方便一念相應覺心初起心無初相以遠離微細念故得見心性心即常住名究竟覺又云以有如是大方便智除滅無明見本法身即與真如等遍一切處即此旨也所云離心意意識不但離妄想因緣除濁邊過患亦乃轉識成智除清邊過患故分別觀察得如幻三昧即轉六識為妙觀察智不久當得生死涅槃平等即轉七識為平等性智捨離彼生所作方便即轉前五識為成所作智到自覺聖趣如隨衆色摩尼即轉八識為大圓鏡智是菩薩漸次轉身得如來身必自習唯識觀始大陽明安上堂云莫行心處路莫坐無處功有無二俱離廓然天地空只此四句偈該括此段要旨大慧是故欲得如來隨入身者當遠離陰界入心因緣所作方便生住滅妄想虗偽唯心直進觀察無始虗偽過妄想習氣因三有思惟無所有佛地無生到自覺聖趣自心自在到無開發行唐云無功用行如隨衆色摩尼隨入衆生微細之心而以化身隨心量度諸地漸次相續建立是故大慧自悉檀善應當修學通曰此總結上文離心意意識漸次轉身得如來身應當修學也心指八識意指七識意識即六識五陰六入十八界不離前境心心所法因緣妄想所作方便設施有生住滅虗偽不實屬第六識及七識粗相也能遠離之是妄想因緣滅盡離妄想説所説也已覺了自心所現如幻境界但住心量直進觀察無始虗偽之過屬七識細相者妄想習氣之因屬二障種子者一切唯心是觀所觀受用建立身之藏識也三界所有皆是藏識建立能取所取皆與藏識不相應如是思惟到無所有境界是三界無所有離生住滅即是如來藏不生不滅地故曰佛地無生非是一向不生也到自覺聖趣自心起隨入分別即是不勤因緣自心自在到無功用行如隨衆色摩尼珠本自無色而衆色隨現是即大圓鏡智入如來身也所云隨入如如化者即以此隨衆色摩尼珠隨入衆生微細之心而以化身隨其心量度之如前贊佛偈度衆生離生滅度二乘離心識度外道離斷常度菩薩淨爾𦦨乃至度如來離覺所覺是為度諸地令達唯心漸次轉身得如來身相續建立法門也此第一義法施不離自性悉檀之最善者大乘諸度門諸佛心第一悉檀離言説我今當顯示此之謂也可不勤修學哉仰山上堂汝等諸人各自回光返照莫記吾言汝無始劫來背明投暗妄想根深卒難頓拔所以假設方便奪汝粗識如將黃葉止啼有甚麼是處亦如人將百種貨物與金寶作一鋪貨賣秪擬輕重來機所以道石頭是真金鋪我這裏是雜貨鋪有人來覓鼠糞我亦拈與他來覓真金我亦拈與他時有僧問鼠糞即不要請和尚真金仰曰齧錐擬開口驢年亦不會僧無對仰曰索喚則有交易不索喚則無我若説禪宗身邊要一人相伴亦無豈況有五百七百耶我若東説西説則爭頭向前來拾如將空拳誑小兒都無實處我今分明向汝説聖邊事且莫將心湊泊但向自己性海如實而修不要三明六通何以故此是聖末邊事如今且要識心達本但得其本不愁其末他時後日自具去在若未得本縱饒將情學他亦不得汝豈不見溈山和尚道凡聖情盡體露真常事理不二即如如佛此識心達本却是漸次轉身第一義爾時大慧菩薩復白佛言世尊所説心意意識五法自性相唐云唯願為我説五法自性相衆妙法門一切諸佛菩薩所行自心見等所緣境界不和合顯示一切説魏云諸佛菩薩修行之處遠離自心邪見境界和合故能破一切言語譬喻體相故成真實相一切佛語心唐云入自心境離所行相稱真實義諸佛教心為楞伽國摩羅耶此云出香山海中住處諸大菩薩説如來所歎海浪藏識境界法身唐云唯願為此山中諸菩薩衆隨順過去諸佛演説藏識海浪法身境界通曰此問五法三自性及藏識也上言觀所觀受用建立身之藏識但略示其端故大慧欲得其詳一切由藏識生起故曰衆妙法門惟其能生諸法故曰藏識海浪惟其本無生滅故曰法身境界五法者曰名曰相曰妄想曰正智曰如如三自性者曰妄想曰緣起曰成皆由心意意識轉變六七八識妄想緣起逐名逐相渾是一妄想境界如海湧波浪不復見海若妄想除滅正智現前圓成一性體自如如即海浪既息澄徹無邊乃真法身境界也故知一切名相即自心邪見所緣境界與之和合即名妄想諸佛菩薩修行之處不與和合而能遠離之即名正智能破一切言語不逐名也能破一切行相不逐相也而能顯示一切説説即無説成真實相相即無相即如如現前圓成自性矣此第一義心堅實不變乃是過去諸佛所説佛語心品為楞伽山諸大菩薩歎念海浪有如藏識説此法門故大慧願世尊為楞伽山中諸菩薩衆再説之也雲峰悅禪師上堂云有情之本依智海以為源含藏之流總法身而為體秪為情生智隔想變體殊達本情忘知心體合諸禪德會麼古佛與露柱相交佛殿與燈籠鬪額若也不會單重交拆覩雲峰所説實此段精髓試自卜之何如爾時世尊告大慧菩薩言四因緣故眼轉識何等為四謂自心現攝受不覺無始虗偽過色習氣計著識性自性欲見種種色相大慧是名四種因緣水流處藏識轉識浪生唐云一不覺自心現而執取故二無始時來取著於色虗妄習氣故三識本性如是故四樂見種種色相故以此四緣阿賴耶識如瀑流水生轉識浪通曰四緣謂根緣色緣識緣欲見緣也根緣者謂眼根及所對境皆自心所現不覺外塵唯是自心而生執取境至便攬此根緣也色緣者色塵本空由無始來執著為色計著不忘此色緣也識緣者識以分別為性於五處各能分別各有自性此識緣也欲見緣者以愛阿賴耶樂阿賴耶而為主宰見諸塵境自然心生貪著此欲見緣也以上四種因緣黏湛發知習氣種子如瀑流此名水流處藏識所轉識浪是八轉為七七轉為六如大海水變為波浪而轉識如浪以次相生謂由四因緣而轉也又細分之根緣攝受即前五識色習計著即第七識自性分別即第六識欲見種子即第八識此四種識互為因緣展轉相生總名曰轉識也清涼大疏釋相變體殊情生智隔二語譬如福德智慧具足相貌之人忽然夢見貧病苦身即相變也不見本身即體殊也執認云是我身即情生也不信自身福德端正即智隔也後人多以相變作想變非是僧問報慈情生智隔相變體殊情未生時如何慈云隔僧云情未生時隔箇甚麼慈云這稍郎子未遇人在故能悟則隨流可以認性不悟即情未生而去性遠矣唯轉識成智者妙解乎此大慧如眼識一切諸根微塵毛孔俱生隨次境界生亦復如是譬如明鏡現衆色像猶如猛風吹大海水外境界風飄蕩心海識浪不斷因所作相異不異合業生相深入計著不能了知色等自性故五識身轉大慧即彼五識身俱因差別分段相知當知是意識因彼身轉彼不作是念我展轉相因自心現妄想計著轉而彼各各壞相俱轉分別境界分段差別謂彼轉唐云如眼識餘亦如是於一切諸根微塵毛孔眼等轉識或頓生譬如明鏡現衆色像或漸生猶如猛風吹大海水又云因所作相非一非異業與生相相繫深縛不能了知色等自性五識身轉大慧與五識俱或因了別差別境相有意識生然彼諸識不作是念我等同時展轉為因而于自心所現境界分別執著俱時而起無差別相各自了境通曰轉識浪生眼識如是餘根亦如是乃至微塵毛孔亦如是或頓生如明鏡現像或漸生如風吹海水識與根俱生故曰頓指前五識也境界次第分別故曰漸指六識也外境界風飄蕩心海即前六塵不思議熏變故湛海興波識浪相續不斷指七識也是藏識心海為因而諸轉識其所作相也如大海為因而波浪其所作相也此二異不異相如前泥團微塵之喻何以明其異不異也彼所作之業是現行無明屬六識邊事妄想習氣因是種子生相屬八識邊事合業相與生相二者相繫深縛內依於八識外依於六識深入識田計著不捨屬七識邊事由此我愛堅執不能了知色等自性原屬八識相分如幻不實於是目攝受色耳攝受聲一切攬為己有故五識身轉五識通乎一身説身轉尚未流入意地分別故五識但能攬境無籌度心屬現量六識則能分別美惡等相屬比量非量即彼同時意識與前五識身俱境至識現剎那流入分別五塵分段差別之相一一了知即名第六意識然非五根攝受五塵差別之相則分別之知亦無自而起此六識又因彼五識身轉也彼諸識展轉相因而生本無自性譬如河中水湍流競奔逝各各不相知彼不作是念我等同時展轉相因但於藏識自心所現境界無始無明妄想習氣深入計著則謂七識轉既生執取而彼現前色等各各差別異相俱時攝受則謂五識轉從中分別過去五塵境界分段差別則謂六識轉遂乃謂五六七識各了自境於無差別中微有差別名彼為轉識若見其異其實同一海水故不異也僧問百丈對境如何得心如木石去丈云一切諸法本不自言空不自言色亦不言是非垢淨亦無心繫縛人但為人自生虗妄繫著作若干種解會起若干種知見生若干種愛畏但了諸法不自生皆從自己一念妄想顛倒取相而有知心與境本不相到當處解脫一一諸法當處寂滅當處道場會得百丈意旨則轉識無自生而覺海圓澄更有何事如修行者入禪三昧微細習氣轉而不覺知而作是念識滅然後入禪正受實不識滅而入正受以習氣種子不滅故不滅以境界轉攝受不具故滅唐云諸修行者入於三昧以習力微起而不覺知但作是念我滅諸識入於三昧實不滅識而入三昧以彼不滅習氣種故但不取諸境名為識滅通曰上言轉識浪生此言水流處藏識流急不見望如恬靜所謂陀那微細識習氣成瀑流也諸修禪定行者入於三昧已至滅生將盡之境其間微細生滅如無風匝匝之波乃無始習氣種子從中微起自不覺知而作是念我已滅識入於正定矣其實識未嘗滅也無論無始流注本不容滅即其間習氣種子潛伏未發如夾氷之魚實未始滅也故不得謂識滅彼但以現前境界轉有入無攝受不具之故名為識滅非無攝受之心但攝受之境不具耳此但暫時心不緣境若見其滅非實識滅也雖曰不取諸境猶未離能所取詎可以輕談寂滅乎哉隍禪師初參五祖結庵長坐積二十餘年不見惰容策禪師遊方屆於河朔聞隍曾參黃梅庵居歲久自謂正受策往問曰汝住於此作麼曰入定曰汝言入定有心耶無心耶若有心者一切蠢動之類皆應得定若無心者一切草木之流亦合得定曰我正入定時則不見有有無之心曰既不見有有無之心即是常定何有出入若有出入則非大定隍無語良久問曰師嗣誰曰我師曹溪六祖曰六祖以何為禪定曰我師云夫妙湛圓寂體用如如五蘊本空六塵非有不出不入不定不亂禪性無住離住禪寂禪性無生離生禪想心如虗空亦無虗空之量隍聞法要遂往參六祖祖言與策無二隍於言下豁然契悟前二十年所得心都無影響其夜河北士庶忽聞空中有聲曰隍禪師今日得道後回河北開化四衆夫定有出入即非大定為習氣種子未滅也唯悟無生即生滅非生滅而無始習氣頓息大慧如是微細藏識究竟邊際除諸如來及住地菩薩諸聲聞緣覺外道修行所得三昧智慧之力一切不能測量決了餘地相智慧巧便分別決斷句義最勝無邊善根成熟離自心現妄想虗偽宴坐山林下中上修能見自心妄想流注唐云唯有修行如實行者以智慧力了諸地相善達句義無邊佛所廣集善根不妄分別自心所見能知之耳通曰此申明前微細習氣覺知之難也微細藏識所謂不生不滅與生滅和合名為阿賴耶識湛入合湛歸識邊際湛入則謂之識真湛則謂之智智之與識名識邊際智即性識明知性周法界故無出入湛出則為行陰行如水流湛入則為識滅行陰內內湛明入至想元則無所入此識邊際最難究竟除諸如來及住地菩薩所得三昧智慧之力方能究竟至無惑地若二乘外道等所得三昧智慧不離湛不搖處此湛非真如急流水望如恬靜念念受熏終歸生滅以生滅心測不生滅其能決了乎哉唯餘修行如實行者在我法中以智慧力了諸地相已至住地菩薩位始捨藏識善能分別決斷識智邊際微妙句義此不但一佛二佛三四五佛而種善根已於無量千萬佛所種諸善根善根成熟習氣消融已離自心所現虗妄分別分別是識無分別是智唯能轉識而成智方能以智而辨識此豈一朝一夕之故由於宴坐山林修所斷得下中上修三界九地地各九品微細研窮已證無學智慧現前故能見自心妄想流注微細習氣如無風匝匝之波二乘所不覺者我一一能知是真能見性者也蓋未見性者性在識中性隨識轉故不能覺唯見性者性超識外識與性離故能見妄想流注彼入禪三昧者不見微細流注妄謂識滅豈能究竟識邊際哉百丈曰僧肇云菩提之道不可圖度高而無上廣不可極淵而無下深不可測語也垛生招箭言鑑覺猶不是從濁辨清許説如今鑑覺是除鑑覺外別有盡是魔説若守住如今鑑覺亦同魔説亦名自然外道説如今鑑覺是自己佛是尺寸語是圖度語似野干鳴猶屬黏膠門本來不認自知自覺是自己佛向外馳求覓佛假善知識説出自知自覺作藥治箇向外馳求病既不向外馳求病瘥須除藥若執住自知自覺是禪那病是徹底聲聞如水成氷全氷是水救渴難望由百丈言則經所云能見自心妄想流注雖是鑑覺亦不執之為是唯如是方能轉識成智也無量剎土諸佛灌頂得自在力神通三昧諸善知識佛子眷屬彼心意意識自心所現自性境界虗妄之想生死有海業愛無知如是等因悉已超度是故大慧諸修行者應當親近最勝知識通曰如實行者能見自心妄想流注則不為妄想流注所轉而能轉妄想流注使虗偽習氣當下遠離即能證入法身境界與十方如來氣分相接所以無量剎土諸佛與之灌頂將次補如來位得自在力神通三昧佛子眷屬自然圍繞良由彼於心意意識如實了知自心所現即是自性境界性本不生性本不滅若虗妄分別之想沉於三界生死苦海以六識為因若染淨之業依於我愛計著以七識為因若根本無明習氣種子以八識為因如是等因悉已超度八識俱轉即名正智妄想既離即是如如此所謂最勝知識也前説藏識海浪法身境界衆妙法門至是方為究竟是故諸修行者應當親近最勝知識入佛知見不可為二乘外道惡見所噬百丈云大身隱於無形大音匿於希聲如木中之火如鐘鼓之聲因緣未具時不可言其有無傍報生天棄之如涕唾菩薩六度萬行如乘死尸過岸如在牢獄廁孔得出佛披三十二相相喚作垢膩之衣亦云若説佛一向不受五陰無有是處佛不是虗空何得一向不受佛秪是去住自由不同衆生從一天界至一天界從一佛剎至一佛剎諸佛常法此可知最勝知識由法身現起神通三昧大不可思議故學人宜近之爾時世尊欲重宣此義而説偈言譬如巨海浪斯由猛風起洪波鼓冥壑無有斷絶時藏識海常住境界風所動種種諸識浪騰躍而轉生青赤種種色珂乳及石蜜淡味衆華果日月與光明非異非不異海水起波浪七識亦如是心俱和合生譬如海水變種種波浪轉七識亦如是心俱和合生通曰此頌外境界風飄蕩心海識浪不斷因所作相異不異也青赤色塵也珂貝聲塵也乳香塵也石蜜淡味味塵也華果法塵也即因果等法日月喻體光明喻用如泥團微塵非異不異故八識為體諸識為用塵由識生識由塵生皆自心所現非異非不異也兩句七識亦如是心俱和合生一者七識外依六識合所作業相而生二者七識內依八識合生因相而生依六識者如巨海水為境界風鼓動波浪次第相續無有斷絶七識外與六識和合亦猶是也依八識者如海水澄湛常住忽然騰躍而變一念初動種種諸識因之流轉七識黏湛發知內與八識和合亦猶是也黃檗云同是一精明分為六和合一精明者一心也六和合者六根也此六根各與塵合眼與色合耳與聲合鼻與香合舌與味合身與觸合意與法合中間生六識為十八界若了十八界無所有束六和合為一精明一精明者即心也學道人皆知心但不免作一精明六和合解遂被法縛不契本心吁既為法縛即為識轉欲覩藏識海常住面目其可得耶謂彼藏識處種種諸識轉謂以彼意識思惟諸相義不壞相有八無相亦無相唐云心意及意識為識相故説八識無別相無能相所相譬如海波浪是則無差別諸識心如是異亦不可得二譯無七識亦如是心俱和合生重句但云譬如海水動種種波浪轉藏識亦如是種種諸識生通曰上頌轉識浪生非不異此下頌藏識非異也藏識因不思議熏及不思議變由是八轉七七轉六同時展轉相因各不相知本自寂滅而謂彼藏識處種種諸識轉者但以彼意識分別其間思惟諸識相之義説此是七識此是五識此是六識名為種種諸識浪生若見其異其實但一八識更無異相無能相亦無所相譬如種種波浪只是一大海水更無差別故謂小波大浪異於海水則不可也諸識心亦如是雖轉而實不轉也故曰異亦不可得大凡可壞者則見其異為有能相有所相則可壞今八識遠離能所是為無相無相之相亦無純乎妙湛之體故不可壞無相是不生也無相亦無相是不滅也不生不滅故名藏識海常住而孰其壞之無可壞故不異昔鶴勒那尊者問二十二祖曰我有何緣而感鶴衆祖曰汝第四劫中常為比丘當赴會龍宮汝諸弟子咸欲隨從汝觀五百衆中無有一人堪任妙供時諸弟子曰師常説法於食等者於法亦等今既不然何聖之有汝即令赴會自爾汝捨生趨生轉化諸國其五百弟子以福微德薄生於羽族今感汝之恩故為鶴衆相隨者曰以何方便令彼解脫祖曰我有無上法寶汝當聽受化未來際而説偈曰心隨萬境轉轉處實能幽隨流認得性無喜亦無憂時鶴衆聞偈飛鳴而去若會得轉處實能幽性自如如何異之有心名採集業意名廣採集諸識識所識現等境説五魏云心能集諸業意能觀集境識能了所識五識現分別通曰諸識本自不異何以有異名但一念初動不無淺深次第各就其重者得名耳自其受熏持種集染淨業靡不包含則名曰心為第八識尚未流於意流於識也自其偏執我法恆審思量傳送出入廣積諸業則名曰意為第七識雖未入於識而已離於心矣眼耳鼻舌身諸識皆識也唯意識能分別前五之所識雖過去五塵亦能了別故名第六識而前五識對境方現離境則無故名之曰現識也論意識力最強即八識七識亦能分別不但前五而已也心意識雖有三名然其在心即意之心識之心也其在意即心之意識之意也其在識即心之識意之識也猶之波浪即海之波海之浪也雖欲異得乎青林虔禪師上堂祖師門下鳥道玄微功窮皆轉不究難明汝等諸人直須離心意識參出凡聖路學方可保任若不如是非吾子息故未離心意識即不逢一人猶屬功勳邊事轉功就位不行鳥道斯能超出凡聖而遊於性海矣爾時大慧菩薩以偈問曰青赤諸色像衆生發諸識如浪種種法云何唯願説爾時世尊以偈答曰青赤諸雜色波浪悉無有採集業説心開悟諸凡夫彼業悉無有自心所攝離所攝無所攝與彼波浪同唐云青赤諸色像浪中不可得言心起衆相開悟諸凡夫而彼本不起自心所取離能取及所取末句同受用建立身是衆生現識於彼現諸業譬如水波浪通曰大慧因佛説心意識有異名無異性不解斯旨乃以偈問色等五塵如境界風衆生發識如波浪轉既有種種名目斯非一矣而又云不異者云何唯願説之佛亦以偈答法喻並舉謂以採集業名心者一真如心中原無青赤諸色如大海水原無波浪本無業相而又説採集業者為凡夫有染淨心故若無染淨等心即是真如所以開悟凡夫使知本來無一物也且彼業相本自不起取境之心本自遠離心境不相到法法不相知故心不知境則無能攝境不知心則無所攝與彼波浪各各不相知者同也夫能攝所攝與八識自心實不相應則七識六識原自無有故曰意能觀集境識能了所識而意與識亦與境遠離也至如對現境説五者內而根身受用外而器界建立依正不同皆是自心所現塵與根對識與之俱是名衆生之現識於彼現有染淨諸業相種種不同唯是一心變起譬如海水現諸波浪彼現識轉生若見其異要之波即是水實未始異也楊岐山甄叔禪師上堂羣靈一源假名為佛體竭形消而不滅金流朴散而常存性海無風金波自湧心靈絶非萬象齊照體斯理者不言而遍歷沙界不用而功益玄化如何背覺反合塵勞於陰界中妄生囚執此發明心識本來無有可為開悟凡夫之一助爾時大慧菩薩復説偈曰大海波浪性鼓躍可分別藏與業如是何故不覺知爾時世尊以偈答曰凡夫無智慧藏識如巨海業相猶波浪依彼譬類通通曰此大慧問藏識如大海轉識如波浪因境界風鼓躍而起猶可意識分別而知唯是藏識中業相種子由不思議熏及不思議變何故不能覺知世尊答曰此是藏識微細生滅唯諸如來及住地菩薩有智慧者方能覺知凡夫無智慧安能及此唯可以譬喻得解藏識一大海也轉相為有風之波浪業相為無風之波浪有風者因鼓躍而可見無風者實匝匝而難窺依彼類推可以意解然非有上根智慧終不能究盡也空識道人智通看法華觀頓有省連作二偈見意其一曰浩浩塵中體一如縱橫交互印毗盧全波是水波非水全水成波水自殊其二曰物我原無異森羅鏡像同明明超主伴了了徹真空一體含多法交參帝網中重重無盡處動靜悉圓通如此等智慧能發明向上事豈但辨別藏識業相而已乎爾時大慧菩薩復説偈言日出光等照下中上衆生如來照世間為愚説真實已分部諸法何故不説實爾時世尊以偈答曰若説真實者彼心無真實譬如海波浪鏡中像及夢一切俱時現心境界亦然境界不具故次第業轉生識者識所識意者意謂然五則以顯現無有定次第譬如工畫師及與畫弟子布彩圖衆形我説亦如是彩色本無文非筆亦非素為悅衆生故綺錯繪衆像言説別施行真實離名字分別應初業修行示真實真實自悟處覺想所覺離此為佛子説愚者廣分別種種皆如幻雖現無真實如是種種説隨事別施設所説非所應於彼為非説彼彼諸病人良醫隨處方如來為衆生隨心應量説妄想非境界聲聞亦非分哀愍者所説自覺之境界通曰大慧前問何不一切時演説真實義而復為衆生分別説心量此復申前問如來照世如日在天高低普應一切平等何故分剖八識諸法而不説一藏識真實義耶不知真實境界原無相狀但可自悟不容言説若説真實者彼心實無真實可得但可譬喻而得解悟説如海之波浪使知海本無波説如鏡之影像使知鏡本無像及如夢之境界使知夢非實境然而分部諸法謂七識黏湛發起如海之波五識對至即現如鏡之像六識種種分別如夢之境一切隨時而現自心現起境界固如是也其實所現境界原自不具故若自性具有者無風之時何故無波無形之時何故無像無緣之時何故無夢以此知次第生起皆由業相轉生而一切境界唯心所現故業相轉生為六識者以其識能了別前五所識之境也業相轉生為七識者以其意能然不然詳審籌度執著為我也業相轉生為五識者以顯對五塵隨塵發現無有一定之次第也魏云定中無如是蓋指八識湛不搖處凝然常定實無洪波鼓躍次第可見吾為此分別以語人者譬如畫師為諸弟子布彩圖形種種各異其實彩色自性原無文綺筆但染彩非彩所出縑素無文非文所生而綺繪交錯衆像斯顯為悅衆生心目故吾説亦如是但以悅可衆生使之有所持循漸入真實境界耳然真實非可以言顯也謂之言説與真心實際施行各別謂之真實與言語文字了無相干魏云言説離真實真實離文字故言説分別但可誘引初機而真實修行者乃為示真實義然真實自悟之處能覺所覺俱已遠離故非言説所及在我以不説説在彼以不聞聞此但可菩薩位中上根利智者道耳若為愚者應廣分別心意意識等説種種方便皆如幻法如海之波如鏡之像如夢之境雖隨時顯現而無真實如是種種諸説隨其事相分別施設開譬明白容易曉了但以應衆生之機耳若驟然而以真實之義語之則非説非其所應受彼反以為非説所謂説法不投機翻成大妄語法華會上拂衣而去者皆斯徒也故分別言説因人而施如良醫應病授藥隨宜而用然醫者用藥哀愍病人期於無病而止如來説法哀愍衆生期於見性而止故佛所説種種諸法隨心應量不墮於有無妄想故非外道所知不墮於偏空我執亦非聲聞所知説如幻法即所以説真實法真實與諸法異不異是如來自覺之境界覺想所覺離乃真實第一義諦也故謂廣説海浪藏識即為説法身境界可也又何嘗不説真實哉百丈云須識了義教不了義教語須識遮不遮語須識生死語須識藥病語須識逆順喻語須識總別語説道修行得佛有修有證是心是佛即心即佛是佛説是不了義教語是不遮語是總語是升合擔語是揀穢法邊語是順喻語是死語是凡夫前語不許修行得佛無修無證非心非佛亦是佛説是了義教語是遮語是別語是百石擔語是三乘教外語是逆喻語是揀淨法邊語是地位人前語從須陀洹向上直至十地但有語句盡屬法塵垢但有語句盡煩惱邊收但有語句盡屬不了義教了義教是持不了義教是犯佛地無持犯了義不了義盡不許也如百丈所云佛地離覺所覺孰謂真實而可以言説者哉復次大慧若菩薩摩訶薩欲知自心現量攝受及攝受者妄想境界當離羣聚習俗睡眠初中後夜常自覺悟修行方便當離惡見經論言説及諸聲聞緣覺乘相當通達自心現妄想之相通曰上言能見自心妄想流注應當親近最勝知識此復叮嚀當離外道惡見及二乘相即通達自心現妄想之相蓋八識境界即是自心現量於攝所攝不相應其中能取所取妄想境界唯是前七見分所緣奔逸六塵則為羣聚喧雜耽著無記則為習俗睡眠謂一切斷滅則同外道惡見謂一切空寂則同二乘偏空其所現者皆不離前七妄想境界往往執為自心而不知此為自心所現之相也若能初中後夜常自覺悟與彼羣聚睡眠者離矣修行善巧方便與彼外道二乘者離矣當能通達此是相不是心此是妄不是真泯妄歸真離攝所攝即名正悟而得證於自心現量如實境界矣僧問黃檗佛窮得無明否檗云無明即是一切諸佛得道之處所以緣起是道場所見一塵一色便合無邊理性舉足下足不離道場道場者無所得也我向你道秪無所得名為坐道場云無明者為明為暗檗云非明非暗明暗是代謝之法無明且不明亦不暗不明秪是本明不明不暗秪這一句子亂却天下人眼所以道假使滿世間皆如舍利弗盡思共度量不能測佛智其無礙慧出過虗空無你語論處若能通達無明即是本明則自心現妄想之想即是真如非得無礙慧者不能辨此復次大慧菩薩摩訶薩建立智慧相住已於上聖智三相當勤修學何等為聖智三相當勤修學所謂無所有相一切諸佛自願處相自覺聖智究竟之相修行得此已能捨跛驢心智慧相得最勝子第八之地則於彼上三相修生通曰通達自心現量遠離外道二乘妄想境界即是轉識成智猶未可語上上智也何以故為有智相可得故住於智慧相即是所知障故當修學上上聖智三相也三相者何一無所有相即是空相二一切諸佛自願處相即是無願相三自覺聖智究竟之相即是無相相修此三空理行具足能捨跛驢心智慧相七地以前觀三界生死不定心名跛驢慧以不能行故能知而不能行其力未充至第八地無功用行方與自性湊泊由於彼上上聖智三相修行而生也長沙岑令僧問同參會和尚未見南泉時如何會良久僧云見後如何會云不可別有也僧回舉似沙沙云百尺竿頭坐底人雖然得入未為真百尺竿頭須進步十方世界是全身僧云百尺竿頭如何進步沙云朗州山澧州水僧云不會沙云五湖四海王化裏天童頌云玉人夢破一聲雞轉生涯色色齊有信風雷催出蟄無言桃李自成蹊及時節力耕犁誰怕春疇沒脛泥明此則跛驢智可捨而如幻三昧身可得矣大慧無所有相者謂聲聞緣覺及外道相彼修習生唐云謂慣習一切二乘外道相故而得生起大慧自願處相者謂諸先佛自願處修生魏云諸佛本自作願住持諸法大慧自覺聖智究竟相者一切法相無所計著得如幻三昧身諸佛地處進起行生唐云謂由不取一切法相成就如幻三昧身趣佛地智故而得生起大慧是名聖智三相若成就此聖智三相者能到自覺聖智究竟境界是故大慧聖智三相當勤修學通曰無所有相者從修所斷得二乘外道所共故本來無一物由慣習彼空相而得生起是為聖智第一相也自願處相者謂先佛本立誓願欲令一切衆如我等無異故住持諸法不令斷絶願即無願是無聖智第二相也自覺聖智究竟相更有進於此者不取法相不落無所有處不取非法相不落自願處得金剛如幻三昧應身無量趣佛地智入佛知見唯佛與佛乃能究盡所謂最上第一義是為聖智第三相也成就三相不無次第總歸到自覺聖智究竟境界而止此固非二乘外道所測故曰自覺之境界轉識成智必至是而極可不勤修學哉僧問黃檗聲聞人藏形於三界不能藏於菩提者如何檗云聲聞人但能斷三界見修已離煩惱不能藏於菩提故還被魔王於菩提中捉得於林中宴坐還成微細見菩提心也菩薩人已於三界菩提決定不捨不取不取故七大中覓他不得不捨故外魔亦覓他不得汝但擬著一法印子早成也印著有即六道四生文出印著空即無相文現如今但知決定不印一切物此即為虗空不一不二空本不空印本不有十方虗空世界諸佛出世如見電光一般觀一切蠢動含靈如響一般見十方微塵國土恰似海中一滴水相似聞一切甚深法如幻如化心心不異法法不異乃至千經萬論秪為你之一心若能不取一切相故言如是一心中方便勤莊嚴黃檗別白二乘菩薩無所有相天淵之隔要歸於不取一切相而如幻三昧則得現前真能到自覺聖智究竟處爾時大慧菩薩摩訶薩知大菩薩衆心之所念名聖智事分別自性經承一切佛威神之力而白佛言世尊惟願為説聖智事分別自性經百八句分別所依唐云惟願為説百八句差別所依聖智事自性法門如來應供等正覺依此分別説菩薩摩訶薩入自相共相妄想自性以分別説妄想自性故則能善知周遍觀察人法無我淨除妄想照明諸地唐云一切如來應正等覺為諸菩薩墮自共相者説此妄計性差別義門知此義已則能淨治二無我觀照明諸地超越一切聲聞緣覺及諸外道諸禪定樂觀察如來不可思議所行境界畢定捨離五法自性諸佛如來法身智慧善自莊嚴唐云以一切佛法身智慧而自莊嚴起幻境界升一切佛剎兜率天宮乃至色究竟天宮逮得如來常住法身唐云住一切剎兜率陀宮色究竟天成如來身通曰上言當通達自心現妄想之相而又示以聖智三相當勤修學夫唯有聖智方能分別三自性是聖智者百八句分別所依如來依此分別妄想自性為諸菩薩墮自共相者説此妄計性差別義門知此則能善知二無我觀淨除妄想而成正智照明諸地而證如如豈但超越二乘外道禪定之樂且見諸如來不可思議所行境界無纖毫可得畢定五法三自性俱捨八識二無我皆離以一切佛法身智慧而自莊嚴入如幻境住兜率宮於色究竟成如來身即是法身莊嚴也此大慧承諸佛神力以慰衆心欲佛分別諸法顯示最上聖智成佛之正因也前云聖慧眼入自共相建立有聖慧眼即建立自共相與如如不異無聖慧眼即落妄想分別不離五陰界處作自相共相見唯人法二無我所以淨治之也子胡和尚示衆云諸法蕩蕩何絆何拘汝等於中自生難易心源一統綿亘十方上上根人自然明白不見南泉道如斯癡鈍世且還稀歷歷分明有無不是只少箇丈夫之志致見如斯疲勞汝欲得易曾麼自古及今未曾有一箇凡夫聖人出現汝前亦無有一個善語惡語到汝分上為甚麼故為善善無形為惡惡無相既已無我把甚麼為善惡立那個是凡聖汝信否還保任否有甚麼回避處恰似日中逃影相似還逃得麼今之既爾古之亦然今古齊時汝還諱得麼佛法玄妙了得者自相䇿發無為小緣妨於大事汝不見道寧可終身立法誰能一旦亡緣仁者要得會禪麼各歸衣鉢下看據子胡見處更無善惡凡聖了無自共相可得是最上聖智法門佛告大慧有一種外道作無所有妄想計著覺知因盡唐云見一切法隨因而盡生分別解想兔無角想如兔無角一切法亦復如是大慧復有餘外道見種四大求那依也極微陀羅驃塵也形處橫法各各差別見已計著無兔角橫法作牛有角想唐云有外道見大種依塵等諸物形量分位各差別已執兔無角於此而生牛有角想通曰上言無所有相謂聲聞緣覺及外道相彼修習生緣覺聲聞修習已離名相妄想及緣起妄想證偏空理外道入無想定者亦未甚異復有一種外道惡見但以妄想計著世間一切法自體無體隨因而盡遂謂本來無有如兔無角而生一斷見生既無因不成其有是以無因為無所有也又有外道見四大種性依微塵生者形量分位各各差別昭然可覩見已計著實無兔角虗妄分別作牛有角想而生一常見夫一切法本自不無今執以為因盡畢竟斷滅是橫法也諸微塵性本不能生今以無而形有遂謂實有生因亦橫法也如此橫計皆妄想耳不可與二乘並論已百丈云若執本清淨本解脫自是佛自是禪道解者即屬自然外道若執因緣修證得者即屬因緣外道執有即屬常見外道執無即屬斷見外道執亦有亦無即屬邊見外道執非有非無即屬空見外道亦名愚癡外道秪如今但莫作佛見涅槃等見都無一切有無等見亦無無見名正見一切聞亦無無聞名正聞是名摧伏外道由百丈言但自生一念便落有無即是外道種子安可不自覺破大慧彼墮二見不解心量自心境界妄想增長身受用建立妄想根量唐云彼墮二見不了唯心但於自心增長分別身及資生器世間等一切皆惟分別所現大慧一切法性亦復如是離有無不應作想大慧若復離有無而作兔無角想是名邪想彼因待觀故兔無角不應作想乃至微塵分別自性悉不可得大慧聖境界離不應作牛有角想唐云應知兔角離於有無諸法悉然無生分別云何兔角離於有無互因待故分析牛角乃至微塵求其體性終不可得聖智所行遠離彼見是故於此不應分別通曰外道邪見不越有無二種世尊先總破之只是不了唯心所現但於身心境界增長分別故於內而身及資生外而器界建立如是根量皆自心所現外道不解於中見有見無而生分別不知藏識性離於有無不應分別也一切法性亦皆如是彼本離有無相不應更作有無想或作有想或作無想如辨空中之華為有為無不知彼太虗之體本自離也又分破之若復一切法性離於有無於離有無中作兔無角想見一切諸法總歸於無是非正見但名邪想何以明其為邪也彼所謂無者非真無也但因牛角有見兔角無是有與無互相因待而立故作是觀者對待宛然既有對待即應俱有不得言無彼作兔無角想者妄矣餘有餘外道見四大種性依微塵生作牛有角想若果有者必有自性為發生因今分析牛角乃至微塵求其實性終不可得微細推求本無微塵自性誰生四大各各差別相乎既無體相則彼作牛有角想者妄矣若聖智所行境界遠離彼有無二見廓然太虗不應作牛有角想也唐云是故於此不應分別有無總結之良是龐居士偈曰昔日在有時常被有人欺種種生分別見聞多是非後來入無時又被無人欺一向觀心坐冥冥無所知有無俱是執何處是無為有無同一體諸相盡皆離心同虗空故虗空無所依若問無相理唯有父王知此聖智境界非有非無却能知有知無故有無同體不作於想非通達唯心之旨卒難了此爾時大慧菩薩摩訶薩白佛言世尊得無妄想者見不生想已隨比思量觀察不生妄想言無耶佛告大慧非觀察不生妄想言無所以者何妄想者因彼生故依彼角生妄想以依角生妄想是故言依因故離異不異故非觀察不生妄想言無角大慧若復妄想異角者則不因角生若不異者則因彼故乃至微塵分析推求悉不可得不異角故彼亦非性二俱無性者何法何故而言無耶唐云異於有角言無角者如是分別決定非理二俱非有誰待於誰大慧若無故無角唐云若相待不成觀有故言兔無角者不應作想大慧不正因故而説有無二俱不成通曰大慧此疑甚深因佛言有無分別悉是妄想若聖境界能離有無二見得無妄想者見此不生妄想境界渾然是無豈不同於外道比度觀察不生妄想而言無耶過在一見字見有分別者固非見無分別者亦非此照心未忘也故佛言非觀察不生妄想言無但悟一切有無妄想本無自性當下即本不生非同外道言兔無角不生妄想境界也所以者何外道兔無角妄想不離前境分別因彼角之有無而生虗妄分別心故依彼牛有角生此兔無角妄想隨比思量言一切法無以依彼虗妄角生此分別心是故言有依有因故因者因境而生心依者依有而説無總不離前境而生分別也若無前境則分別之心何自而生耶由是言之妄想本自無根離異不異故若異則有異性可得若不異則有不異性可得今非異非不異即無自性可得既無自性豈有生時本自不生即離有無妄想何待觀察不生而後言無與彼言無角者同耶何言乎離異不異也若分別妄想與彼角異者則妄想別有自性應離角有非因角有今妄想因角而生不可謂異也若謂妄想與角不異者則角與妄想應無分別今因彼角生此妄想又未嘗不異也説異又成不異説非異又成異是妄想自性了不可得非但妄想自性不可得即彼前境牛角分析至於微塵乃至微塵分析至於鄰虗求其體性悉不可得無有實物可當分別不異兔無角故是彼牛角亦非有性也即牛角原非有性與兔角同則二法俱無自性可得何等法有何等法無誰為對待之故而言兔無角耶若無法無故相待不成即無兔無角等見今唯觀牛角有故而言兔無角者是因有而見其無對待宛然雖無亦有也故不應作無角想何以故為其有無相待生滅為因不正因故若正因者了達無生之旨遠離有無二見有而不有無而不無即是聖智所行境界彼不正因而説有無如離太虗而辨空華説有説無總歸於妄猶邀空華結為空果畢竟何所成就故曰二俱不成外道問佛不問有言不問無言世尊良久外道讚歎云世尊大慈大悲開我迷雲令我得入外道去後阿難問佛外道有何所證而言得入佛云如世良馬見鞭影而行雪竇頌云機輪曾未轉轉必兩頭走明鏡忽臨臺當下分妍醜妍醜分兮迷雲開慈門何處生塵埃因思良馬窺鞭影千里追風喚得回喚得回鳴指三下外道雖不問有無滯在湛不搖處如機輪未轉耳一轉必落有無豈知世尊大圓鏡智覓有無之相了不可得本自不生何必説不有不無世尊無心故自妍外道有意故自醜外道於此悟去本來無一物何處惹塵埃真如良馬見鞭影而行雪竇鳴指三下再舉鞭影要與世尊良久處相見千載而下有如外道得入者乎大慧復有餘外道見計著色空事形處橫法不能善知虗空分齊言色離虗空起分齊見妄想唐云復有外道見色形狀虗空分齊而生執著言色異虗空起於分別大慧虗空是色隨入色種大慧色是虗空持所持處所建立性色空事分別當知魏云虗空是色以色大入虗空故色是虗空依此法有彼法依彼法有此法故唐云色空分齊分別應如是知大慧四大種生時自相各別亦不住虗空非彼無虗空魏云四大種生自相各別不住虗空而四大中非無虛空如是大慧觀牛有角故兔無角大慧又牛角者析為微塵又分別微塵剎那不住唐云又析彼塵其相不現彼何所觀故而言無耶若言觀餘物者彼法亦然唐云若待餘物亦彼如是爾時世尊告大慧菩薩摩訶薩言當離兔角牛角虗空形色異見妄想汝等諸菩薩摩訶薩當思惟自心現妄想隨入為一切剎土最勝子以自心現方便而教授之唐云應常觀察自心所見分別之相於一切國土為諸佛子説觀察自心修行之法通曰上外道謬計一切法如兔無角屬斷見此外道執著色異虗空屬常見彼謂大種依微塵生形量分位各各差別是名形處橫法不達虗空分齊而謂色離於虗空遂起色分齊妄想而謂虗空離於色故謂之橫若善知色空分齊者虗空即是色如經所云譬如虗空遍至一切色非色處隨入色種中空未嘗與色異也色亦即是虗空空為能持色為所持於所持處建立諸色依此空法有彼色法空即色所建立之性色亦未嘗與空異也此所謂性色真空性空真色色空事分齊分別當如是知若外道所計四大種生時堅濕暖動自相各別既有形狀即非虗空故云亦不住虗空是以四大在虗空之外矣然又計四大有生即有滅滅即歸於虗空故又云非彼無虗空復以虗空在四大之外矣故名形處橫法此外道執有見者因空而見其有也既如是然則彼外道執無見者因有而見其無亦如是也其橫則一旦彼執為有者豈定有乎其執為無者豈定無乎彼觀牛角有知兔角無所因待而觀者在牛角也藉令牛角析為微塵又析微塵至於鄰虗剎那不住其相不現彼將何所比觀而言無耶所待者既無則無見無自而起故知彼所計無者妄也即是例推若言觀餘物各各差別作牛有角想彼所待者空也藉令非空彼將何所比觀而言有耶所待者既無則有見無自而起故知彼所計有者妄也是兔角與牛角異空與影色異如是見者是為異見如是想者是為妄想汝等菩薩當遠離之應當思惟一切萬法皆自心所現若能通達自心所現妄想之相妄本無根當下本自不生即無有無可得隨入一切剎土為諸佛子説觀察自心方便修行之法離有無不應作想以此教授是名正因終有成就汝等菩薩應當修學秦跋陀禪師問生法師講何經論生曰大般若經師曰作麼生説色空義曰衆微聚曰色衆微無自性曰空師曰衆微未聚喚作甚麼生罔措師又問別講何經論曰大涅槃經師曰如何説涅槃之義曰涅而不生槃而不滅不生不滅故曰涅槃師曰這箇是如來涅槃那箇是法師涅槃曰涅槃之義豈有二耶某甲秪如此未審禪師如何説涅槃師拈起如意曰還見麼曰見師曰見箇甚麼曰見禪師手中如意師將如意擲於地曰見麼曰見師曰見箇甚麼曰見禪師手中如意墮地師斥曰觀公見解未出常流何得名喧宇宙拂衣而去其徒懷疑不已乃追師叩問我師説色空涅槃不契未審禪師如何説色空義師曰不道汝師説得不是汝師秪説得果上色空不會説得因中色空其徒曰如何是因中色空師曰一微空故衆微空衆微空故一微空一微空中無衆微衆微空中無一微若跋陀者真能以自心現方便而教授之也爾時世尊欲重宣此義而説偈言色等及心無色等長養心身受用安立藏識現衆生唐云心所見無有唯依心起故身資所住處唯依識藏現心意及與識自性法有五無我二種淨廣説者所説長短有無等展轉互相生以無故成有以有故成無微塵分別事不起色妄想心量安立處惡見所不樂覺想非境界唐云外道非行處聲聞亦復然救世之所説自覺之境界通曰色等及心無此一無字是真無境界即前所云無所有相是也不了唯心妄生分別故色等依心而起由心長養有心心所法內而根身外而器界見相二分皆藏識所現本自無生但衆生見其有耳故曰現衆生如來為度衆生故分別心意及識諸識次第皆由藏識生起約三自性立名相等五法歸於二無我淨方與前無字相應此如來廣説經論之所説約而言之一無字足矣外道不明此無原雖有無等見原非對待之法乃以長短相形有無相生互相展轉執為己見以無成有以有成無不離對待説無所有若使微塵分析本自無色其色妄想從何而起既不見色何因説無故知彼説有説無皆妄也若悟心量自心所現境界身及資生器世間安立之處本自無生湛然常寂外道惡見所噬不樂聞此所以者何以未離覺想故覺想即是妄根覺想執著不離生滅雖説無所有非真無所有境界也即聲聞所證寂滅與外道懸殊亦不能窺如來所行之處如來救世興大悲心所説不可思議境界五法三自性皆空八識二無我俱遣唯可自覺難以語人彼外道所執有無二乘所證偏空不離名相妄想安能測正智如如之境哉玄沙云夫佛出世者元無出入名相無體道本如如法耳天真不同修證秪要虗間不昧作用不涉塵泥個中纖毫道不盡即為魔王眷屬句前句後是學人難處所以一句當天八萬門永絶生死直饒得似秋潭月影靜夜鐘聲隨扣擊以無虧觸波瀾而不散猶是生死岸頭事道人行處如火銷冰終不却成冰箭既離弦無返回勢所以牢籠不肯住呼喚不回頭古聖不安排至今無處所若到這裏步步登玄不屬邪正識不能識智不能知動便失宗覺即迷旨二乘膽顫十地魂驚語路處絶心行處滅直得釋迦掩室於摩竭淨名杜口於毗耶須菩提唱無説而顯道釋梵絶聽而雨華若與麼見得更疑何事玄沙數語演唱色等及心無自覺之境界極為透露非此語固難明此宗爾時大慧菩薩為淨除自心現流故復請如來白佛言世尊云何淨除一切衆生自心現流為頓為漸耶佛告大慧漸淨非頓如菴羅果漸熟非頓如來淨除一切衆生自心現流亦復如是漸淨非頓譬如陶家造作諸器漸成非頓如來淨除一切衆生自心現流亦復如是漸淨非頓譬如大地漸生萬物非頓生也如來淨除一切衆生自心現流亦復如是漸淨非頓譬如人學音樂書畫種種技術漸成非頓如來淨除一切衆生自心現流亦復如是漸淨非頓譬如明鏡頓現一切無相色像唐云譬如明鏡頓現衆相而無分別如來淨除一切衆生自心現流亦復如是頓現無相無有所有清淨境界如日月輪頓照顯示一切色像如來為離自心現習氣過患衆生亦復如是魏云如來為令衆生遠離自心煩惱見熏過氣習患頓為顯示不思議智最勝境界譬如藏識頓分別知自心現及身安立受用境界彼諸依佛亦復如是頓熟衆生所處境界以修行者安處於彼色究竟天唐云譬如阿黎耶識分別現境自身資生器世間等一時而知非是前後大慧報佛如來亦復如是一時成熟諸衆生界至究竟天淨妙宮殿修行清淨之處譬如法佛所作依佛唐云譬如法佛頓現報佛及以化佛光明照耀自覺聖趣亦復如是彼於法相有性無性惡見妄想照令除滅通曰大慧初問云何淨其念云何念增長至此又問淨除自心現流為頓為漸蓋因上文當思惟自心現妄想為諸佛子以自心現方便而教授之所為教授方便有頓頓有頓漸有漸頓有漸漸顧其受者何如耳漸有四喻頓有四喻俱有深意非泛然雜舉也為漸除自心現流現行無明流逸奔塵不出五六七八識情流注相續不斷故轉第八識為大圓鏡智其果成就當以漸熟轉第五識為成所作智如陶家造器當以漸成轉第七識為平等性智如大地生物平等漸生轉第六識為妙觀察智如學音樂書畫種種技術當以漸妙淨除一分識情即成一分智用故有可容人力者如作器學音必須工夫精到有不可容人力者如果熟物生機非在我俟其自化而已此漸淨非頓之大略也四頓亦有次第初頓現無所有清淨境界攝有相歸無相如鏡現諸像非漸次淨頓令住於寂靜無分別處以淨除五識邊事次頓顯不思議智最勝境界頓令衆生遠離自心所現煩惱見熏習氣過患此妙觀察智如日月光一時遍照一切色像無復昏暗似淨除六識邊事前以鏡喻現識此以日月喻觀察義各有當耳既曰不思議智已轉識成智矣故藏識頓能分別自心所現見分相分根身器界一時而知非有前後識既成智智即是佛不須淨除不須遠離如報佛成熟一切衆生安處於色究竟天淨妙宮殿修行清淨之處蓋淨第七識而歸如來藏識海矣然色究竟天未出三界為報佛所居若法佛頓現報佛及以化佛依佛智用不離妙寂光土光明照耀無量無邊故淨除自心至於自覺聖趣光明法體於三界所有法相有見無見邪惡妄想一照即令除滅不啻太陽一出而魍魎潛消蓋極頓法門也前報佛頓熟衆生轉識成智猶帶識在此法佛頓現報佛純是智用光照無邊豈但安處色究竟天而已哉此淨除自心現流方便之法或頓或漸大約如此要歸於教授佛子成如來身而已初荷澤神會禪師問六祖曰先頓而後漸先漸而後頓不悟頓漸人心裏常迷悶祖曰聽法頓中漸悟法漸中頓修行頓中漸證果漸中頓頓漸是常因悟中不迷悶六祖語意自圓却與此經同旨後史山人問圭峰禪師其所修者為頓為漸漸則忘前失後何以集合而成頓則萬行多方豈得一時圓滿峰曰真理即悟而頓圓妄情息之而漸盡頓圓如初生孩子一日而肢體已全漸修如長養成人多年而志氣方立又問凡修心地之法為當悟心即了為當別有行門若別有行門何名南宗頓旨若悟即同諸佛何不發神通光明峰曰識氷池而全水藉陽氣而鎔銷悟凡夫而即真資法力而修習氷消則水流潤方呈溉滌之功妄盡則心靈通始發通光之應修心之外無別行門此論頓不廢漸足備漸頓頓漸二義大慧法依佛説一切法入自相共相自心現習氣因相續妄想自性計著因種種不實如幻種種計著不可得唐云法性所流佛説一切法自相共相自心現習氣因相妄計性所執因相更相繫屬種種幻事皆無自性衆生執著取以為實悉不可得復次大慧計著緣起自性生妄想自性相大慧如工幻師依草木瓦石作種種幻起一切衆生若干形色起種種妄想彼諸妄想亦無真實如是大慧依緣起自性起妄想自性種種妄想心種種相行事妄想相計著習氣妄想是為妄想自性相生大慧是名依佛説法唐云由取著境界習氣力故於緣起性中有妄計性種種相現是名妄計性生大慧是名法性所流佛説法相大慧法佛者離心自性相自覺聖所緣境界建立施作大慧化佛者説施戒忍精進禪定及心智慧離陰界入解脫識相分別觀察建立超外道見無色見大慧又法佛者離攀緣攀緣離一切所作根量相滅非諸凡夫聲聞緣覺外道計著我相所著境界自覺聖究竟差別相建立是故大慧自覺聖究竟差別相當勤修學自心現見應當除滅通曰上言依佛頓熟衆生安處於彼色究竟天當説何等法耶彼依佛者法性所流之佛即八識所流第七識而七識恆與八識相依故曰依佛即報佛也報佛明於七識邊事故説一切法各具一體而為自相和合相成而為共相皆是自心所現境界攝取外境熏成種子為無始習氣因而相續妄想計著實我實法為妄想自性因故七識與六識更相繫屬衆生執著取以為實不知種種諸相皆無自性猶如幻事本非實有而七識從中種種計著亦皆虗妄悉不可得然七識何以為六識因哉彼計著緣起自性能生妄想自性之相譬如巧幻師依草木瓦石作種種幻事依於呪術人工之力成就一切衆生形色相狀衆生見幻種種形色起種種妄想分別執著為人而實無人幻既非真想豈為實故曰彼諸妄想亦無真實然則因緣法體隨心分別亦復如是由七識無始已來取著境界習氣力故於一念初動緣起自性中遂起妄想自性種種相現內緣於八識而為種種妄想之心外緣於六塵而為種種之相及緣於六識而為行事妄想籌度之相此計著習氣妄想之力內外傳送相續不斷故能緣起妄想自性是名妄想自性之相依緣起自性而生也若明知是妄不實如幻即如藏識覺了自心所現即真即妄即妄即真故名法性所流佛説法之相所以成熟衆生也若法佛者不但離妄想緣起自性相亦且離心自性相并其八識而化之矣純是自覺聖智境界以智緣智建立施作不可以知知不可以識識乃最上第一義也法佛本來無妄故不説此妄因妄相及一切淨除之法我王庫內無如是刀故也前又云如來為令衆生遠離自心現習氣過患當説何等法耶彼法身所流千百億應化佛者明於六識邊事故於八萬四千化門而説法説施戒忍精進禪定及心智慧六波羅蜜法所以化菩薩説離陰界入解脫識相分別知見法所以化二乘以妙觀察智建立九次第定法超過外道有無等見及無色界四空等見為諸凡夫二乘外道總不外於六識妄想分別故化佛所説種種法所以淨除之也若法佛者本來無一物何處惹塵埃故不必離六識攀緣而攀緣自離不必滅前五能作所作根量而能所等相自滅光明照耀諸妄悉除非諸凡夫外道計著神我及二乘偏空所著境界乃自覺聖究竟珠勝相建立施作與大菩薩究竟差別以一切佛法身智慧而自莊嚴是法身如來所證法相乃自覺修行勝相超過一切故當修學云何修學但離妄緣即如如佛故曰自心現見應當除滅前自心現流明知不滅故須淨除此自心現見能見自心淨法執為涅槃是見之為害也深故須除滅既無妄想又無妄見純然一法身境界何者而非淨哉黃檗云佛有三身法身説自性虗通法報身説一切清淨法化身説六度萬行法法身説法不可以言語音聲形相文字而求無所説無所證自性虗通而已故曰無法可説是名説法報身化身皆隨機感現所説法亦隨事應根以為攝化皆非真法故曰報化非真佛亦非説法者由黃檗言向上一路言不能宣要實見得其惟頓頓法門乎復次大慧有二種聲聞乘通分別相謂得自覺聖差別相及性妄想自性計著相唐云謂自證聖智殊勝相及分別執著自性相云何得自覺聖差別相聲聞謂無常苦空無我境界真諦離欲寂滅息陰界入自共相外不壞相如實知心得寂止心寂止已禪定解脫三昧道果正受解脫不離習氣不思議變易死得自覺聖樂住聲聞是名得自覺聖差別相聲聞唐云云何自證聖智殊勝相謂明見苦空無常無我諸諦境界離欲寂滅故於蘊界處若自若共外不壞相如實了知故心住一境住一境已獲禪定解脫三昧道果而得出離住自證聖智境界樂未離習氣及不思議變易死是名聲聞住自證聖智境界相大慧得自覺聖差別樂住菩薩摩訶薩非滅門樂正受樂顧憫衆生及本願不作證大慧是名聲聞得自覺聖差別相樂菩薩摩訶薩於彼得自覺聖差別相樂不應修學唐云菩薩雖亦得此聖智境界以憐憫衆生故本願所持故不證寂滅門及三昧樂通曰上言法佛非諸凡夫聲聞緣覺外道計著我相所著境界此下綴而明之二種聲聞乘有通相有分別相證聲聞果是通相其中有利根有鈍根是分別相一者得自覺聖殊勝相謂依四諦而修觀空而悟入者此利根也雖得聖智差別不得聖智究竟中差別故但證聲聞二者性妄想自性計著相謂依權教八背捨觀而修析色而取偏空者此鈍根也未得無我故曰妄想自性計著相何言乎自證聖智殊勝相也謂觀身是苦觀受是空觀心無常觀法無我四觀總別不一無非捨俗諦歸真諦離三界欲趨寂滅樂故於五蘊十八界十二處若自相若共相俱已滅息五陰六入各有自體名曰自相和合成人名曰共相外道必欲壞一切相而空之此則外不壞相如實了知心得寂靜住於一境住一境已即獲禪那止觀以禪定力而得解脫即證三昧道果是為離塵解脫以正受力而得解脫不復為陰界入無常苦空境界所縛是為不退解脫然猶以八識為涅槃故曰未離習氣雖得不思議變易死亦是出世之習氣未能離也以此為樂住著不捨故名得自覺聖樂住聲聞唯識論云生死有二種一分段生死謂諸有漏善不善業由煩惱障緣助勢力所感三界粗異熟果身命短長隨因緣力有定劑限故名分段二不思議變易生死謂諸無漏有分別業由所知障緣助勢力所感殊勝細異熟果由悲願力改轉身命無定劑限故名變易無漏定願正所資感妙用難測名不思議諸菩薩摩訶薩亦證此寂滅樂亦同此不思議變易死何以異於聲聞也然菩薩雖得自覺聖智差別樂住非二乘寂滅門樂乃住八地無生正受樂也以憐憫衆生故而欲度脫之及回智向悲本願所持故雖得三昧正受樂而不取證涅槃自以為足若聲聞人住著此樂不欲度生欣靜厭動被淨法酒所醉是名聲聞所得自覺聖差別相樂菩薩摩訶薩是大菩薩當度衆生於彼得自覺聖差別相樂不應取著故不應修學溈山坐次仰山入來溈曰寂子速道莫入陰界仰曰慧寂信亦不立溈曰子信了不立不信不立仰曰秪是慧寂更信阿誰溈曰若恁麼即是定性聲聞仰曰慧寂佛亦不立若溈仰父子真大乘器豈肯以自覺聖智相樂而自住著大慧云何性妄想自性計著相聲聞所謂大種青黃赤白堅濕暖動非作生自相共相先勝善説魏云斟量相應阿含先勝見善説故見已於彼起自性妄想唐云云何分別執著自性相所謂知堅濕暖動青黃赤白如是等法非作者生然依教理見自共相分別執著魏云分別有物執虗妄相謂於彼法虗妄執著以為實有菩薩摩訶薩於彼應知應捨隨入法無我相滅人無我相見漸次諸地相續建立是名諸聲聞性妄想自性計著相通曰外道計作者生是謂異因固為妄想無足論已今聲聞性妄想自性計著者謂知四大種性青黃赤白其色也堅濕暖動其性也色色自爾非假人為性性自爾非假人作非如外道所指微塵等由作者生故以四大五蘊各有自性即是自相和合變化即是共相於彼自相共相虗妄分別執著實有自性即是無作涅槃以為阿含小乘教中先勝見解咸作是説見是法已於彼分別謂實有物見有涅槃自性可得即是自性妄想説到自性已離塵纍雖得人無我相然此見不滅墮在法執菩薩摩訶薩於彼所執應知應捨隨入法無我相則彼人無我相見自滅自人空法空以至空空得無生法忍諸地相續建立由一地入一地漸住諸地登菩薩位豈二種聲聞可同日語哉所云性妄想者謂分別實有自性即是法執自性計著者謂執著實我自性即是我執此聲聞計著我相所著境界也黃檗云菩薩心如虗空一切俱捨所作福德皆不貪著然捨有三等內外身心一切俱捨猶如虗空無所取著然後隨方應物能所皆忘是為大捨若一邊行道布德一邊旋捨無希望心是為中捨若廣修衆善有所希望聞法知空遂乃不著是為小捨大捨如火燭在前更無迷悟中捨如火燭在傍或明或暗小捨如火燭在後不見坑穽故菩薩心如虗空一切俱捨過去心不可得是過去捨現在心不可得是現在捨未來心不可得是未來捨是謂三世俱捨必如是方證三空也爾時大慧菩薩摩訶薩白佛言世尊世尊所説常不思議自覺聖趣境界及第一義境界世尊非諸外道所説常不思議因緣耶佛告大慧非諸外道因緣得常不思議所以者何諸外道常不思議不因自相成若常不思議不因自相成者何因顯現常不思議復次大慧不思議若因自相成者彼則應常由作者因相故常不思議不成大慧我第一義常不思議第一義因相成離性非性得自覺相故有相第一義智因故有因離性非性故譬如無作虗空涅槃滅盡故常如是大慧不同外道常不思議論如是大慧此常不思議諸如來自覺聖智所得如是故常不思議自覺聖智所得應當修學通曰大慧因上執著自性非作生似不思議境界因疑佛説常不思議法是自覺聖趣境界是第一義境界思之不得議之不及毋亦同外道所説常不思議因緣耶不知外道妄計所作無常總歸於無但以無為不可思議遂執為常是斷滅見也非如是因緣可得常不思議所以者何常不思議原有本來自相今外道所云常不思議不因本來自相而成也若常不思議不因自相成者因非正因相非正相何因顯現真常不思議境界耶若彼不思議常因自相成者非緣外境非假造作應是真常由彼妄計作者為生因相故以所生無常而作者是常彼所因作者不出三界有為之相有作必有壞是生滅法何得為常故常不思議不成我故曰非外道因緣得常不思議也若我第一義常不思議者以第一義因相而成何謂第一義因相有屬俗諦無屬真諦非有非無屬中道諦是為第一義諦離性非性故於中得自覺相靈光獨露逈脫根塵是第一義之相也故為正相得自覺第一義相由於具足第一義智即般若智為之因也故為正因是因自相成者不落於有不落於無一切有無戲論俱離當體寂滅是真常不思議境界以非所作故譬如虗空非作者生如涅槃如寂滅亦非作者生故能常也外道雖能滅有不能滅無雖能滅一切法不能滅作者滅之不盡終歸生滅何由顯現常不思議哉此我所説常不思議是第一義境界不同於外道邪見諍論也外道常不思議論由計度生我此常不思議由諸如來識自本心見自本性自覺聖智所得此常不思議由悟而入者非心意意識境界應當修學南嶽思大禪師示衆曰道源不遠性海非遙但向己求莫從他覓覓即不得得亦不真偈曰頓悟心源開寶藏隱顯靈通現真相獨行獨坐常巍巍百億化身無數量縱令畐塞滿虗空看時不見微塵相可笑物兮無比況口吐明珠光晃晃尋常見説不思議一語標名言下當斯偈足為常不思議傳神矣復次大慧外道常不思議無常性異相因故非自作因相力故常唐云外道常不思議以無常異相因故常非自相因力故常復次大慧諸外道常不思議於所作性非性無常見已思量計常大慧我亦以如是因緣所作者性非性無常見已自覺聖境界説彼常無因唐云外道常不思議以見所作法有已還無無常已比知是常我亦見所作法有已還無無常已不因此説常大慧若復諸外道因相成常不思議因自相性非性同於兔角此常不思議但言説妄想諸外道輩有如是過所以者何謂但言説妄想同於兔角自因相非分唐云外道以如是因相成常不思議此因相非有同於兔角故常不思議唯是分別但有言説何以故彼因同於兔角無自因相故大慧我常不思議因自覺得相故離所作性非性故常非外性非性無常思量計常大慧若復外性非性無常思量計常不思議常而彼不知常不思議自因之相去得自覺聖智境界相遠彼不應説通曰外道常不思議所以不成者由彼以一切無常性異相為因故非自覺聖智所得第一義自相因力故常曰異相者以彼無常性顯此常性是為異因何以明其異也外道見因緣所作法有已還無一切無常於中計度有者非常無者常而以一切無常為常也我亦見因緣所作法有已還無一切無常不因此説常何以故常無常推遷代謝屬前境不屬自性我自覺聖智境界不因所作常無常而後見其常也是為正因彼於所作生滅法中而計常者是為無因無因安得成常若復外道以如是因相成常不思議者此因自相果有實體然後可成彼但以一切性非性為因故是因相非有同於兔角畢竟無實體可得無不能生無雖説常不思議但言説妄想耳有如是虗妄之過所以者何彼因自相同於兔角兔角原無即無自因相可得將以何者為常於吾自覺聖智常不思議自相因力真實不虗者非彼分所有彼所因者既不能常吾能常者又非彼有縱有言説渾成虗妄而已吾所謂自因相者外道何以不知蓋我説常不思議者因自覺第一義智得常不思議相故自所覺者遠離所作性非性故即離常無常性以離常無常性為自相逈超有無之外所以為常非如外道於所作性非性無常而計常也若彼外道於所作法有已還無見其無常因思量計度此無常性即是常不思議境界遂以為常但於所作觀不能離所作觀但見一切無不見離於無者而彼曾不知常不思議自因之相為何似既不能知去得自覺聖智境界尚遠故非彼分所有非彼所有即不應説非其有而説者即是妄説我故曰諸外道輩有如是過僧問利山和尚衆色歸空空歸何所山曰舌頭不出口曰為甚麼不出口山曰內外一如故又僧問溪山和尚緣散歸空空歸何所溪乃召僧僧應諾溪曰空在何處曰却請和尚道溪曰波斯喫胡椒此二尊宿説到常不思議直是開口不得復次大慧諸聲聞畏生死妄想苦而求涅槃不知生死涅槃差別一切性妄想非性魏云不知世間涅槃無差別故唐云不知生死涅槃差別之相一切皆是妄分別有無所有故未來諸根境界休息作涅槃想非自覺聖智趣藏識轉唐云妄計未來諸根境滅以為涅槃不知證自智境界轉所依藏識為大涅槃是故凡愚説有三乘説心量趣無所有是故大慧彼不知過去未來現在諸如來自心現境界計著外心現境界生死輪常轉唐云彼愚癡人説有三乘不説唯心無有境界大慧彼人不知三世諸佛所説自心境界取心外境常於生死輪轉不絶通曰不但外道落斷見諸聲聞亦有之諸聲聞人畏生死苦求涅槃樂不知生死涅槃無差別相於中分別一切法與非法而滅諸相者皆是妄分別有其實無所有故何以明其妄也彼妄計未來諸根境界暫時休息入乎滅盡定以為涅槃而不知自覺聖智證知自性能轉所依藏識為大涅槃轉識成智者不離諸根當體寂滅諸根自寂豈容更滅愚癡凡夫不能了此説有大小三乘之法説心量漸次滅盡趣無所有得寂靜法不知唯心無所有境界諸法本自寂滅相是三世諸佛所説自心現量境界雖現有生死生死即是涅槃愚癡凡夫不明自心所現以一切法皆心外境計著外境休息作涅槃想唯於境上覓無所有不於心上悟無所有境有去來是生滅法於生滅法求涅槃者涅槃即屬生滅故妄取不受後有以為滅度至劫滿復生終從輪墮生死輪轉無休歇時由彼未能轉識故為識轉耳無業禪師告弟子惠愔等曰汝等見聞覺知之性與大虗同壽不生不滅一切境界本自空寂無一法可得迷者不了即為境惑一為境惑流轉無窮汝等當知心性本自有之非因造作猶如金剛不可破壞一切諸法如影如響無有實者經云唯此一事實餘二則非真常了一切空無一物當情是諸佛用心處汝等勤而行之復次大慧一切法不生是過去未來現在諸如來所説所以者何謂自心現性非性離有非有生故唐云自心所見非有性故離有無生故大慧一切性不生一切法如兔馬等角是愚癡凡夫不覺妄想自性妄想故魏云妄想分別分別諸法是故一切諸法不生大慧一切法不生自覺聖智趣境界者一切性自性相不生非彼愚夫妄想二境界自性身財建立趣自性相大慧藏識所攝相轉愚夫墮生住滅見希望一切性生有非有妄想生非聖賢也大慧於彼應當修學唐云身及資生器世間等一切皆是藏識影像所取能取二種相現彼諸愚夫墮生住滅二妄見中故於中起有無分別通曰一切法不生即唯心無所有境界是三世諸佛所説其説謂何謂自心所現一切法或現而為有不見有有性可得即有而離有也或現而為無不見有無性可得即無而離無也有無俱離性本不生非一切斷滅之謂也凡愚謂一切性不生指一切法如兔馬等角原自非有不但滅其法并滅其性遂謂一切性不生是愚癡凡夫不自覺知妄想自性妄自分別諸法故作此斷滅見也若三世諸佛所説一切法不生乃是自覺聖智趣境界覺了一切性即是自性生即不生故一切性自體相不生非以生而趨乎不生亦非對生而顯乎不生自性自相本自不生但一境界不作二見也非彼愚夫妄想分別作二境界何以謂之二境界也彼自性所現根身及資生器世間等唯心所現心外無法法外無心而彼妄想分別必滅外境而趨乎寂靜為趨自性相是自性一境界而趨自性又一境界也殊不知一切皆是藏識影像藏識無相而攝所攝有相藏識無轉而攝所攝相恆轉彼不明乎藏識即大圓鏡智於能所取原不相應於中妄見有能證涅槃之人及所證涅槃之果能所相現即屬流轉是愚癡凡夫墮生住滅二妄見中但見有去來之影不見無生滅之鏡於是虗謬希望一切性生生即還滅一切性有有即還無於中妄起有無分別謂有已還滅即是涅槃即是一切性不生其實去不生不滅之體尚遠是愚癡凡夫惡見非聖賢之所行也若彼聖賢悟知三世諸佛所説自心現境界即生滅離生滅即有無離有無不必外一切法而別求所謂不生也於彼一切法不生應當修學史山人問圭峰曰云何佛化所生吾如彼生佛既無生生是何義若言心生法生心滅法滅何以得無生法忍耶答曰既云如化化即是空空即無生何詰此義生滅滅已寂滅為樂忍可此法無生名曰無生法忍此答足備此段疑義而三世諸佛所説微旨可得之言外復次大慧有五無間種性云何為五謂聲聞乘無間種性緣覺乘無間種性如來乘無間種性不定種性各別種性唐云無種性云何知聲聞乘無間種性若聞説得陰界入自共相斷知時舉身毛孔熙怡欣悅及樂修相智不修緣起發悟之相是名聲聞乘無間種性聲聞無間見第八地起煩惱斷習煩惱不斷不度不思議變易死度分段死正師子吼我生已盡梵行已立不受後有如實知修習人無我乃至得般涅槃覺通曰前大慧問云何為種性非種及心量此章詳答相似曰種體同曰性衆生佛性本來是一由昔教法熏習各有自類種子故曰種性種性相依無纖毫間隔故曰無間種性以執化佛所説權法成聲聞種執報佛所説緣生之法成緣覺種悟法佛所説離攀緣法成如來種若聞此三法或信或疑成不定種若無信心返生毀謗斷滅佛種成無種性何謂聲聞以聞説四諦法成其種性於陰界入自相共相一切斷知斷者正斷諸惑使時知者知已斷諸惑使時所謂知苦斷集證滅修道也時為三昧酒所醉故舉身毛孔熙怡欣悅及樂修偏空之相我空之智智即有相之智是以寂滅由修而得不知樂修緣起無生觀察因緣發悟本來寂滅之相但名聲聞乘種性耳如華嚴所載八地菩薩證我空真如樂住三昧不起滅定諸佛因而勸之曰起善男子勿得樂住三昧汝之三昧二乘亦得所以聲聞雖未至菩薩位然見處與第八地無異由彼依四諦修於現行結使名起煩惱者已斷盡而種子習氣名習煩惱者尚未斷於三界見思惑已滅故能度分段生死而塵沙無明惑未滅故為變易生死管定不能度脫此但得人空耳乃於天人魔外中便師子吼作是唱言我生已盡謂斷苦集梵行已立謂證滅道所作已辦不受後有便以此為得無生滅彼但如實而知修習人無我一路未至法無我也乃遂生得涅槃覺想覺有涅槃可得非真涅槃也未證謂證得少為足此其所以為聲聞與雲居膺禪師令侍者送袴與一住菴道者道者曰自有娘生袴竟不受膺再令侍者問娘未生時著箇甚麼道者無語後遷化有舍利持似於膺膺曰直饒得八斛四斗不如當時下得一轉語好此道者認定箇娘生袴真是定性聲聞若得見娘未生時面目方可語於緣起發悟之相大慧分別無間者我人衆生壽命長養士夫彼諸衆生作如是覺求般涅槃唐云復有衆生求證涅槃言能覺知我人衆生養者取者此是涅槃復有異外道説悉由作者見一切性已言此是般涅槃作如是覺法無我見非分彼無解脫大慧此諸聲聞乘無間外道種性不出出覺為轉彼惡見故應當修學唐云此是聲聞乘及外道種性於未出中生出離想應勤修學捨此惡見通曰各別無間種性是名無種性謂其焦芽敗種斷佛種性如增上慢聲聞及惡見外道所見各各不同有我見有人見有衆生見有壽命見此聲聞人所作證悟了覺四相以取涅槃有長養士夫見士夫即神我外道計一切從神我流出神我能長養一切於中取著以為涅槃復有異外道言一切法由作者生是謂異因如前舉若勝妙若士夫若自在若時若微塵以為作者能生一切而作者之性是無生滅妄計此等以為涅槃作如是種種覺者皆於法見未忘於法無我非其分劑總為法縛不得解脫何由得涅槃乎然聲聞之涅槃不離偏空外道之涅槃不離妄計此二種性俱於未出離中生出離想於生滅法中求不生滅吾未見其能得真涅槃也汝等諸菩薩應當修學無上涅槃轉彼聲聞外道惡見而歸之乎正毋為彼惡見所轉而同於斷滅也百丈道恆禪師曰實是無事諸人各各是佛更有何疑得到這裏古人道十方同聚會個個學無為此是選佛場心空及第歸且作麼生是心空不是那裏閉目冷坐是心空此正是意識想解上座要會心空麼但且識心便見心空所以道過去已過去未來更莫算兀然無事坐何曾有人喚設有人喚上座應他好不應他好若應他阿誰喚上座若不應他又不患聾也三世體空且不是木頭也所以古人道心空得見法王還見法王麼也秪是老病僧又莫道渠自代好珍重須於此有箇悟處方能轉彼二乘外道惡見大慧緣覺乘無間種性者若聞説各別緣無間舉身毛竪悲泣流淚不相近緣所有不著魏云不樂憒閙故觀察諸因緣法不著諸因緣法故種種自身種種神通若合若離種種變化聞説是時其心隨入唐云有時聞説現種種身或聚或散神通變化其心信受若知彼緣覺乘無間種性已隨順為説緣覺之乘是名緣覺乘無間種性相通曰緣覺有二種出無佛世觀化知無謂之獨覺出有佛世依教而修觀緣悟道謂之緣覺此云各別緣無間者即十二因緣法三世因果相緣無間也不相近緣所有不著者離憒閙緣無所染著即十二因緣滅也是名緣覺乘法無明滅盡即能發起神通得意生身種種變現離合自在此緣覺乘雖未必一一俱證然素聞其説其心已信受之矣信受遂成緣覺乘種性種性既成而能隨順衆生同是種性者為説十二因緣之法使人皆觀緣而悟道是名緣覺乘無間種性之相也彼初聞道舉身毛竪悲泣流淚便有哀愍衆生之意視聲聞舉身毛孔熙怡欣悅樂住三昧者又進一等矣鳥窠侍者會通一日欲辭去窠曰汝今何往對曰會通為法出家和尚不垂慈誨今往諸方學佛法去窠曰若是佛法吾此間亦有少許曰如何是和尚佛法窠於身上拈起布毛吹之通遂領悟汾陽昭禪師頌曰侍者初心慕勝緣辭師擬去學參禪鳥窠知是機緣熟吹毛當下得心安侍者觀緣悟道鳥窠善能隨順為説緣覺之乘亦是希有大慧彼如來乘無間種性有四種謂自性法無間種性離自性法無間種性得自覺聖無間種性外剎殊勝無間種性大慧若聞此四事一一説時及説自心現身財建立不思議境界時心不驚怖者是名如來乘無間種性相唐云所證法有三種所謂自性無自性法內身自證聖智法外諸佛剎廣大法聞自心所現身財建立阿賴耶識不思議境不驚不怖不畏當知此是如來乘性通曰此本四種而唐合前二種為一與前聖智三相相符自性無自性法即無所有相也內身自證聖智法即自覺聖智究竟相也外諸佛剎廣大法即一切諸佛自願處相也今以四種言妙體圓明曰自性不守自性曰離自性匪從外得曰自覺平等法界曰殊勝或謂自性即法身離自性即解脫聖智即般若此約三德祕藏總號法身外剎殊勝即報身法報同體故説上四事及説自心現身財建立一切見分相分皆自心所現心外更無所有此是第八識不思議境界所謂阿賴耶識即如來藏也聞是説而不驚不怖不畏者於生滅法中而不眩於無生滅智當知是最上利根久遠成就所謂善根純熟者也故名如來乘無間種性而宗門中亦有與此四事暗符者如僧問馬祖為甚麼説即心即佛祖曰為止小兒啼曰啼止時如何祖曰非心非佛曰除此二種人來如何指示祖曰向依道不是物曰忽遇其中人來時如何祖曰且教伊體會大道若於馬祖言下一一穿透是名如來乘無間種性堪付大法矣大慧不定種性者謂説彼三種時隨説而入隨彼而成大慧此是初治地者謂種性建立為超入無所有地故作是建立魏云説三乘者為發起修行地故説諸性差別非究竟地為欲建立畢竟能取寂靜之地故彼自覺藏者自煩惱習淨見法無我得三昧樂住聲聞當得如來最勝之身唐云彼住三昧樂聲聞若能證知自所依識見法無我淨煩惱習畢竟當得如來之身通曰何為三乘外別立不定種性謂聞説聲聞乘緣覺乘如來乘三法隨説信入隨學而成故曰不定然聲聞緣覺非究竟地必能取寂靜之地歸無所有方為究竟故建立不定種性為初發心者於十住初治地便能超入第八無所有地頓能捨藏頓證菩提此是頓悟一種故作是建立名曰不定彼緣覺聲聞又豈一定是緣覺聲聞於如來乘終無望哉若能回心向大於所依自覺藏識能轉所依自淨其習向者但起煩惱淨今則習煩惱亦淨矣向者但見人無我今則見法無我矣是樂住三昧之聲聞將轉而度生利物廣作佛事畢竟當得如來最勝之身前二乘但得聖智差別相至是得究竟差別相而三乘同歸一乘矣黃檗云此心即無心之心離一切相衆生諸佛更無差別但能無心即是究竟學道人若不直下無心纍劫修行終不成道被三乘功行拘繫不得解脫然證此心有遲疾有聞法一念便得無心者有至十信十住十行十回向乃得無心者有至十地乃得無心者至長短得無心乃住更無可修可證實無所得真實不虗一念而得與十地而得者功用恰齊更無深淺只是歷劫枉受辛勤耳黃檗發明超入一路語語如出佛口真所謂心心相印者爾時世尊欲重宣此義而説偈言須陀槃那果即須陀洹此云入流往來及不還斯陀含一往來斯那含曰不來逮得阿羅漢是等心惑亂三乘與一乘非乘我所説愚夫少智慧諸聖遠離寂第一義法門遠離於二教住於無所有何建立三乘諸禪無量等無色三摩提受想悉寂滅亦無有心量通曰此頌直顯頓門為超入無所有地者無所事漸也由漸而入者如須陀洹能斷三界見惑入於聖流名初果斯陀含能斷欲界前六品思惑後三品未斷須一往來名二果阿那含斷欲界思惑盡不來受生名三果阿羅漢已證無生殺賊應供名四果然其初心憎生死愛涅槃皆於惑亂境上立對治法境固惑亂而對治者亦惑亂也是中有利根阿羅漢回心趨向大乘即名菩薩有鈍根阿羅漢不回心者即名聲聞緣覺二乘以二乘對大乘諸經名為三乘而如來乘名為一乘三一俱非又有非乘之説只此一佛字亦無處著非上上智慧不能曉了愚夫少智慧局於聲聞緣覺二教謂有寂滅可得唯十地諸聖遠離寂靜住樂不自作證乃可為説此非乘之旨此非乘即第一義法門現前諸法本自寂滅不須更求寂滅故遠離於二乘之教而住於無所有地既無我執亦無法執是為真涅槃也既是本來無境界何更建立三乘之法耶為證如來乘者一超直入無所有地固無有心量可得如四禪天四無心量及無色界九次第定證聲聞果者悉得受想定滅灰心滅智亦無有心量可得皆以無為法而有差別故建立三乘以別之有落階級者有不落階級者是建立三乘特為誘引愚夫之説非第一義也若有智慧悟知第一義一乘且非何三乘之有黃檗云心自無心亦無無心者將心無心心却成有默契而已絶諸思議故曰言語道斷心行處滅此心是本源清淨佛人皆有之蠢動含靈與諸佛菩薩一體不異秪為妄想分別造種種業果本佛上實無一物虗通寂靜明妙安樂而已深自悟入直下便是圓滿具足更無所欠縱使三祇精進修行歷諸地位及一念證時只證元來自佛向上更不添得一物却觀歷劫功用總是夢中妄為故如來云我於阿耨菩提實無所得以黃檗語默印此偈更無絲毫移易大慧彼一闡提此云信不具非一闡提世間解脫誰轉大慧一闡提有二種一者捨一切善根及於無始衆生發願云何捨一切善根謂謗菩薩藏及作惡言此非隨順修多羅此云經毗尼此云律解脫之説捨一切善根故不般涅槃二者菩薩本自願方便故非不般涅槃一切衆生而般涅槃大慧彼般涅槃是名不般涅槃法相此亦到一闡提趣大慧白佛言世尊此中云何畢竟不般涅槃佛告大慧菩薩一闡提者知一切法本來般涅槃已畢竟不般涅槃而非捨一切善根一闡提也大慧捨一切善根一闡提者復以如來神力故或時善根生所以者何謂如來不捨一切衆生故以是故菩薩一闡提不般涅槃通曰前大慧問何等禪境界云何有三乘上已詳答又問云何一闡提此以一闡提有二種告之唐云一闡提何故於解脫中不生欲樂即後捨一切善根之謂魏云一闡提無涅槃性即前無種性之謂俱指惡性一闡提而言不若此譯即先提出菩薩一闡提化導衆生該盡一篇旨趣曰彼斷善根一闡提非此菩薩一闡提於世間得解脫者誰為轉此法輪而使世間不解脫者亦得其解脫乎故一闡提有二種惡性闡提捨一切善根之謂也菩薩闡提為無始衆生發願之謂也惡性闡提何以捨一切善根耶謂謗菩薩大乘法藏非隨順經律解脫之説作是語時善根悉斷必輪轉生死所以不入涅槃若菩薩闡提何以為無始衆生發願耶以菩薩本自方便作願若一衆生未涅槃者我終不入非不般涅槃也願一切衆生悉入涅槃而後涅槃是名菩薩不般涅槃法相此菩薩欲度衆生住於法相然終不入涅槃與彼惡性一闡提趣行略同故均名之曰一闡提無涅槃種性相也大慧復疑此二種一闡提畢竟不般涅槃然則菩薩何以別於衆生乎佛謂菩薩知一切法本來寂滅本自不生早已涅槃不容更滅所以畢竟不般涅槃非與斷善根闡提輪回生死不入涅槃者同也且斷善根闡提以如來神力加持之故或時善根生而得世間解脫尚有般涅槃時所以者何以如來慈悲願力不捨一切衆生因不捨故默有轉移如華嚴所載由昔謗華嚴經墮地獄中而為地獄天子毗盧出世先以足輪光照三重頓圓十地此皆謗法闡提蒙佛神力之驗也菩薩願度衆生亦欲如佛謂衆生界盡我願乃盡然衆生必不可盡而菩薩豈有般涅槃之時乎以是之故菩薩一闡提畢竟不般涅槃我故曰彼一闡提非此菩薩一闡提則世間解脫法誰轉故知菩薩不捨一切衆生亦即如來之神力也黃檗云言闡提者信不具也一切六道衆生乃至二乘不信有佛果皆謂之斷善根闡提菩薩者深信有佛法不見有大乘小乘佛與衆生同一法性乃謂之善根闡提大抵因聲教而悟者謂之聲聞觀因緣而悟者謂之緣覺若不向自心悟雖至成佛亦謂之聲聞佛學道人多於教法上悟不於心法上悟雖歷劫修行不是本佛若不於心悟乃至於教法上悟即輕心重教遂成逐塊忘於本心故但契本心不用求法心即法也此段從前五無間種性各別無間中補出一闡提衆生不信有佛果者黃檗洞見此經血脈路故舉斷善根闡提及善根闡提要歸於契悟本心是真能轉世間解脫法者
